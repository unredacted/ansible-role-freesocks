###############################################################################
# CHANGE MODE: Rotate hostname (same domain)
# For when DNS blocking targets the current hostname
###############################################################################
- name: "Change: Rotate hostname (same domain)"
  hosts: existing_servers
  remote_user: root
  vars:
    operation_mode: change
    change_target_domain: "example.com"   # Rotate within same domain

    # WSS servers need Caddy config
    outline_caddy_auto_https: true
    outline_caddy_email: "admin@example.com"

    domain_providers:
      example.com:
        dns_provider: cloudflare
        zone_id: "your-zone-id-for-com"

    cloudflare_api_endpoint: "https://api.cloudflare.com/client/v4"
    cloudflare_api_token: "your-api-token"
    cloudflare_account_id: "your-account-id"

    # FreeSocks Control Plane registration (PATCH the new hostname into FCP)
    fcp_enabled: true
    fcp_api_url: "https://fcp.example.org"
    fcp_api_token: "your-fcp-fsv1-token"   # vault me — fsv1_ service token

  roles:
    - ansible-role-freesocks

###############################################################################
# CHANGE MODE: Rotate hostname (different domain)
# Move from a blocked domain to a fresh one
###############################################################################
- name: "Change: Rotate hostname (different domain)"
  hosts: existing_servers
  remote_user: root
  vars:
    operation_mode: change
    change_target_domain: "example.app"   # Rotate to DIFFERENT domain

    outline_caddy_auto_https: true
    outline_caddy_email: "admin@example.com"

    # Both old and new domains must be configured
    domain_providers:
      example.com:
        dns_provider: cloudflare
        zone_id: "your-zone-id-for-com"
      example.app:
        dns_provider: cloudflare
        zone_id: "your-zone-id-for-app"

    cloudflare_api_endpoint: "https://api.cloudflare.com/client/v4"
    cloudflare_api_token: "your-api-token"
    cloudflare_account_id: "your-account-id"

    # FreeSocks Control Plane registration (PATCH the new hostname into FCP)
    fcp_enabled: true
    fcp_api_url: "https://fcp.example.org"
    fcp_api_token: "your-fcp-fsv1-token"   # vault me — fsv1_ service token

  roles:
    - ansible-role-freesocks

###############################################################################
# MIGRATE MODE: Move server to new host
###############################################################################
- name: "Migrate: Move Outline server to new host"
  hosts: new_servers
  remote_user: root
  vars:
    operation_mode: migrate
    source_hostname: "outline1-ams"
    source_kv_hostname: "apple-banana-cherry"    # slug/hostname from old deployment
    destination_hostname: "outline2-fra"
    destination_kv_hostname: "dog-elephant-fox"   # slug/hostname for destination

    base_domain: "example.com"
    api_domain: "example.com"
    prom_domain: "example.com"

    domain_providers:
      example.com:
        dns_provider: cloudflare
        zone_id: "your-zone-id-for-com"

    cloudflare_api_endpoint: "https://api.cloudflare.com/client/v4"
    cloudflare_api_token: "your-api-token"
    cloudflare_account_id: "your-account-id"

    # FreeSocks Control Plane registration (PATCH the destination address into FCP)
    fcp_enabled: true
    fcp_api_url: "https://fcp.example.org"
    fcp_api_token: "your-fcp-fsv1-token"   # vault me — fsv1_ service token

    envoy_mappings:
      outline2-fra:
        ipv4: ["9.10.11.12"]
        ipv6: ["2001:db8::3"]

  roles:
    - ansible-role-freesocks

