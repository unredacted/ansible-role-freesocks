# Example playbooks for ansible-role-freesocks
# See README.md for complete documentation and variable descriptions
#
# Usage pattern:
#   ansible-playbook -i hosts example-playbook.yml \
#     --extra-vars "environment_mode=prod" \
#     --limit <play_hosts>
#
# IMPORTANT: Each play below is a self-contained example.
# In practice, you would typically have ONE playbook with your
# specific configuration, not all examples combined.
#
# Common variables (shared across plays) are shown inline.
# In production, use group_vars, host_vars, or Ansible Vault.

###############################################################################
# DEPLOY MODE: Basic Outline server
###############################################################################
- name: "Deploy: Outline only (basic)"
  hosts: new_servers
  remote_user: root
  vars:
    operation_mode: deploy
    deploy_target_domain: "example.com"
    kv_hostname_prefix: "outline1-ams"

    domain_providers:
      example.com:
        dns_provider: cloudflare
        tunnel_provider: cloudflare
        zone_id: "your-zone-id-for-com"

    kv_provider: cloudflare
    cloudflare_api_endpoint: "https://api.cloudflare.com/client/v4"
    cloudflare_api_token: "your-api-token"
    cloudflare_account_id: "your-account-id"
    cloudflare_api_kv_namespace_prod: "your-prod-api-kv-namespace"
    cloudflare_prom_kv_namespace_prod: "your-prod-prom-kv-namespace"
    cloudflare_api_kv_namespace_dev: "your-dev-api-kv-namespace"
    cloudflare_prom_kv_namespace_dev: "your-dev-prom-kv-namespace"
    cloudflare_access_team_name: "your-team-name"
    cloudflare_access_aud_tag: "your-aud-tag"

    envoy_mappings:
      outline1-ams:
        ipv4: ["1.2.3.4"]
        ipv6: ["2001:db8::1"]

  roles:
    - ansible-role-freesocks

###############################################################################
# DEPLOY MODE: Outline without CF tunnel (direct port access)
###############################################################################
- name: "Deploy: Outline without tunnel"
  hosts: new_servers
  remote_user: root
  vars:
    operation_mode: deploy
    deploy_target_domain: "example.app"
    kv_hostname_prefix: "outline2-ams"

    domain_providers:
      example.app:
        dns_provider: cloudflare
        tunnel_provider: none  # Direct port access, no CF tunnel
        zone_id: "your-zone-id-for-app"

    kv_provider: cloudflare
    cloudflare_api_endpoint: "https://api.cloudflare.com/client/v4"
    cloudflare_api_token: "your-api-token"
    cloudflare_account_id: "your-account-id"
    cloudflare_api_kv_namespace_prod: "your-prod-api-kv-namespace"
    cloudflare_prom_kv_namespace_prod: "your-prod-prom-kv-namespace"
    cloudflare_api_kv_namespace_dev: "your-dev-api-kv-namespace"
    cloudflare_prom_kv_namespace_dev: "your-dev-prom-kv-namespace"
    cloudflare_access_team_name: "your-team-name"
    cloudflare_access_aud_tag: "your-aud-tag"

    envoy_mappings:
      outline2-ams:
        ipv4: ["1.2.3.4"]
        ipv6: ["2001:db8::1"]

  roles:
    - ansible-role-freesocks

###############################################################################
# DEPLOY MODE: Outline + WebSocket (WSS)
###############################################################################
- name: "Deploy: Outline + WSS (random dictionary paths)"
  hosts: new_servers
  remote_user: root
  vars:
    operation_mode: deploy
    deploy_target_domain: "example.com"
    kv_hostname_prefix: "outline3-ams"

    # WSS Configuration
    outline_wss_enabled: true
    outline_keys_port: 853            # Non-443 port for SS, so Caddy gets 443
    outline_caddy_auto_https: true
    outline_caddy_email: "admin@example.com"

    # Random dictionary-word paths (DEFAULT behavior)
    # outline_wss_random_paths: true              # Default: true
    # outline_wss_random_path_min_words: 3        # Default: 3
    # outline_wss_random_path_max_words: 5        # Default: 5
    # Generates paths like /apple-banana-cherry for TCP, /dog-elephant for UDP

    domain_providers:
      example.com:
        dns_provider: cloudflare
        tunnel_provider: cloudflare
        zone_id: "your-zone-id-for-com"

    kv_provider: cloudflare
    cloudflare_api_endpoint: "https://api.cloudflare.com/client/v4"
    cloudflare_api_token: "your-api-token"
    cloudflare_account_id: "your-account-id"
    cloudflare_api_kv_namespace_prod: "your-prod-api-kv-namespace"
    cloudflare_prom_kv_namespace_prod: "your-prod-prom-kv-namespace"
    cloudflare_api_kv_namespace_dev: "your-dev-api-kv-namespace"
    cloudflare_prom_kv_namespace_dev: "your-dev-prom-kv-namespace"
    cloudflare_access_team_name: "your-team-name"
    cloudflare_access_aud_tag: "your-aud-tag"

    envoy_mappings:
      outline3-ams:
        ipv4: ["1.2.3.4"]
        ipv6: ["2001:db8::1"]

  roles:
    - ansible-role-freesocks

###############################################################################
# DEPLOY MODE: Outline + WSS (custom static paths)
###############################################################################
- name: "Deploy: Outline + WSS (static custom paths)"
  hosts: new_servers
  remote_user: root
  vars:
    operation_mode: deploy
    deploy_target_domain: "example.com"
    kv_hostname_prefix: "outline4-ams"

    outline_wss_enabled: true
    outline_keys_port: 853
    outline_caddy_auto_https: true
    outline_caddy_email: "admin@example.com"

    # Custom STATIC paths (disable random generation)
    outline_wss_random_paths: false
    outline_wss_tcp_path: "/stream"
    outline_wss_udp_path: "/packet"

    domain_providers:
      example.com:
        dns_provider: cloudflare
        tunnel_provider: cloudflare
        zone_id: "your-zone-id-for-com"

    kv_provider: cloudflare
    cloudflare_api_endpoint: "https://api.cloudflare.com/client/v4"
    cloudflare_api_token: "your-api-token"
    cloudflare_account_id: "your-account-id"
    cloudflare_api_kv_namespace_prod: "your-prod-api-kv-namespace"
    cloudflare_prom_kv_namespace_prod: "your-prod-prom-kv-namespace"
    cloudflare_api_kv_namespace_dev: "your-dev-api-kv-namespace"
    cloudflare_prom_kv_namespace_dev: "your-dev-prom-kv-namespace"
    cloudflare_access_team_name: "your-team-name"
    cloudflare_access_aud_tag: "your-aud-tag"

    envoy_mappings:
      outline4-ams:
        ipv4: ["1.2.3.4"]
        ipv6: ["2001:db8::1"]

  roles:
    - ansible-role-freesocks

###############################################################################
# DEPLOY MODE: Outline + slipstream (shadowsocks mode)
# Tunnels Shadowsocks traffic through DNS for extreme censorship resistance
###############################################################################
- name: "Deploy: Outline + slipstream (shadowsocks mode)"
  hosts: new_servers
  remote_user: root
  vars:
    operation_mode: deploy
    deploy_target_domain: "example.com"
    kv_hostname_prefix: "outline5-ams"

    # slipstream Configuration
    slipstream_enabled: true
    slipstream_mode: shadowsocks      # Tunnel to SS server (requires ss-local on client)

    # REQUIRED slipstream vars (no defaults - must be set):
    slipstream_base_domain: "your-dns.com"     # Must be in domain_providers
    slipstream_subdomain: "dns1"               # Creates dns1.your-dns.com
    slipstream_ns_hostname: "ns1"              # NS record: ns1.your-dns.com

    # Optional slipstream settings (shown with defaults):
    # slipstream_resolver: "77.88.8.8:53"
    # slipstream_resolver_backup: "77.88.8.1:53"
    # slipstream_dns_port: 53
    # slipstream_version: "main"
    # slipstream_create_dns_records: true

    domain_providers:
      example.com:
        dns_provider: cloudflare
        tunnel_provider: cloudflare
        zone_id: "your-zone-id-for-com"
      your-dns.com:                            # slipstream domain must also be here
        dns_provider: cloudflare
        tunnel_provider: none
        zone_id: "your-zone-id-for-dns"

    kv_provider: cloudflare
    cloudflare_api_endpoint: "https://api.cloudflare.com/client/v4"
    cloudflare_api_token: "your-api-token"
    cloudflare_account_id: "your-account-id"
    cloudflare_api_kv_namespace_prod: "your-prod-api-kv-namespace"
    cloudflare_prom_kv_namespace_prod: "your-prod-prom-kv-namespace"
    cloudflare_api_kv_namespace_dev: "your-dev-api-kv-namespace"
    cloudflare_prom_kv_namespace_dev: "your-dev-prom-kv-namespace"
    cloudflare_access_team_name: "your-team-name"
    cloudflare_access_aud_tag: "your-aud-tag"

    envoy_mappings:
      outline5-ams:
        ipv4: ["1.2.3.4"]
        ipv6: ["2001:db8::1"]

  roles:
    - ansible-role-freesocks

