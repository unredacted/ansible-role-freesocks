###############################################################################
# DEPLOY MODE: Full Stack (Outline + WSS + slipstream)
# Maximum censorship resistance: WebSocket AND DNS tunnel transports
###############################################################################
- name: "Deploy: Full stack (Outline + WSS + slipstream)"
  hosts: new_servers
