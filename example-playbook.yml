###############################################################################
# DEPLOY MODE: Custom hostname (instead of random words)
###############################################################################
- name: "Deploy: Custom hostname"
  hosts: new_servers
  remote_user: root
  vars:
    operation_mode: deploy
    deploy_target_domain: "example.com"
    custom_hostname: "my-proxy-server"  # Results in my-proxy-server.example.com

    domain_providers:
      example.com:
        dns_provider: cloudflare
        zone_id: "your-zone-id-for-com"

    cloudflare_api_endpoint: "https://api.cloudflare.com/client/v4"
    cloudflare_api_token: "your-api-token"
    cloudflare_account_id: "your-account-id"

    # FreeSocks Control Plane registration
    # custom_hostname also becomes the default fcp_server_slug.
    fcp_enabled: true
    fcp_api_url: "https://fcp.example.org"
    fcp_api_token: "your-fcp-fsv1-token"   # vault me — fsv1_ service token

    envoy_mappings:
      outline-custom:
        ipv4: ["1.2.3.4"]
        ipv6: ["2001:db8::1"]

  roles:
    - ansible-role-freesocks

###############################################################################
# DEPLOY MODE: Per-domain DNS credentials (multi-account setup)
# When a domain's DNS zone lives on a different CF account from the global one
###############################################################################
- name: "Deploy: Multi-account (per-domain DNS credentials)"
  hosts: new_servers
  remote_user: root
  vars:
    operation_mode: deploy
    deploy_target_domain: "example.com"

    domain_providers:
      example.com:
        dns_provider: cloudflare
        zone_id: "your-zone-id-for-com"
        cloudflare_api_token: "per-domain-token"     # Domain-specific token
        cloudflare_account_id: "per-domain-account"   # Domain-specific account

    cloudflare_api_endpoint: "https://api.cloudflare.com/client/v4"

    # Global fallback token (used for DNS if domain doesn't have its own)
    cloudflare_api_token: "global-api-token"
    cloudflare_account_id: "global-account-id"

    # FreeSocks Control Plane registration
    fcp_enabled: true
    fcp_api_url: "https://fcp.example.org"
    fcp_api_token: "your-fcp-fsv1-token"   # vault me — fsv1_ service token

    envoy_mappings:
      outline8-ams:
        ipv4: ["1.2.3.4"]
        ipv6: ["2001:db8::1"]

  roles:
    - ansible-role-freesocks

###############################################################################
# Example inventory (hosts):
#
# [new_servers]
# outline1-ams ansible_host=10.0.0.1
# outline2-fra ansible_host=10.0.0.2
#
# [existing_servers]
# outline1-ams ansible_host=10.0.0.1
#
###############################################################################
# Usage examples:
#
# Deploy Outline only (production):
#   ansible-playbook -i hosts example-playbook.yml \
#     --extra-vars "environment_mode=prod" \
#     --limit new_servers
#
# Deploy with WSS (production):
#   ansible-playbook -i hosts example-playbook.yml \
#     --extra-vars "environment_mode=prod deploy_target_domain=example.com" \
#     --extra-vars "outline_wss_enabled=true outline_keys_port=853"
#
# Deploy with slipstream (production):
#   ansible-playbook -i hosts example-playbook.yml \
#     --extra-vars "environment_mode=prod" \
#     --extra-vars "slipstream_enabled=true slipstream_mode=shadowsocks" \
#     --extra-vars "slipstream_base_domain=your-dns.com slipstream_subdomain=dns1 slipstream_ns_hostname=ns1"
#
# Update existing server with slipstream:
#   ansible-playbook -i hosts example-playbook.yml \
#     --extra-vars "operation_mode=update environment_mode=prod" \
#     --extra-vars "slipstream_enabled=true slipstream_mode=shadowsocks" \
#     --extra-vars "slipstream_base_domain=your-dns.com slipstream_subdomain=dns1 slipstream_ns_hostname=ns1"
#
# Change hostname (rotate):
#   ansible-playbook -i hosts example-playbook.yml \
#     --extra-vars "operation_mode=change environment_mode=prod" \
#     --extra-vars "change_target_domain=example.app"
#
# Migrate server:
#   ansible-playbook -i hosts example-playbook.yml \
#     --extra-vars "operation_mode=migrate environment_mode=prod" \
#     --extra-vars "source_hostname=outline1-ams source_kv_hostname=apple-banana-cherry" \
#     --extra-vars "destination_hostname=outline2-fra destination_kv_hostname=dog-elephant-fox"
#
# Force rebuild slipstream binary:
#   ansible-playbook -i hosts example-playbook.yml \
#     --extra-vars "operation_mode=update environment_mode=prod" \
#     --extra-vars "slipstream_enabled=true force_rebuild_slipstream=true" \
#     --extra-vars "slipstream_base_domain=your-dns.com slipstream_subdomain=dns1 slipstream_ns_hostname=ns1"

###############################################################################
# DEPLOY MODE: Outline + WSS via Fastly CDN (shared domain)
###############################################################################
# Fastest setup: uses *.global.ssl.fastly.net — no external DNS or TLS needed
# for the WSS domain. Fastly handles TLS automatically.
#
# Client connects to: wss://fs-{random-words}.global.ssl.fastly.net/tcp
- name: "Deploy: Outline + WSS via Fastly CDN (shared domain)"
  hosts: fastly_shared_servers
  remote_user: root
  vars:
    operation_mode: deploy
    deploy_target_domain: "example.com"

    # Outline + WebSocket configuration
    outline_enabled: true
    outline_wss_enabled: true

    domain_providers:
      example.com:
        dns_provider: cloudflare            # DNS for origin hostname (Caddy TLS)
        cdn_provider: fastly                # CDN/WSS fronting via Fastly
        zone_id: "your-cloudflare-zone-id"
        fastly_domain_mode: shared          # Use *.global.ssl.fastly.net

    # Fastly API configuration
    fastly_api_token: "your-fastly-api-token"
    fastly_service_name_prefix: "fs"        # Results in fs-{hostname}.global.ssl.fastly.net

    # Cloudflare for DNS (origin A/AAAA records)
    cloudflare_api_endpoint: "https://api.cloudflare.com/client/v4"
    cloudflare_api_token: "your-cloudflare-api-token"
    cloudflare_account_id: "your-account-id"

    # FreeSocks Control Plane registration.
    # websocketDomain is registered as the Fastly edge domain when fronted.
    fcp_enabled: true
    fcp_api_url: "https://fcp.example.org"
    fcp_api_token: "your-fcp-fsv1-token"   # vault me — fsv1_ service token

    envoy_mappings:
      fastly-shared-1:
        ipv4: ["1.2.3.4"]
        ipv6: ["2001:db8::1"]

  roles:
    - ansible-role-freesocks

###############################################################################
# DEPLOY MODE: Remnawave node + WS transport via Fastly
###############################################################################
# Remnawave (Xray-core) node fronted by Fastly, with a standalone Caddy on the
# host terminating TLS and path-routing the WebSocket transport to the panel's
# loopback Xray inbound. The role registers the node on the panel AND creates
# one Remnawave Host per enabled CDN transport (so issued keys reach
# subscriptions). XHTTP ships disabled — leave it off until the Phase C PoC.
#
# Phase 0 prerequisite (one-time, MANUAL in the panel): add a raw-Xray WS
# inbound to the Config Profile (tag VLESS_WS_CDN, listen 127.0.0.1:8443,
# network ws, security none, wsSettings.path /ws), then copy its UUID from
# GET /api/config-profiles/inbounds into remnawave_cdn_transports[0].inbound_uuid.
- name: "Deploy: Remnawave node + WS transport via Fastly"
  hosts: fastly_remnawave_servers
  remote_user: root
  vars:
    operation_mode: deploy
    deploy_target_domain: "example.com"

    # Remnawave instead of Outline (mutually exclusive)
    outline_enabled: false
    remnawave_enabled: true

    # Standalone Caddy on the host (required for Fastly fronting)
    remnawave_caddy_enabled: true
    remnawave_caddy_email: "admin@example.com"

    # Panel connection + API (register_node needs the API token)
    remnawave_panel_url: "https://panel.example.com"
    remnawave_panel_api_token: "your-remnawave-panel-token"        # vault me
    remnawave_panel_register_node: true
    remnawave_panel_config_profile_uuid: "your-config-profile-uuid"
    remnawave_panel_country_code: "US"
    # SECRET_KEY: paste the panel-generated value into vault (default source)
    remnawave_panel_secret_key: "your-panel-secret-key"            # vault me

    # CDN transports: fill the WS inbound UUID (from Phase 0). The `path` is
    # panel-global (must equal the inbound's wsSettings.path). XHTTP stays off.
    remnawave_cdn_transports:
      - name: ws
        network: ws
        path: "/ws"
        internal_port: 8443
        inbound_uuid: "your-ws-inbound-uuid"   # configProfileInboundUuid
        alpn: "http/1.1"
        fingerprint: chrome
        enabled: true
      - name: xhttp
        network: xhttp
        path: "/xh"
        internal_port: 8444
        inbound_uuid: ""
        mode: "packet-up"
        alpn: "h2,http/1.1"
        fingerprint: chrome
        enabled: false                          # Phase C gate — keep disabled

    domain_providers:
      example.com:
        dns_provider: cloudflare            # DNS for origin hostname (Caddy TLS)
        cdn_provider: fastly                # CDN fronting via Fastly
        zone_id: "your-cloudflare-zone-id"
        fastly_domain_mode: shared          # Use *.global.ssl.fastly.net

    # Fastly API configuration
    fastly_api_token: "your-fastly-api-token"
    fastly_service_name_prefix: "fs"

    # Cloudflare for DNS (origin A/AAAA records)
    cloudflare_api_endpoint: "https://api.cloudflare.com/client/v4"
    cloudflare_api_token: "your-cloudflare-api-token"
    cloudflare_account_id: "your-account-id"

    # FreeSocks Control Plane: for Remnawave, FCP stores the PANEL (not nodes).
    # Opt in to registering the panel record with fcp_register_remnawave_panel.
    fcp_enabled: true
    fcp_api_url: "https://fcp.example.org"
    fcp_api_token: "your-fcp-fsv1-token"   # vault me — fsv1_ service token
    fcp_register_remnawave_panel: true

    envoy_mappings:
      fastly-remnawave-1:
        ipv4: ["1.2.3.4"]
        ipv6: ["2001:db8::1"]

  roles:
    - ansible-role-freesocks

###############################################################################
# DEPLOY MODE: Outline + WSS via Fastly CDN (custom domain)
###############################################################################
# Uses your own domain with Fastly TLS subscription (Let's Encrypt).
# Requires DNS provider for ACME validation + CNAME to Fastly edge.
# Takes 2-5 minutes longer due to TLS certificate issuance.
#
# Client connects to: wss://{random-words}.example.app/tcp
- name: "Deploy: Outline + WSS via Fastly CDN (custom domain)"
  hosts: fastly_custom_servers
  remote_user: root
  vars:
    operation_mode: deploy
    deploy_target_domain: "example.app"

    # Outline + WebSocket configuration
    outline_enabled: true
    outline_wss_enabled: true

    domain_providers:
      example.app:
        dns_provider: cloudflare            # DNS under Cloudflare for ACME + CNAME
        cdn_provider: fastly                # CDN/WSS fronting via Fastly
        zone_id: "your-cloudflare-zone-id-for-app"
        fastly_domain_mode: custom          # Use your own domain with Fastly TLS

    # Fastly API configuration
    fastly_api_token: "your-fastly-api-token"

    # Cloudflare for DNS (origin records + ACME/CNAME for custom domain)
    cloudflare_api_endpoint: "https://api.cloudflare.com/client/v4"
    cloudflare_api_token: "your-cloudflare-api-token"
    cloudflare_account_id: "your-account-id"

    # FreeSocks Control Plane registration
    fcp_enabled: true
    fcp_api_url: "https://fcp.example.org"
    fcp_api_token: "your-fcp-fsv1-token"   # vault me — fsv1_ service token

    envoy_mappings:
      fastly-custom-1:
        ipv4: ["5.6.7.8"]
        ipv6: ["2001:db8::2"]

  roles:
    - ansible-role-freesocks

###############################################################################
# CHANGE MODE: Rotate hostname with Fastly CDN
###############################################################################
# Rotates the hostname for a Fastly-fronted server. Handles:
# 1. Old Fastly service cleanup
# 2. New Fastly service creation + WebSocket enablement
# 3. DNS updates (shared: none needed, custom: new CNAME + TLS)
# 4. FCP registration update with new Fastly domain
- name: "Change: Rotate hostname with Fastly CDN"
  hosts: fastly_shared_servers
  remote_user: root
  vars:
    operation_mode: change
    change_target_domain: "example.com"

    outline_wss_enabled: true

    domain_providers:
      example.com:
        dns_provider: cloudflare
        cdn_provider: fastly
        zone_id: "your-cloudflare-zone-id"
        fastly_domain_mode: shared

    fastly_api_token: "your-fastly-api-token"
    fastly_service_name_prefix: "fs"

    cloudflare_api_endpoint: "https://api.cloudflare.com/client/v4"
    cloudflare_api_token: "your-cloudflare-api-token"
    cloudflare_account_id: "your-account-id"

    # FreeSocks Control Plane registration (PATCH the new Fastly domain into FCP)
    fcp_enabled: true
    fcp_api_url: "https://fcp.example.org"
    fcp_api_token: "your-fcp-fsv1-token"   # vault me — fsv1_ service token

  roles:
    - ansible-role-freesocks

# =============================================================================
# QUICK REFERENCE: Fastly CDN commands
