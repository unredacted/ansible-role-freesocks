- name: "Update: Add slipstream to existing server"
  hosts: existing_servers
  remote_user: root
  vars:
    operation_mode: update

    # Component to add
    slipstream_enabled: true
    slipstream_mode: shadowsocks
    slipstream_base_domain: "your-dns.com"
    slipstream_subdomain: "dns1"
    slipstream_ns_hostname: "ns1"

    # Optional: Force rebuild even if binary exists
    # force_rebuild_slipstream: true

    domain_providers:
      example.com:
        dns_provider: cloudflare
        zone_id: "your-zone-id-for-com"
      your-dns.com:
        dns_provider: cloudflare
        zone_id: "your-zone-id-for-dns"

    cloudflare_api_endpoint: "https://api.cloudflare.com/client/v4"
    cloudflare_api_token: "your-api-token"
    cloudflare_account_id: "your-account-id"

    # FreeSocks Control Plane registration (re-syncs the server record in FCP)
    fcp_enabled: true
    fcp_api_url: "https://fcp.example.org"
    fcp_api_token: "your-fcp-fsv1-token"   # vault me — fsv1_ service token

