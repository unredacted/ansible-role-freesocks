# defaults/main.yml - Default variables for the role

# Operation mode: 'deploy', 'migrate', 'change', or 'update'
# - deploy: Install server with selected components (outline, slipstream, etc.)
# - migrate: Migrate server and its components from source to destination host
# - change: Rotate hostname on existing server (for DNS blocking bypass)
# - update: Add components (slipstream, WSS) to an existing server
# operation_mode: deploy

# ============================================================================
# Component Selection (Deploy Mode)
# ============================================================================
# Deploy mode installs combinations of components based on these flags.
# outline_enabled and remnawave_enabled are mutually exclusive — a host runs
# one VPN backend or the other, not both.
#
# Outline (Shadowsocks proxy):
outline_enabled: true # Default: deploy Outline SS server

# Remnawave Node (Xray-core, panel-driven; see Remnawave section below):
# remnawave_enabled: false  # Mutually exclusive with outline_enabled

# slipstream DNS tunnel (see slipstream section below):
# slipstream_enabled: false  # Disabled by default, enable in playbook
# slipstream_mode: "shadowsocks"  # or "raw" for standalone SOCKS5 proxy
#
# Example deployment combinations:
#   1. Outline only: outline_enabled=true, slipstream_enabled=false (default)
#   2. Outline + slipstream: outline_enabled=true, slipstream_enabled=true, slipstream_mode=shadowsocks
#   3. slipstream only (raw): outline_enabled=false, slipstream_enabled=true, slipstream_mode=raw
#   4. Both transports: outline_enabled=true, slipstream_enabled=true, slipstream_mode=raw
#      (slipstream provides standalone proxy, Outline provides SS)
#   5. Remnawave only: outline_enabled=false, remnawave_enabled=true
#   6. Remnawave + slipstream (raw): outline_enabled=false, remnawave_enabled=true,
#      slipstream_enabled=true, slipstream_mode=raw  (shadowsocks mode requires Outline)

# ============================================================================
# Force Reinstall Options (Update and Deploy modes)
# ============================================================================
# Force reinstall of components even if already detected as installed.
# Useful for:
#   - Recovery from partial installations (e.g., slipstream binary installed but its DNS/config incomplete)
#   - Updating component configuration after changes
#   - Regenerating certificates/configs
#
# Usage: --extra-vars "force_reinstall_slipstream=true"
force_reinstall_slipstream: false
# Force rebuild of slipstream-server binary from source (even if already installed)
# Useful for updating to a new version with bug fixes (e.g., increased max connections)
# Usage: --extra-vars "force_rebuild_slipstream=true"
force_rebuild_slipstream: false
force_reinstall_wss: false

# Remnawave force flags:
# - force_reinstall_remnawave: re-pull image, re-template compose, recreate container.
#   Preserves /opt/remnanode/.node_uuid and the SECRET_KEY in the existing compose file.
# - force_wipe_remnawave: destructive — removes /opt/remnanode entirely and (when uuid is
#   known) calls DELETE /api/nodes/{uuid} on the panel. Use only to fully decommission a node.
force_reinstall_remnawave: false
force_wipe_remnawave: false

# Change mode settings
# REQUIRED for change mode:
#   change_target_domain: The domain to generate a new hostname for (must exist in domain_providers)
#
# Deploy mode settings
# REQUIRED for deploy mode:
#   deploy_target_domain: The domain to deploy the new server to (must exist in domain_providers)
#
# Domain-to-Provider Mapping (required for change/deploy modes)
# Maps each domain to its DNS (and optional CDN) provider configuration.
# This enables hostname rotation across domains with different providers.
#
# Example:
# domain_providers:
#   example.com:
#     dns_provider: cloudflare
#     zone_id: "your-cloudflare-zone-id"
#   example.app:
#     dns_provider: cloudflare
#     cdn_provider: fastly
#     fastly_domain_mode: shared
#     zone_id: "another-zone-id"
domain_providers: {}

# Whether to delete old DNS records after hostname change
change_delete_old_dns: true

# DNS Proxy Settings
# Enable CDN proxy for DNS records (Cloudflare orange cloud, Fastly shield, etc.)
# When true, traffic is proxied through the CDN; when false, DNS-only mode
dns_proxied: false

# Custom hostname override (optional)
# If set, this hostname will be used instead of generating a random 3-word hostname
# Can be used in deploy mode and change mode
# Example: custom_hostname: "my-custom-server"
# custom_hostname:

# Number of words in randomly generated hostnames (default: 3)
# Examples: 2 = "apple-banana", 3 = "apple-banana-cherry", 4 = "apple-banana-cherry-dog"
hostname_word_count: 3

# Outline server ports
outline_api_port: 8443
outline_keys_port: 443

# WebSocket (WSS) Support Configuration
# Enable SS over WSS for improved censorship resistance
# When enabled, Caddy will handle HTTPS on port 443 and proxy WebSocket traffic
outline_wss_enabled: false

# Caddy Web Server Configuration (used when outline_wss_enabled is true)
# Auto HTTPS uses ACME to obtain certificates automatically
outline_caddy_auto_https: true
outline_caddy_email: "" # Required for auto HTTPS (ACME registration)
outline_caddy_domain: "" # Defaults to dns_hostname if not set

# WebSocket Listener Paths
# Random paths are enabled by default for improved censorship resistance
# Uses dictionary words (like hostnames) for natural-looking URLs
outline_wss_random_paths: true
outline_wss_random_path_min_words: 3 # Minimum number of words in path
outline_wss_random_path_max_words: 5 # Maximum number of words (random in range)

# Custom paths (used when outline_wss_random_paths is false)
outline_wss_tcp_path: "/tcp"
outline_wss_udp_path: "/udp"
outline_wss_server_port: 8080 # Internal WebSocket server port (proxied by Caddy)

# API Proxy Configuration
# When set, Caddy will reverse proxy the management API with valid TLS certificates
# This enables access from platforms that reject self-signed certs (e.g., Cloudflare Workers)
outline_api_proxy_path: "/api" # Path prefix for API (e.g., "/api" -> https://domain/api/...)

# API and Prometheus Hostname Suffixes
# When using Caddy proxy, these can be empty (everything goes through port 443)
# Set to "-api" or "-prom" for separate subdomains (legacy behavior)
api_hostname_suffix: "" # e.g., "" for same domain, "-api" for api subdomain
prom_hostname_suffix: "" # e.g., "" for same domain, "-prom" for prom subdomain

# Custom Docker image for Shadowbox (optional)
# If set, this image will be used instead of the default
# Example: custom_docker_image_shadowbox: "ghcr.io/unredacted/outline/shadowbox:latest"
# custom_docker_image_shadowbox:

# Optional hostname extension appended to server names
hostname_extension: ""

# Envoy server mappings
# Maps hostnames to their IPv4 and IPv6 addresses
# Example structure:
# envoy_mappings:
#   outline1-jfk:  # Outline server hostname
#     ipv4:
#       - 1.2.3.4
#       - 5.6.7.8
#     ipv6:
#       - 2001:db8::1
#       - 2001:db8::2
#   outline2-rmo:
#     ipv4:
#       - 9.10.11.12
#     ipv6:
#       - 2001:db8::3

# Environment mode: 'prod' or 'dev'
# Required by the role's mode validation and set explicitly via --extra-vars. It
# no longer selects KV namespaces (KV was removed in the FCP migration), so today
# it is effectively cosmetic — keep passing 'prod' for live deployments.
# environment_mode: prod

# Provider Configuration

# dns_provider: 'cloudflare'
#   - cloudflare: Manage DNS via Cloudflare API
#   Future: fastly, route53, etc.

# Cloudflare API base URL. A stable public endpoint, defaulted so a fresh deploy
# does NOT need to set it (override only for a Cloudflare API gateway/mirror).
cloudflare_api_endpoint: "https://api.cloudflare.com/client/v4"

# Secrets you MUST provide (vault-encrypted) when dns_provider is cloudflare:
#   cloudflare_api_token  - a scoped API Token (NOT the Global API Key) with
#                           Zone:DNS:Edit on the target zone(s). A deploy-mode
#                           preflight asserts this is set.
#   cloudflare_account_id - only needed by Fastly TLS (custom domain mode).
# Per-zone IDs are NOT a global var: they come from
# domain_providers[<domain>].zone_id. base_domain/api_domain/prom_domain are
# derived from domain_providers in deploy mode (no need to set them by hand).

envoy_mappings: {} # Define your envoy mappings as shown in the example above

# ============================================================================
# FreeSocks Control Plane (FCP) Registration
# ============================================================================
# FCP (the control plane) stores each server's management credential and dials
# out to it. The role registers servers with FCP's admin API via a single
# idempotent PUT /api/v1/admin/backend-servers/by-slug/{slug}, using an fsv1_
# service token that holds admin:servers:write (plus admin:servers:read for the
# optional post-register test-connection probe — see fcp_verify_connectivity).
# Mint the token headlessly on the FCP host with:
#   bunx convex run adminApi:mintAutomationToken \
#     '{"scopes":["admin:servers:read","admin:servers:write"]}'
#
#   - Outline: each server is one backendServers row — apiUrl is the
#     Caddy-proxied management URL (valid TLS; FCP requires it), plus
#     websocketEnabled / websocketDomain.
#   - Remnawave: FCP stores only the PANEL (baseUrl + apiToken), not nodes.
#     Per-node config reaches users via the panel (register_node + Hosts).
#     Registering an additional panel is opt-in via fcp_register_remnawave_panel.
fcp_enabled: false                  # master switch for control-plane registration
fcp_api_url: ""                     # e.g. https://control-plane.example.org
fcp_api_token: ""                   # vault: fsv1_ token: admin:servers:read + admin:servers:write
fcp_server_name: "{{ random_hostname | default('') }}"   # human-friendly name in FCP
fcp_server_slug: "{{ random_hostname | default('') }}"   # unique, immutable key in FCP
fcp_register_remnawave_panel: false # register the Remnawave panel as a backendServers row
fcp_remnawave_panel_slug: "remnawave-primary"
fcp_verify_connectivity: true       # after registering, assert FCP can reach the backend (needs admin:servers:read)
# The connectivity probe polls until FCP can reach the just-registered origin,
# waiting out fresh-deploy DNS propagation + Caddy's first Let's Encrypt cert
# (retries * delay = max wait; default ~3 min).
fcp_verify_retries: 18
fcp_verify_delay: 10
# Declarative squad->tier binding (opt-in). FCP issues a member's key into the
# Remnawave squad named on their tier; this binds it without the manual CMS copy.
# Requires the fsv1_ token to ALSO hold admin:tiers:write (wider than servers:*) —
# mint it with that extra scope when enabling. The squad UUID comes from the
# panel (Phase-0 provisioning); set it in vault/host_vars, not here.
fcp_bind_squad: false               # bind remnawave_squad_uuid -> fcp_squad_tier_slug (deploy mode only)
fcp_squad_tier_slug: "member"       # the FCP tier slug to bind the squad to
# remnawave_squad_uuid: ""          # the Remnawave internal-squad UUID (vault/host_vars)

# Additional required variables for migration mode:
# source_hostname: "outline1-jfk"      # Hostname of the source server
# destination_hostname: "outline2-rmo"  # Hostname of the destination server

# ============================================================================
# Remnawave Node Configuration
# ============================================================================
# Remnawave Node is a Docker container (remnawave/node) running Xray-core.
# All proxy/user configuration is pushed by an external Remnawave Panel over
# the NODE_PORT API; this role only deploys the node container and surrounding
# infrastructure (DNS, optional Caddy/Fastly fronting, FCP registration).
#
# SECRET_KEY semantics: SECRET_KEY is panel-wide, not per-node. The same value
# is used by every node attached to a given panel. It can be obtained by:
#   - Copying the docker-compose.yml the Panel UI generates when adding a node, or
#   - Calling GET /api/keygen on the panel (returns the same payload).

# Component flag (mutually exclusive with outline_enabled)
remnawave_enabled: false

# Image and runtime
# Pin to a specific tag for reproducible deploys; override via --extra-vars
# remnawave_node_image=remnawave/node:2.7.0 or similar.
remnawave_node_image: "remnawave/node:2.7.0"
remnawave_node_port: 2222 # Panel → Node API
remnawave_xtls_api_port: 61000 # Internal Xray API (container-local; reserved, currently unused)
remnawave_node_install_dir: "/opt/remnanode"
remnawave_log_dir: "/var/log/remnanode"

# Panel connection (REQUIRED when remnawave_enabled=true)
# remnawave_panel_url: "https://panel.example.com"
remnawave_panel_url: ""

# SECRET_KEY source: where to obtain the panel-wide key.
#   - "vault":     read from remnawave_panel_secret_key (vault-encrypted)
#   - "panel_api": call GET {{ remnawave_panel_url }}/api/keygen using
#                  remnawave_panel_api_token to fetch the key at deploy time
remnawave_secret_key_source: "vault"
remnawave_panel_secret_key: "" # vault-encrypted; required when source=vault

# Panel API token — required when secret_key_source=panel_api OR
# register_node=true (authenticates to the Panel API for keygen/register/
# update/delete). Whether the API is used is driven by those two flags
# directly; there is no separate "enabled" toggle.
remnawave_panel_api_token: "" # vault-encrypted; created via Panel UI → Tokens

# Node registration with the Panel (independent of secret_key_source)
# When true, the role calls POST /api/nodes to create the node entry, captures
# the resulting UUID, and persists it to /opt/remnanode/.node_uuid for use by
# update/change/migrate modes (PATCH /api/nodes, DELETE /api/nodes/{uuid}).
# When false, the user must create the node entry in the Panel UI manually.
remnawave_panel_register_node: false
remnawave_panel_config_profile_uuid: "" # REQUIRED when register_node=true
remnawave_panel_active_inbounds: [] # REQUIRED when register_node=true
remnawave_panel_country_code: "XX" # 2-letter ISO; panel default is "XX"

# TLS via standalone Caddy (opt-in)
# Required when fronting through Fastly (Fastly origin needs a valid public cert
# at the node) or when serving VLESS-TLS / Trojan-TLS. Reality transports do not
# need this — Reality bypasses public TLS at the node.
#
# When enabled, Caddy runs as a host-level systemd service that:
#   1. Listens on remnawave_caddy_listen_port for ACME challenges + TLS termination
#   2. Auto-issues a Let's Encrypt cert via HTTP-01
#   3. Reverse-proxies WebSocket traffic to the node's Xray inbound on
#      127.0.0.1:remnawave_caddy_xray_internal_port (plaintext WS)
#
# This means the panel-side Xray inbound must be configured to listen on the
# internal port with plaintext WS — coordinate panel config accordingly.
remnawave_caddy_enabled: false
remnawave_caddy_email: "" # Required when enabled (ACME registration)
remnawave_caddy_listen_port: 443 # Public TLS port
# DEPRECATED alias: the Caddyfile now path-routes per remnawave_cdn_transports.
# Kept so stale references resolve; equals the `ws` transport's internal_port.
remnawave_caddy_xray_internal_port: 8443

# ============================================================================
# Remnawave CDN transports (data-driven multi-transport Caddy + Fastly + Hosts)
# ============================================================================
# Each entry = one panel Xray inbound + one Caddy route + one Fastly VCL rule +
# one Remnawave Host. WS is the proven default; XHTTP is experimental and stays
# disabled until the manual PoC passes on a live node (see CLAUDE.md Phase C).
#
# The `path` is PANEL-GLOBAL: it must equal the inbound's wsSettings/xhttpSettings
# path in the shared Config Profile (every node on that inbound uses the same
# path — it is NOT per-node-random). `internal_port` must equal the inbound's
# listen port. `inbound_uuid` is the configProfileInboundUuid from
# GET /api/config-profiles/inbounds.
remnawave_cdn_transports:
  - name: ws
    network: ws
    path: "/ws"
    internal_port: 8443
    inbound_uuid: ""
    alpn: "http/1.1"
    fingerprint: chrome
    enabled: true
  - name: xhttp
    network: xhttp
    path: "/xh"
    internal_port: 8444
    inbound_uuid: ""
    mode: "packet-up"
    alpn: "h2,http/1.1"     # MUST-TEST in the Phase C PoC
    fingerprint: chrome
    enabled: false          # flip true ONLY after the Phase C PoC passes

# Decoy/camouflage site served by Caddy on every non-transport path.
remnawave_decoy_root: "/var/www/decoy"

# ============================================================================
# Remnawave Reality transport (VLESS+Vision+REALITY — direct, no Caddy/CDN)
# ============================================================================
# The fastest, best-against-active-probing transport, for OPEN networks (it
# mimics a real site's TLS). It does NOT traverse forced HTTP proxies / TLS
# inspection, so it is NOT the business/school choice — use the WS transport
# (via Caddy) there. Reality terminates TLS inside Xray (borrowing a real site's
# handshake), so Xray binds :443 directly: it is MUTUALLY EXCLUSIVE with
# remnawave_caddy_enabled and incompatible with Fastly. Reality keys
# (publicKey/shortIds/privateKey) live on the PANEL inbound (raw Xray config);
# the role only creates the Host.
#
# Phase 0 (Reality): add a Reality inbound to the Config Profile — vless,
# listen 0.0.0.0:443, security reality, realitySettings {dest, serverNames,
# privateKey, shortIds}, flow xtls-rprx-vision — generate the x25519 keypair
# (panel UI / GenerateX25519 endpoint / `xray x25519`), then record the inbound
# UUID + one serverName below.
remnawave_reality_enabled: false
remnawave_reality_inbound_uuid: ""   # configProfileInboundUuid of the Reality inbound
remnawave_reality_sni: ""            # a serverName from the inbound (the borrowed domain)
remnawave_reality_address: ""        # client-facing address; defaults to dns_hostname
remnawave_reality_port: 443
remnawave_reality_fingerprint: "chrome"

# ============================================================================
# slipstream DNS Tunnel Configuration
# ============================================================================
# Enable slipstream-rust DNS tunnel for extreme censorship resistance
# Traffic is tunneled through DNS queries via recursive resolvers
slipstream_enabled: false

# slipstream mode:
#   - "shadowsocks": Tunnel to local Shadowsocks server (default)
#                    - slipstream → outline-ss-server (outline_keys_port, default 443)
#                    - Client needs: slipstream-client + ss-local
#   - "raw": Direct TCP tunnel via SOCKS5 proxy
#            - slipstream → microsocks (SOCKS5) → internet
#            - Client only needs: slipstream-client (as SOCKS proxy)
slipstream_mode: "shadowsocks"

# Note: slipstream_domain is auto-generated from slipstream_base_domain + slipstream_subdomain
# e.g., slipstream_subdomain=dns1, slipstream_base_domain=your-dns.com → dns1.your-dns.com

# DNS resolvers for clients
# These should be public recursive resolvers accessible from censored regions
# Common options:
#   - Yandex DNS (Russia allowlist): 77.88.8.8:53, 77.88.8.1:53
#   - Google DNS: 8.8.8.8:53, 8.8.4.4:53
#   - Cloudflare DNS: 1.1.1.1:53, 1.0.0.1:53
#   - Local ISP resolvers (check if they forward recursively)
slipstream_resolver: "77.88.8.8:53"
slipstream_resolver_backup: "77.88.8.1:53"

# slipstream version/branch to build from
slipstream_version: "main"
slipstream_repo_url: "https://github.com/unredacted/slipstream-rust.git"

# DNS port for slipstream server (default: 53)
slipstream_dns_port: 53

# Log level for slipstream server (debug, info, warn, error)
slipstream_log_level: "info"

# Raw mode SOCKS5 proxy configuration
# When slipstream_mode is "raw", microsocks is installed and slipstream forwards to it
slipstream_socks_port: 1080 # Local SOCKS5 port (microsocks)

# ============================================================================
# slipstream DNS Record Configuration (REQUIRED when slipstream_enabled=true)
# ============================================================================
# These variables MUST be set via --extra-vars when enabling slipstream.
# No defaults are provided to force explicit configuration for each server.
#
# Example usage:
#   ansible-playbook playbook.yml \
#     --extra-vars "slipstream_enabled=true" \
#     --extra-vars "slipstream_base_domain=your-dns.com" \
#     --extra-vars "slipstream_subdomain=dns1 slipstream_ns_hostname=ns1"
#
# For multiple servers, use different subdomains:
#   Server 1: slipstream_subdomain=dns1 slipstream_ns_hostname=ns1
#   Server 2: slipstream_subdomain=dns2 slipstream_ns_hostname=ns2
#   Server 3: slipstream_subdomain=mail1 slipstream_ns_hostname=ns3

# slipstream_base_domain: ""      # REQUIRED - Base domain (must be in domain_providers)
# slipstream_subdomain: ""        # REQUIRED - Tunnel subdomain (dns1, mail1, etc.)
# slipstream_ns_hostname: ""      # REQUIRED - Nameserver hostname (ns1, ns2, etc.)

# Whether to automatically create DNS records (NS + A/AAAA for nameserver)
slipstream_create_dns_records: true

# ============================================================================
# Fastly CDN Configuration
# ============================================================================
# When cdn_provider is set to 'fastly' in domain_providers, Fastly is used
# for CDN/WSS fronting instead of Cloudflare proxy.
#
# Fastly provides WebSocket passthrough support, allowing Shadowsocks-over-WSS
# traffic to be fronted through Fastly's CDN network.
#
# Two domain modes are supported (set per-domain in domain_providers):
#   - "shared": Use {prefix}-{hostname}.global.ssl.fastly.net
#               No DNS/TLS setup needed — Fastly handles everything
#   - "custom": Use your own domain with Fastly TLS subscription
#               Requires DNS provider for ACME validation + CNAME to Fastly edge
#
# Example domain_providers configuration:
#
#   # Shared mode (simplest — no DNS changes for WSS domain)
#   example.com:
#     dns_provider: cloudflare
#     cdn_provider: fastly
#     zone_id: "your-zone-id"
#     fastly_domain_mode: shared
#
#   # Custom mode (your own domain, looks less like CDN)
#   example.app:
#     dns_provider: cloudflare
#     cdn_provider: fastly
#     zone_id: "your-zone-id"
#     fastly_domain_mode: custom

# Fastly API endpoint
fastly_api_endpoint: "https://api.fastly.com"

# Directory where the Fastly service ID is persisted on the server. Set at
# runtime to /opt/outline (Outline) or the Remnawave install dir (Remnawave);
# this default is the Outline location for backward compatibility.
fastly_service_id_dir: "/opt/outline"

# Global Fastly API token (can be overridden per-domain in domain_providers)
# Required when any domain uses cdn_provider: fastly
# fastly_api_token: ""

# Fastly service name prefix (for shared mode, random edge names)
# Used to construct {prefix}-{hostname}.global.ssl.fastly.net
# Keep short to avoid hitting domain length limits
fastly_service_name_prefix: "fs"

# Shared-mode edge hostname selection (EXPLICIT — set exactly one per fronted node):
#   fastly_edge_label: "cdn-content"  -> client edge cdn-content.global.ssl.fastly.net
#                                        (chosen, decoupled from the origin hostname;
#                                         also the Fastly service name, so re-deploying
#                                         the same label reuses its service idempotently)
#   fastly_edge_random: true          -> fs-<random-words>.global.ssl.fastly.net
# The role asserts exactly one is set (no silent default), so a node never gets an
# unintended random edge name. Fastly shared labels are globally unique first-come.
fastly_edge_label: ""
fastly_edge_random: false

# Fastly backend connection settings (optimized for WebSocket passthrough)
# connect_timeout: Time in ms to wait for a TCP connection to origin (default: 1000)
fastly_backend_connect_timeout: 5000
# first_byte_timeout: Time in ms to wait for the first byte from origin (default: 15000)
# Covers TLS handshake + WebSocket upgrade response
fastly_backend_first_byte_timeout: 30000

# Docker CE apt suite (codename). Empty -> the running distro's codename
# (ansible_distribution_release: bookworm on Debian 12, trixie on Debian 13, ...).
# Override to e.g. "bookworm" on a trixie host ONLY if Docker CE has not yet
# published a pool for the running codename.
remnawave_docker_apt_suite: ""

# ============================================================================
# Panel bootstrap (operation_mode=bootstrap) — one-time, panel-only, host-agnostic
# ============================================================================
# `operation_mode=bootstrap` creates the panel objects a working key needs and
# is IDEMPOTENT (GET-before-POST). It replaces the manual "Phase 0" panel setup:
#   1. x25519 keypair (Reality)                → gen_x25519.yml
#   2. a Config Profile + WS/XHTTP/Reality inbounds → create_config_profile.yml
#   3. a fronted squad (WS+XHTTP) + a Reality squad → create_squad.yml
#   4. bind those squads to FCP connection profiles → providers/fcp/bind_profiles.yml
# It touches NO host (delegate_to: localhost throughout). Run once per panel, e.g.:
#   ansible-playbook playbook.yml -e operation_mode=bootstrap \
#     -e remnawave_panel_url=https://panel.example.com -e fcp_enabled=true ...
# It PRINTS the created Config Profile / inbound UUIDs — copy them into your
# node-deploy vars (remnawave_panel_config_profile_uuid,
# remnawave_cdn_transports[].inbound_uuid, remnawave_reality_inbound_uuid).
#
# NOTE: the fsv1_ token used for bind_profiles must hold admin:settings:write
# (wider than the admin:servers:* the node-registration path needs); mint it with
# that scope when bootstrapping:
#   bunx convex run adminApi:mintAutomationToken \
#     '{"scopes":["admin:settings:write","admin:servers:read","admin:servers:write"]}'

# Master switch is operation_mode=bootstrap; these tune what it creates.
remnawave_bootstrap_config_profile_name: "FreeSocks-CDN"
remnawave_bootstrap_reality: true                     # also create the Reality inbound + squad
remnawave_bootstrap_fronted_squad_name: "FreeSocks-Fronted"
remnawave_bootstrap_reality_squad_name: "FreeSocks-Reality"
# Opt-in: path (localhost) to write the created config-profile + inbound UUIDs +
# a ready remnawave_cdn_transports list to, so node deploys need no manual paste.
# Empty = just print them. e.g. "vars/remnawave.generated.yml".
remnawave_bootstrap_output_file: ""

# Panel x25519 keypair endpoint (Reality). VERIFY on your panel /docs: v2.8 uses
# GET /api/system/tools/x25519/generate; the response is parsed tolerant of both
# a flat {privateKey,publicKey} and a {keypairs:[{privateKey,...}]} shape.
remnawave_x25519_endpoint: "/api/system/tools/x25519/generate"

# Reality inbound params (the borrowed-site TLS handshake it mimics). dest +
# serverNames must be a real, reachable TLS site; shortIds [""] = accept-all.
remnawave_bootstrap_reality_dest: "www.microsoft.com:443"
remnawave_bootstrap_reality_server_names: ["www.microsoft.com"]
remnawave_bootstrap_reality_short_ids: [""]
# Reality stream network: v2.8 renamed the raw-TCP carrier "tcp" -> "raw". VERIFY
# against your panel; flip to "tcp" on older panels.
remnawave_bootstrap_reality_network: "raw"

# The WS/XHTTP inbounds (raw Xray) the bootstrap POSTs into the Config Profile.
# tags MUST match what create_config_profile reads back + what create_squad binds
# (VLESS_WS_CDN / VLESS_XHTTP_CDN); ports/paths MUST match remnawave_cdn_transports.
remnawave_bootstrap_cdn_inbounds:
  - tag: "VLESS_WS_CDN"
    listen: "127.0.0.1"
    port: 8443
    protocol: "vless"
    settings: { clients: [], decryption: "none" }
    streamSettings:
      network: "ws"
      security: "none"
      wsSettings: { path: "/ws" }
    sniffing: { enabled: true, destOverride: ["http", "tls", "quic"] }
  - tag: "VLESS_XHTTP_CDN"
    listen: "127.0.0.1"
    port: 8444
    protocol: "vless"
    settings: { clients: [], decryption: "none" }
    streamSettings:
      network: "xhttp"
      security: "none"
      xhttpSettings:
        path: "/xh"
        mode: "packet-up"
        scMaxEachPostBytes: 1000000
        scMaxBufferedPosts: 30
        scMinPostsIntervalMs: 30
        xPaddingBytes: "100-1000"
    sniffing: { enabled: true, destOverride: ["http", "tls", "quic"] }

# FCP default connection profile bind_profiles sets ('evade' = Stay connected).
fcp_default_connection_profile: "evade"
