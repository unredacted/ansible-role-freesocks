---
# tasks/change/change.yml - Hostname rotation dispatcher
#
# Detects which VPN backend is installed on the host and dispatches to the
# matching change-mode task file:
#   - /opt/outline                                → outline_change.yml
#   - {{ remnawave_node_install_dir }}            → remnawave_change.yml
#
# The Outline path is the original change.yml content (~507 lines).
# The Remnawave path handles hostname rotation for panel-driven nodes
# (re-template compose only if needed; PATCH panel via update_node.yml when
# remnawave_panel_register_node=true).

- name: Detect Outline installation
  stat:
    path: /opt/outline
  register: change_outline_path

- name: Detect Remnawave installation
  stat:
    path: "{{ remnawave_node_install_dir }}/docker-compose.yml"
  register: change_remnawave_path

- name: Determine which backend is installed
  set_fact:
    change_component: >-
      {{ 'outline' if change_outline_path.stat.exists
         else ('remnawave' if change_remnawave_path.stat.exists
               else 'unknown') }}

- name: Fail if no backend detected
  fail:
    msg: |
      Cannot run change mode: neither /opt/outline nor {{ remnawave_node_install_dir }} exists on this host.
      Change mode requires an existing deployment to rotate. Use deploy mode for a fresh install.
  when: change_component == 'unknown'

- name: Debug detected backend
  debug:
    msg: "Change mode: detected {{ change_component }} on {{ inventory_hostname }}"

- name: Run Outline hostname rotation
  include_tasks: outline_change.yml
  when: change_component == 'outline'

- name: Run Remnawave hostname rotation
  include_tasks: remnawave_change.yml
  when: change_component == 'remnawave'
