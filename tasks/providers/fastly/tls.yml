---
# tasks/providers/fastly/tls.yml - Fastly TLS subscriptions (per edge domain)
#
# One TLS subscription PER EDGE DOMAIN (Fastly Let's Encrypt via ACME dns-01):
#   - fronting mode: one per fastly_fronting_domains entry, each in its own
#     zone (fastly_fronting_zones from origin_identity.yml). Independent
#     lifecycles — one failed challenge doesn't wedge the others.
#   - legacy custom mode: a single subscription for dns_hostname in
#     base_domain's zone.
#
# This is the DRIVER: it computes the per-domain jobs and loops
# tls_domain.yml (the engine). Produces:
#   fastly_cname_targets  map {domain: cname_target}  (dns.yml consumes it)
#   fastly_cname_target   the primary domain's target (legacy callers)
#
# Requires:
#   - fastly_token (set by service.yml)
#   - fastly_websocket_domain (set by service.yml)
#   - effective_dns_provider == 'cloudflare' (for ACME challenge DNS)

- name: Compute the TLS subscription jobs (one per edge domain)
  set_fact:
    _fastly_tls_jobs: >-
      {%- set jobs = [] -%}
      {%- for e in fastly_fronting_edges | default([]) -%}
        {%- set _ = jobs.append({'domain': e.fqdn, 'zone': e.zone}) -%}
      {%- endfor -%}
      {%- if jobs | length == 0 -%}
        {%- set _ = jobs.append({'domain': fastly_websocket_domain, 'zone': base_domain}) -%}
      {%- endif -%}
      {{ jobs }}

- name: Debug TLS jobs
  debug:
    msg: "TLS subscriptions to ensure: {{ _fastly_tls_jobs | map(attribute='domain') | join(', ') }}"

- name: Issue a TLS subscription per edge domain
  include_tasks: tls_domain.yml
  loop: "{{ _fastly_tls_jobs }}"
  loop_control:
    loop_var: _tls_job
    label: "{{ _tls_job.domain }}"

- name: Display TLS summary
  debug:
    msg: |
      Fastly TLS certificate(s) issued!

      {% for d, target in (fastly_cname_targets | default({})).items() %}
      {{ d }}  →  CNAME {{ target }}
      {% endfor %}
