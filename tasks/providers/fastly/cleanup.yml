---
# tasks/providers/fastly/cleanup.yml - Clean up Fastly service
#
# Deletes a Fastly service when rotating hostnames or migrating. Used during
# hostname changes to remove the old Fastly service (before or after creating
# the new one — the caller chooses the ordering).
#
# Reads the service ID from:
#   1. the caller (old_fastly_service_id fact, preferred), or
#   2. {{ fastly_service_id_dir }}/fastly_service_id (local file on server)
#
# Requires:
#   - fastly_token (set by caller)
#   - old_fastly_service_id (set by caller, or read from local file)

# ============================================================================
# Read Fastly service ID from server
# ============================================================================
- name: Check if Fastly service ID file exists
  stat:
    path: "{{ fastly_service_id_dir }}/fastly_service_id"
  register: fastly_service_id_file

- name: Read Fastly service ID from file
  slurp:
    src: "{{ fastly_service_id_dir }}/fastly_service_id"
  register: fastly_service_id_raw
  when: fastly_service_id_file.stat.exists

- name: Set old Fastly service ID from file
  set_fact:
    old_fastly_service_id: "{{ fastly_service_id_raw.content | b64decode | trim }}"
  when:
    - fastly_service_id_file.stat.exists
    - old_fastly_service_id is not defined

- name: Debug Fastly cleanup target
  debug:
    msg: "Cleaning up Fastly service: {{ old_fastly_service_id | default('none found') }}"

# ============================================================================
# Deactivate and delete old Fastly service
# ============================================================================
- name: Get active version of old Fastly service
  uri:
    url: "{{ fastly_api_endpoint }}/service/{{ old_fastly_service_id }}"
    method: GET
    headers:
      Fastly-Key: "{{ fastly_token }}"
      Accept: "application/json"
    status_code: [200, 404]
  delegate_to: localhost
  no_log: true  # carries the Fastly API token in the Fastly-Key header
  register: old_fastly_service_info
  when: old_fastly_service_id is defined and old_fastly_service_id != ''

- name: Find active version number
  set_fact:
    old_fastly_active_version: "{{ old_fastly_service_info.json.versions | selectattr('active', 'equalto', true) | map(attribute='number') | first | default('') }}"
  when:
    - old_fastly_service_info is defined
    - old_fastly_service_info.status == 200
    - old_fastly_service_info.json.versions is defined

- name: Deactivate old Fastly service version
  uri:
    url: "{{ fastly_api_endpoint }}/service/{{ old_fastly_service_id }}/version/{{ old_fastly_active_version }}/deactivate"
    method: PUT
    headers:
      Fastly-Key: "{{ fastly_token }}"
      Accept: "application/json"
    status_code: [200, 404]
  delegate_to: localhost
  no_log: true  # carries the Fastly API token in the Fastly-Key header
  when:
    - old_fastly_service_id is defined and old_fastly_service_id != ''
    - old_fastly_active_version is defined and old_fastly_active_version != ''

- name: Delete old Fastly service
  uri:
    url: "{{ fastly_api_endpoint }}/service/{{ old_fastly_service_id }}"
    method: DELETE
    headers:
      Fastly-Key: "{{ fastly_token }}"
      Accept: "application/json"
    status_code: [200, 404]
  delegate_to: localhost
  no_log: true  # carries the Fastly API token in the Fastly-Key header
  when: old_fastly_service_id is defined and old_fastly_service_id != ''

# ============================================================================
# Delete the TLS subscription for the OLD edge domain (legacy custom mode only)
# ============================================================================
# Caller sets fastly_cleanup_domain to the OLD edge FQDN (the retired hostname
# in legacy custom mode). Without this, every rotation orphans a subscription.
# Fronting domains FOLLOW the node through rotation (re-pointed, never
# deleted) — their subscriptions must survive, so this skips fronting mode.
- name: Look up TLS subscriptions for the old edge domain
  uri:
    url: "{{ fastly_api_endpoint }}/tls/subscriptions?filter[tls_domains.id]={{ fastly_cleanup_domain | urlencode }}"
    method: GET
    headers:
      Fastly-Key: "{{ fastly_token }}"
      Accept: "application/vnd.api+json"
    status_code: 200
  delegate_to: localhost
  no_log: true  # carries the Fastly API token in the Fastly-Key header
  register: _fastly_cleanup_tls
  when:
    - effective_fastly_domain_mode | default('shared') == 'custom'
    - fastly_fronting_edges | default([]) | length == 0
    - fastly_cleanup_domain | default('') | length > 0

- name: Delete TLS subscriptions for the old edge domain
  uri:
    url: "{{ fastly_api_endpoint }}/tls/subscriptions/{{ item.id }}"
    method: DELETE
    headers:
      Fastly-Key: "{{ fastly_token }}"
      Accept: "application/vnd.api+json"
    status_code: [200, 204, 404]
  delegate_to: localhost
  no_log: true  # carries the Fastly API token in the Fastly-Key header
  loop: "{{ _fastly_cleanup_tls.json.data | default([]) }}"
  loop_control:
    label: "{{ item.id }}"
  when:
    - effective_fastly_domain_mode | default('shared') == 'custom'
    - fastly_fronting_edges | default([]) | length == 0
    - fastly_cleanup_domain | default('') | length > 0

- name: Debug Fastly service deletion
  debug:
    msg: "Old Fastly service {{ old_fastly_service_id | default('N/A') }} deleted (or not found)"
  when: old_fastly_service_id is defined

# Only remove the id file when it still points at the service just deleted —
# after a create-before-delete rotation the file holds the NEW service's id.
- name: Remove old Fastly service ID file
  file:
    path: "{{ fastly_service_id_dir }}/fastly_service_id"
    state: absent
  become: yes
  when:
    - fastly_service_id_file.stat.exists
    - ((fastly_service_id_raw.content | default('') | b64decode | trim) == (old_fastly_service_id | default('')))
