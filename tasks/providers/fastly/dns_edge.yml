---
# tasks/providers/fastly/dns_edge.yml - ONE edge CNAME (idempotent, non-destructive)
#
# Looped by dns.yml with `_edge_job: {domain, zone, target, replace_records}`.
#
# Behavior:
#   * a CNAME to the right target already exists -> NO-OP. Rotations reuse the
#     TLS subscription, so the target is stable and the edge is never touched
#     (no deletion gap, no churn).
#   * a CNAME to a DIFFERENT target exists -> replace it (the subscription was
#     recreated and Fastly assigned a new target).
#   * A/AAAA records exist on the name -> FAIL, unless
#     `_edge_job.replace_records` is true (LEGACY custom mode only — those are
#     the role's own LE-bootstrap records, safe to remove). A fronting domain's
#     records are never auto-deleted: dedicating a name to the edge is the
#     operator's explicit choice.

- name: Set zone Cloudflare credentials for the edge CNAME ({{ _edge_job.zone }})
  set_fact:
    cf_token: "{{ domain_providers[_edge_job.zone].cloudflare_api_token | default(cloudflare_api_token) }}"

- name: Get existing records for the edge name ({{ _edge_job.domain }})
  uri:
    url: "{{ cloudflare_api_endpoint }}/zones/{{ domain_providers[_edge_job.zone].zone_id }}/dns_records?name={{ _edge_job.domain }}"
    method: GET
    headers:
      Content-Type: "application/json"
      Authorization: "Bearer {{ cf_token }}"
    status_code: 200
  delegate_to: localhost
  no_log: true  # carries the Cloudflare API token in the Authorization header
  register: _fastly_edge_existing

- name: Classify the existing records for {{ _edge_job.domain }}
  set_fact:
    _edge_cname_ok: "{{ _fastly_edge_existing.json.result | default([]) | selectattr('type', 'equalto', 'CNAME') | selectattr('content', 'equalto', _edge_job.target) | list }}"
    _edge_cname_stale: "{{ _fastly_edge_existing.json.result | default([]) | selectattr('type', 'equalto', 'CNAME') | rejectattr('content', 'equalto', _edge_job.target) | list }}"
    _edge_addr_records: "{{ _fastly_edge_existing.json.result | default([]) | selectattr('type', 'in', ['A', 'AAAA']) | list }}"

- name: Note the edge CNAME is already correct ({{ _edge_job.domain }})
  debug:
    msg: "{{ _edge_job.domain }} already CNAMEs to {{ _edge_job.target }} — leaving it untouched."
  when: _edge_cname_ok | length > 0

- name: Fail if the fronting name has real A/AAAA records (never auto-delete)
  fail:
    msg: >-
      '{{ _edge_job.domain }}' already has A/AAAA records
      ({{ _edge_addr_records | map(attribute='content') | join(', ') }}).
      A Fastly edge CNAME cannot coexist with them, and the role will not
      delete records it didn't create. Dedicate the name to the edge (remove
      those records yourself) or pick a different fronting domain — a per-node
      subdomain (e.g. node1.example.org) works too.
  when:
    - _edge_cname_ok | length == 0
    - _edge_addr_records | length > 0
    - not (_edge_job.replace_records | default(false) | bool)

- name: Delete stale CNAME(s) pointing at a different target ({{ _edge_job.domain }})
  uri:
    url: "{{ cloudflare_api_endpoint }}/zones/{{ domain_providers[_edge_job.zone].zone_id }}/dns_records/{{ item.id }}"
    method: DELETE
    headers:
      Content-Type: "application/json"
      Authorization: "Bearer {{ cf_token }}"
    status_code: [200, 404]
  delegate_to: localhost
  no_log: true  # carries the Cloudflare API token in the Authorization header
  loop: "{{ _edge_cname_stale }}"
  loop_control:
    label: "{{ item.name }} -> {{ item.content }}"
  when: _edge_cname_ok | length == 0

- name: Delete the role's LE-bootstrap A/AAAA records (legacy custom mode only)
  uri:
    url: "{{ cloudflare_api_endpoint }}/zones/{{ domain_providers[_edge_job.zone].zone_id }}/dns_records/{{ item.id }}"
    method: DELETE
    headers:
      Content-Type: "application/json"
      Authorization: "Bearer {{ cf_token }}"
    status_code: [200, 404]
  delegate_to: localhost
  no_log: true  # carries the Cloudflare API token in the Authorization header
  loop: "{{ _edge_addr_records }}"
  loop_control:
    label: "{{ item.name }} ({{ item.type }})"
  when:
    - _edge_cname_ok | length == 0
    - _edge_job.replace_records | default(false) | bool

- name: Create the edge CNAME ({{ _edge_job.domain }} -> {{ _edge_job.target }})
  uri:
    url: "{{ cloudflare_api_endpoint }}/zones/{{ domain_providers[_edge_job.zone].zone_id }}/dns_records"
    method: POST
    headers:
      Content-Type: "application/json"
      Authorization: "Bearer {{ cf_token }}"
    body_format: json
    body:
      type: CNAME
      name: "{{ _edge_job.domain }}"
      content: "{{ _edge_job.target }}"
      ttl: 1
      proxied: false
    status_code: [200, 201]
  delegate_to: localhost
  no_log: true  # carries the Cloudflare API token in the Authorization header
  when: _edge_cname_ok | length == 0
