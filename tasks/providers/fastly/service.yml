---
# tasks/providers/fastly/service.yml - Create and configure Fastly VCL service
#
# Creates a Fastly CDN service for WebSocket passthrough (CDN fronting).
# The service is ALWAYS named after the node hostname; the edge scheme
# decides which DOMAIN(S) attach:
#   - shared: <label>.global.ssl.fastly.net. The label is an EXPLICIT choice —
#     either operator-chosen (fastly_edge_label) or a random fs-<hostname>
#     (fastly_edge_random). Exactly one selector MUST be set (asserted); no
#     external DNS/TLS needed.
#   - custom (legacy same-domain): your own hostname (requires TLS
#     subscription + DNS CNAME in base_domain's zone)
#   - fronting edges (fastly_fronting_domains exact / fastly_fronting_zones
#     random subdomains): one or more decoupled edge domains (e.g.
#     video-streams.org or quiet-river.video-streams.org), each with its own
#     TLS subscription + edge CNAME in its own zone. Implies the custom flow;
#     primary = first entry of fastly_fronting_edges.
# The backend always dials the unguessable per-node origin FQDN
# (<hostname>-<suffix>.<base_domain>, from origin_identity.yml).
#
# Idempotent: looks the service up by name first (GET /service/search) and reuses
# it instead of POSTing a duplicate, so re-deploying a chosen stable edge name is
# safe (no 409, no orphaned service).
#
# Requires:
#   - fastly_api_token (global or per-domain in domain_providers)
#   - random_hostname (set by main.yml or dns.yml)
#   - fastly_origin_fqdn / fastly_origin_name (origin_identity.yml)

# ============================================================================
# Set Fastly credentials
# ============================================================================
- name: Set Fastly API credentials
  set_fact:
    fastly_token: "{{ domain_providers[base_domain].fastly_api_token | default(fastly_api_token) }}"
    # Fronting edges imply the custom flow (TLS subscription + edge CNAMEs);
    # origin_identity.yml computes fastly_fronting_edges before this file runs.
    fastly_domain_mode_effective: "{{ 'custom' if (fastly_fronting_edges | default([]) | length > 0) else (domain_providers[base_domain].fastly_domain_mode | default('shared')) }}"

- name: Fail if Fastly API token is not set
  fail:
    msg: |
      Fastly API token is required when cdn_provider is 'fastly'.
      Set fastly_api_token globally or per-domain in domain_providers.
  when: fastly_token is not defined or fastly_token == ''

# ============================================================================
# Determine domain name based on mode
# ============================================================================
# Shared mode: the client-facing edge label is an EXPLICIT choice — a chosen,
# memorable label (fastly_edge_label -> <label>.global.ssl.fastly.net, decoupled
# from the origin hostname so innocuous names dodge SNI-keyword blocks) OR an
# explicit opt-in to a random name (fastly_edge_random -> fs-<random_hostname>).
# No silent default, so a node can never get an unintended random edge name.
# Skipped entirely when fronting domains carry the edge instead.
- name: Validate the Fastly shared edge-name selection (exactly one of label / random)
  assert:
    that:
      - (fastly_edge_label | default('') | length > 0) or (fastly_edge_random | default(false) | bool)
      - not ((fastly_edge_label | default('') | length > 0) and (fastly_edge_random | default(false) | bool))
    fail_msg: >-
      Set exactly one of fastly_edge_label (e.g. "cdn-content" ->
      cdn-content.global.ssl.fastly.net) or fastly_edge_random=true
      (fs-<random>.global.ssl.fastly.net) for a shared-mode Fastly node.
  when:
    - fastly_domain_mode_effective == 'shared'
    - fastly_fronting_edges | default([]) | length == 0

# The service is ALWAYS named after the node hostname (ops-identifiable per
# node; the idempotency lookup below keys off it). Only the attached DOMAIN(S)
# differ by edge scheme.
- name: Set Fastly service + edge names (fronting edges — primary is first)
  set_fact:
    fastly_service_name: "{{ random_hostname }}"
    fastly_websocket_domain: "{{ (fastly_fronting_edges | first).fqdn }}"
  when: fastly_fronting_edges | default([]) | length > 0

- name: Set Fastly shared domain name (operator-chosen label)
  set_fact:
    fastly_service_name: "{{ random_hostname }}"
    fastly_websocket_domain: "{{ fastly_edge_label }}.global.ssl.fastly.net"
  when:
    - fastly_fronting_edges | default([]) | length == 0
    - fastly_domain_mode_effective == 'shared'
    - fastly_edge_label | default('') | length > 0

- name: Set Fastly shared domain name (random)
  set_fact:
    fastly_service_name: "{{ random_hostname }}"
    fastly_websocket_domain: "{{ fastly_service_name_prefix }}-{{ random_hostname }}.global.ssl.fastly.net"
  when:
    - fastly_fronting_edges | default([]) | length == 0
    - fastly_domain_mode_effective == 'shared'
    - not (fastly_edge_label | default('') | length > 0)
    - fastly_edge_random | default(false) | bool

- name: Set Fastly custom domain name (legacy same-domain)
  set_fact:
    fastly_service_name: "{{ random_hostname }}"
    fastly_websocket_domain: "{{ dns_hostname }}"
  when:
    - fastly_fronting_edges | default([]) | length == 0
    - fastly_domain_mode_effective == 'custom'

# The backend ALWAYS dials the per-node origin FQDN (an unguessable
# <hostname>-<suffix> name derived by origin_identity.yml). In legacy custom
# mode the client-facing dns_hostname CNAMEs to the edge, so the backend must
# dial the DISTINCT origin name or the edge would fetch from itself; in shared
# + fronting modes dns_hostname IS the origin FQDN, so SNI/override/cert
# (dns_hostname) align with the backend address. Legacy custom keeps
# SNI/override/cert on the clean dns_hostname (the Caddy cert's name).
- name: Set the Fastly origin backend address
  set_fact:
    fastly_origin_address: "{{ fastly_origin_fqdn }}"

- name: Debug Fastly configuration
  debug:
    msg:
      - "Fastly domain mode: {{ fastly_domain_mode_effective }}"
      - "Fastly service name: {{ fastly_service_name }}"
      - "Fastly WebSocket domain: {{ fastly_websocket_domain }}"
      - "Origin backend: {{ fastly_origin_address }}"

# ============================================================================
# Idempotency: reuse an existing service by name (get-or-create)
# ============================================================================
# A chosen stable edge name re-deployed must reuse its Fastly service, not
# collide or leak a duplicate. Search by name; if present, reuse its id + active
# version and SKIP the create/configure tasks below (the existing service is
# assumed already configured + activated). Runs in both domain modes. A random
# edge name changes each run, so it always creates (a new node each time).
- name: Look up an existing Fastly service by name
  uri:
    url: "{{ fastly_api_endpoint }}/service/search?name={{ fastly_service_name | urlencode }}"
    method: GET
    headers:
      Fastly-Key: "{{ fastly_token }}"
      Accept: "application/json"
    status_code: [200, 404]
  delegate_to: localhost
  no_log: true  # carries the Fastly API token in the Fastly-Key header
  register: fastly_service_lookup

# A found service is only safe to REUSE if it has an active version. A service
# that exists but was never activated is a half-built leftover from a failed run
# (e.g. an activation rejected for bad VCL) — reusing it would skip re-config and
# leave the edge dead. Check for an active version; self-heal by deleting a
# half-built one so it is recreated cleanly below. Deleting a service with no
# active version is safe by construction (it serves no traffic).
- name: Check whether the found Fastly service has an active version
  uri:
    url: "{{ fastly_api_endpoint }}/service/{{ fastly_service_lookup.json.id }}/version/active"
    method: GET
    headers:
      Fastly-Key: "{{ fastly_token }}"
      Accept: "application/json"
    # 200 = has an active version; 400 = "No active version for service ..."
    # (Fastly's signal for a never-activated service); 404 defensive. Anything
    # else (auth/server error) is a real failure and should NOT be tolerated.
    status_code: [200, 400, 404]
  delegate_to: localhost
  no_log: true  # carries the Fastly API token in the Fastly-Key header
  register: fastly_active_check
  when: fastly_service_lookup.status == 200

- name: Delete a half-built (never-activated) Fastly service so it is recreated cleanly
  uri:
    url: "{{ fastly_api_endpoint }}/service/{{ fastly_service_lookup.json.id }}"
    method: DELETE
    headers:
      Fastly-Key: "{{ fastly_token }}"
      Accept: "application/json"
    status_code: [200, 404]
  delegate_to: localhost
  no_log: true  # carries the Fastly API token in the Fastly-Key header
  when:
    - fastly_service_lookup.status == 200
    - (fastly_active_check.status | default(404)) != 200

- name: Reuse the existing (activated) Fastly service (id + active version)
  set_fact:
    fastly_service_exists: true
    fastly_service_id: "{{ fastly_service_lookup.json.id }}"
    fastly_version: "{{ fastly_active_check.json.number | default('(active)') }}"
  when:
    - fastly_service_lookup.status == 200
    - (fastly_active_check.status | default(404)) == 200

- name: Mark the Fastly service for creation (absent or half-built)
  set_fact:
    fastly_service_exists: false
  when: not (fastly_service_lookup.status == 200 and (fastly_active_check.status | default(404)) == 200)

- name: Note the reused Fastly service
  debug:
    msg: "Reusing existing Fastly service '{{ fastly_service_name }}' ({{ fastly_service_id }}); skipping create + configure."
  when: fastly_service_exists

# A reused service was configured by a previous run, but ensure the WebSocket
# products toggle is on anyway (idempotent) — an externally-created service may
# never have had it enabled, and the return(upgrade) VCL needs it.
- name: Ensure WebSocket passthrough on the reused Fastly service
  uri:
    url: "{{ fastly_api_endpoint }}/enabled-products/v1/websockets/services/{{ fastly_service_id }}"
    method: PUT
    headers:
      Fastly-Key: "{{ fastly_token }}"
      Accept: "application/json"
    status_code: [200, 201]
  delegate_to: localhost
  no_log: true  # carries the Fastly API token in the Fastly-Key header
  when: fastly_service_exists

# ============================================================================
# Create Fastly service  (only when it does not already exist)
# ============================================================================
- name: Create Fastly service
  uri:
    url: "{{ fastly_api_endpoint }}/service"
    method: POST
    headers:
      Fastly-Key: "{{ fastly_token }}"
      Content-Type: "application/x-www-form-urlencoded"
      Accept: "application/json"
    body_format: form-urlencoded
    body:
      name: "{{ fastly_service_name }}"
      type: "vcl"
    status_code: [200, 201]
  delegate_to: localhost
  no_log: true  # carries the Fastly API token in the Fastly-Key header
  register: fastly_service_result
  when: not fastly_service_exists

- name: Extract Fastly service ID and version
  set_fact:
    fastly_service_id: "{{ fastly_service_result.json.id }}"
    fastly_version: "{{ fastly_service_result.json.versions[0].number }}"
  when: not fastly_service_exists

- name: Debug Fastly service creation
  debug:
    msg:
      - "Fastly service ID: {{ fastly_service_id }}"
      - "Fastly version: {{ fastly_version }}"
  when: not fastly_service_exists

# ============================================================================
# Enable WebSocket passthrough via Products API
# ============================================================================
# MUST be enabled BEFORE adding the VCL snippet and activating the version,
# because the VCL uses return(upgrade) which requires WebSocket to be enabled.
# The toggle takes effect immediately across all service versions.
- name: Enable WebSocket passthrough on Fastly service
  uri:
    url: "{{ fastly_api_endpoint }}/enabled-products/v1/websockets/services/{{ fastly_service_id }}"
    method: PUT
    headers:
      Fastly-Key: "{{ fastly_token }}"
      Accept: "application/json"
    status_code: [200, 201]
  delegate_to: localhost
  no_log: true  # carries the Fastly API token in the Fastly-Key header
  register: fastly_websocket_result
  when: not fastly_service_exists

- name: Debug WebSocket enablement
  debug:
    msg: "WebSocket passthrough enabled on Fastly service {{ fastly_service_id }}"
  when: not fastly_service_exists

# ============================================================================
# Add domain(s) to service
# ============================================================================
# Fronting mode attaches EVERY fronting domain (clients fail over between
# them); shared/legacy-custom attach the single edge name.
- name: Compute the domains to attach to the service
  set_fact:
    _fastly_domains_to_attach: "{{ fastly_fronting_edges | default([]) | map(attribute='fqdn') | list if (fastly_fronting_edges | default([]) | length > 0) else [fastly_websocket_domain] }}"

- name: Add domain to Fastly service
  uri:
    url: "{{ fastly_api_endpoint }}/service/{{ fastly_service_id }}/version/{{ fastly_version }}/domain"
    method: POST
    headers:
      Fastly-Key: "{{ fastly_token }}"
      Content-Type: "application/x-www-form-urlencoded"
      Accept: "application/json"
    body_format: form-urlencoded
    body:
      name: "{{ item }}"
    status_code: [200, 201]
  delegate_to: localhost
  no_log: true  # carries the Fastly API token in the Fastly-Key header
  register: fastly_domain_result
  loop: "{{ _fastly_domains_to_attach }}"
  loop_control:
    label: "{{ item }}"
  when: not fastly_service_exists

- name: Debug Fastly domain addition
  debug:
    msg: "Domains {{ _fastly_domains_to_attach | join(', ') }} added to Fastly service"
  when: not fastly_service_exists

# ============================================================================
# Add backend (origin server)
# ============================================================================
# Optimized for WebSocket passthrough:
#   - TCP keepalives enabled to maintain long-lived connections
#   - connect/first_byte timeouts tuned for TLS + WebSocket upgrade handshake
#   - between_bytes_timeout is irrelevant (ignored for WebSocket connections)
#   - max_conn omitted (Fastly's default, 1000 — note 0 does NOT mean
#     unlimited in Fastly; omitting keeps the default)
#   - keepalive_time disabled (0) since WebSocket connections aren't pooled
# We always use a DNS name as the origin address (not raw IP) so that:
#   1. TLS SNI works correctly with Caddy's Let's Encrypt certificate
#      (SNI/override/cert host stay dns_hostname — the cert's name — while the
#      dial address is the origin name in custom mode)
#   2. Fastly can resolve the hostname to get the correct IP
- name: Add backend to Fastly service
  uri:
    url: "{{ fastly_api_endpoint }}/service/{{ fastly_service_id }}/version/{{ fastly_version }}/backend"
    method: POST
    headers:
      Fastly-Key: "{{ fastly_token }}"
      Content-Type: "application/x-www-form-urlencoded"
      Accept: "application/json"
    body_format: form-urlencoded
    body:
      name: "{{ fastly_origin_name }}"
      address: "{{ fastly_origin_address }}"
      port: "443"
      use_ssl: "true"
      override_host: "{{ dns_hostname }}"
      ssl_sni_hostname: "{{ dns_hostname }}"
      ssl_cert_hostname: "{{ dns_hostname }}"
      connect_timeout: "{{ fastly_backend_connect_timeout }}"
      first_byte_timeout: "{{ fastly_backend_first_byte_timeout }}"
      keepalive_time: "0"
      tcp_keepalive_enable: "true"
      tcp_keepalive_interval: "10"
      tcp_keepalive_probes: "3"
      tcp_keepalive_time: "300"
    status_code: [200, 201]
  delegate_to: localhost
  no_log: true  # carries the Fastly API token in the Fastly-Key header
  register: fastly_backend_result
  when: not fastly_service_exists

- name: Debug Fastly backend addition
  debug:
    msg: "Backend added: {{ fastly_origin_address }}:443 (connect_timeout={{ fastly_backend_connect_timeout }}ms, first_byte_timeout={{ fastly_backend_first_byte_timeout }}ms, tcp_keepalive=on)"
  when: not fastly_service_exists

# ============================================================================
# Add health check for origin (monitoring only)
# ============================================================================
# Creates an HTTPS health check for origin monitoring and troubleshooting.
# NOT linked to the backend — with a single origin and no failover, marking
# it unhealthy would 503 all traffic. The health check is still visible in
# the Fastly dashboard and API for observability.
# Fastly checks run from every POP.
- name: Create health check for origin
  uri:
    url: "{{ fastly_api_endpoint }}/service/{{ fastly_service_id }}/version/{{ fastly_version }}/healthcheck"
    method: POST
    headers:
      Fastly-Key: "{{ fastly_token }}"
      Content-Type: "application/x-www-form-urlencoded"
      Accept: "application/json"
    body_format: form-urlencoded
    body:
      name: "origin-health-{{ fastly_origin_name }}"
      host: "{{ fastly_origin_address }}"
      path: "/"
      method: "HEAD"
      http_version: "1.1"
      expected_response: "200"
      check_interval: "30000"
      timeout: "5000"
      window: "5"
      threshold: "3"
      initial: "3"
    status_code: [200, 201]
  delegate_to: localhost
  no_log: true  # carries the Fastly API token in the Fastly-Key header
  register: fastly_healthcheck_result
  when: not fastly_service_exists

- name: Debug health check addition
  debug:
    msg: "Health check 'origin-health-{{ random_hostname }}' created (monitoring only, not linked to backend)"
  when: not fastly_service_exists

# ============================================================================
# Add VCL snippet for WebSocket handoff
# ============================================================================
# Fastly requires a VCL snippet that returns (upgrade) when it sees the
# Upgrade header. This hands the connection off from VCL processing to
# Fastly's WebSocket relay. Must be added BEFORE activating the version.
# See: https://www.fastly.com/documentation/guides/concepts/real-time-messaging/websockets-tunnel/
- name: Add WebSocket VCL snippet to Fastly service
  uri:
    url: "{{ fastly_api_endpoint }}/service/{{ fastly_service_id }}/version/{{ fastly_version }}/snippet"
    method: POST
    headers:
      Fastly-Key: "{{ fastly_token }}"
      Content-Type: "application/x-www-form-urlencoded"
      Accept: "application/json"
    body_format: form-urlencoded
    body:
      name: "websocket_upgrade"
      type: "recv"
      priority: "10"
      dynamic: "0"
      content: "if (req.http.Upgrade) { return (upgrade); }"
    status_code: [200, 201]
  delegate_to: localhost
  no_log: true  # carries the Fastly API token in the Fastly-Key header
  register: fastly_vcl_snippet_result
  when: not fastly_service_exists

- name: Debug VCL snippet addition
  debug:
    msg: "WebSocket VCL snippet added to Fastly service"
  when: not fastly_service_exists

# (XHTTP VCL removed 2026-07-04: Fastly cannot relay XHTTP's long-lived streamed
# download — `beresp.do_stream` is a cache feature that forbids endless responses,
# confirmed unworkable by Fastly staff for the equivalent gRPC stream. WS uses the
# `return(upgrade)` snippet above and is the fronted transport.)

# ============================================================================
# Activate service version
# ============================================================================
- name: Activate Fastly service version
  uri:
    url: "{{ fastly_api_endpoint }}/service/{{ fastly_service_id }}/version/{{ fastly_version }}/activate"
    method: PUT
    headers:
      Fastly-Key: "{{ fastly_token }}"
      Accept: "application/json"
    status_code: 200
  delegate_to: localhost
  no_log: true  # carries the Fastly API token in the Fastly-Key header
  register: fastly_activate_result
  when: not fastly_service_exists

- name: Debug Fastly service activation
  debug:
    msg: "Fastly service version {{ fastly_version }} activated"
  when: not fastly_service_exists

# ============================================================================
# Store Fastly service ID locally and as facts
# ============================================================================
- name: Save Fastly service ID to server
  copy:
    content: "{{ fastly_service_id }}"
    dest: "{{ fastly_service_id_dir }}/fastly_service_id"
    mode: '0644'
  become: yes

# Persisted so change/migrate can delete the OLD origin DNS record on the next
# rotation (the suffix is random per rotation and not re-derivable).
- name: Save Fastly origin FQDN to server
  copy:
    content: "{{ fastly_origin_fqdn }}"
    dest: "{{ fastly_service_id_dir }}/fastly_origin_fqdn"
    mode: '0644'
  become: yes

# Persist the GENERATED edge FQDNs (one per line) — rotation generates fresh
# labels and cleanup_edges.yml removes these old ones (edge CNAME, TLS
# subscription, ACME record). Only generated edges are ephemeral; exact
# fastly_fronting_domains are operator-managed and never cleaned up.
- name: Save generated Fastly edge domains to server
  copy:
    content: "{{ (fastly_fronting_edges | default([]) | selectattr('generated') | map(attribute='fqdn') | list | join('\n')) ~ '\n' }}"
    dest: "{{ fastly_service_id_dir }}/fastly_edge_domains"
    mode: '0644'
  become: yes
  when: fastly_fronting_edges | default([]) | selectattr('generated') | list | length > 0

- name: Display Fastly service summary
  debug:
    msg: |
      Fastly CDN service ready ({{ 'reused existing' if fastly_service_exists else 'created' }}).

      Service ID: {{ fastly_service_id }}
      Service Name: {{ fastly_service_name }}
      Domain Mode: {{ fastly_domain_mode_effective }}
      Edge Domains: {{ _fastly_domains_to_attach | join(', ') }}
      Origin Backend: {{ fastly_origin_address }}:443
      WebSocket Passthrough: Enabled
      VCL Snippet: websocket_upgrade (return upgrade)

      {% if fastly_domain_mode_effective == 'shared' %}
      Clients connect to: wss://{{ fastly_websocket_domain }}
      No additional DNS or TLS configuration needed.
      {% else %}
      Clients connect to: wss://{{ fastly_websocket_domain }}{{ ' (+' ~ (_fastly_domains_to_attach | length - 1) ~ ' more)' if (_fastly_domains_to_attach | length > 1) else '' }}
      TLS subscription(s) and DNS CNAME(s) still needed (see tls.yml and dns.yml).
      {% endif %}
