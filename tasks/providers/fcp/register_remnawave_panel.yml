---
# tasks/providers/fcp/register_remnawave_panel.yml
#
# Register a Remnawave PANEL with FCP. FCP stores the panel's baseUrl + apiToken
# and dials the panel's API; it has NO concept of individual nodes — per-node
# config (transports/Hosts) reaches users through the panel's subscription
# output. So this registers the panel once, not each node.
#
# This is opt-in (fcp_register_remnawave_panel). Most deployments run a single
# panel that is seeded into FCP once via its REMNAWAVE_* env or the admin CMS;
# use this only to register an ADDITIONAL panel from the role. Idempotent by slug.

- name: Validate FCP panel-registration prerequisites
  assert:
    that:
      - fcp_api_url is defined and fcp_api_url | length > 0
      - fcp_api_token is defined and fcp_api_token | length > 0
      - fcp_remnawave_panel_slug is defined and fcp_remnawave_panel_slug | length > 0
      - remnawave_panel_url is defined and remnawave_panel_url | length > 0
      - remnawave_panel_api_token is defined and remnawave_panel_api_token | length > 0
    fail_msg: >-
      Registering a Remnawave panel with FCP requires fcp_api_url, fcp_api_token,
      fcp_remnawave_panel_slug, remnawave_panel_url, and remnawave_panel_api_token.
  no_log: true

# Idempotent upsert by slug — a single PUT, no GET-list/resolution. `slug` is in
# the URL path (authoritative); a blank apiToken on re-run keeps FCP's stored one.
- name: Build FCP panel body (Remnawave)
  set_fact:
    _fcp_panel_body:
      backend: "remnawave"
      name: "{{ fcp_remnawave_panel_slug }}"
      baseUrl: "{{ remnawave_panel_url }}"
      apiToken: "{{ remnawave_panel_api_token }}"
  no_log: true

# Optional capacity/ordering hints (see register_server.yml — same semantics).
- name: Add maxKeys / priority to FCP panel body (when set)
  set_fact:
    _fcp_panel_body: "{{ _fcp_panel_body | combine(_mk) | combine(_pr) }}"
  vars:
    _mk: "{{ ({'maxKeys': (none if ((fcp_max_keys | string) == 'null') else (fcp_max_keys | int))}) if ((fcp_max_keys | default('') | string) | length > 0) else {} }}"
    _pr: "{{ ({'priority': (fcp_priority | int)}) if ((fcp_priority | default('') | string) | length > 0) else {} }}"
  no_log: true
  when: (_mk | length > 0) or (_pr | length > 0)

- name: Upsert FCP panel (Remnawave, idempotent by slug)
  uri:
    url: "{{ fcp_api_url }}/api/v1/admin/backend-servers/by-slug/{{ fcp_remnawave_panel_slug | urlencode }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ fcp_api_token }}"
      Content-Type: "application/json"
      Accept: "application/json"
    body_format: json
    body: "{{ _fcp_panel_body }}"
    status_code: [200]
  delegate_to: localhost
  no_log: true
  register: fcp_panel_upsert

- name: Display FCP panel registration result
  debug:
    msg: >-
      FCP Remnawave panel '{{ fcp_remnawave_panel_slug }}'
      {{ 'created' if (fcp_panel_upsert.json.created | default(false)) else 'updated' }}
      at {{ fcp_api_url }} (panel {{ remnawave_panel_url }}).

- name: Verify FCP can reach the Remnawave panel
  when: fcp_verify_connectivity | default(true) | bool
  block:
    # FCP's test-connection validator omits `name`/`maxKeys`/`priority` (Convex
    # rejects undeclared fields), so reuse the panel body minus those.
    - name: Build the FCP panel test-connection body (drop the upsert-only fields)
      set_fact:
        _fcp_panel_testconn_body: "{{ _fcp_panel_body | dict2items | rejectattr('key', 'in', ['name', 'maxKeys', 'priority']) | items2dict }}"
    - name: Probe FCP -> panel connectivity (test-connection)
      uri:
        url: "{{ fcp_api_url }}/api/v1/admin/backend-servers/test-connection"
        method: POST
        headers:
          Authorization: "Bearer {{ fcp_api_token }}"
          Content-Type: "application/json"
          Accept: "application/json"
        body_format: json
        body: "{{ _fcp_panel_testconn_body }}"
        status_code: [200]
      delegate_to: localhost
      no_log: true
      register: fcp_panel_testconn
      # Bounded poll: test-connection returns 200 {ok:false} until the panel is
      # reachable, so wait it out rather than fail on the first attempt.
      retries: "{{ fcp_verify_retries | default(18) }}"
      delay: "{{ fcp_verify_delay | default(10) }}"
      until: fcp_panel_testconn.json.ok | default(false) | bool
    - name: Assert FCP reached the panel
      assert:
        that:
          - fcp_panel_testconn.json.ok | default(false) | bool
        fail_msg: >-
          FCP registered the Remnawave panel '{{ fcp_remnawave_panel_slug }}' but
          could NOT reach it ({{ remnawave_panel_url }}). Check the panel URL +
          API token. Set fcp_verify_connectivity=false to skip this gate.
        success_msg: "FCP reached the Remnawave panel OK."
