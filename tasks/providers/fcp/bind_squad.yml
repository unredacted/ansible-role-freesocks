---
# tasks/providers/fcp/bind_squad.yml
#
# Bind a Remnawave INTERNAL SQUAD to an FCP tier, declaratively. FCP issues a
# member's key into the squad named on their tier (tiers.remnawaveSquadUuid), so
# this is what wires "members of tier X land in squad Y" — replacing the manual
# copy of the squad UUID into the admin CMS. A single idempotent PUT to FCP's
# tier-by-slug upsert, which patches ONLY remnawaveSquadUuid (the tier's other
# entitlements are left untouched); re-runs are no-ops once the squad matches.
#
# Caller sets: fcp_squad_tier_slug (the tier to bind, e.g. "member") and
# remnawave_squad_uuid (the squad UUID from the panel). The fsv1_ token must
# ADDITIONALLY hold admin:tiers:write (wider than the servers:* the rest of the
# FCP integration needs) — mint it with that extra scope when fcp_bind_squad is
# on:  bunx convex run adminApi:mintAutomationToken \
#        '{"scopes":["admin:servers:read","admin:servers:write","admin:tiers:write"]}'

- name: Validate FCP squad-binding prerequisites
  assert:
    that:
      - fcp_api_url is defined and fcp_api_url | length > 0
      - fcp_api_token is defined and fcp_api_token | length > 0
      - fcp_squad_tier_slug is defined and fcp_squad_tier_slug | length > 0
      - remnawave_squad_uuid is defined and remnawave_squad_uuid | length > 0
    fail_msg: >-
      Binding a Remnawave squad to an FCP tier requires fcp_api_url, fcp_api_token
      (with admin:tiers:write), fcp_squad_tier_slug, and remnawave_squad_uuid.
  no_log: true

# The tier-by-slug upsert binds the squad to an already-seeded tier. If the tier
# is somehow absent it is created with safe defaults (an unlimited, active, NON
# default-free tier) + the squad — the result `created` flag surfaces that. The
# squad UUID is sensitive infra detail, so the request is no_log'd.
- name: Bind Remnawave squad to FCP tier (idempotent by slug)
  uri:
    url: "{{ fcp_api_url }}/api/v1/admin/tiers/by-slug/{{ fcp_squad_tier_slug | urlencode }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ fcp_api_token }}"
      Content-Type: "application/json"
      Accept: "application/json"
    body_format: json
    body:
      remnawaveSquadUuid: "{{ remnawave_squad_uuid }}"
    status_code: [200]
  delegate_to: localhost
  no_log: true
  register: fcp_squad_bind

- name: Note FCP squad-binding result
  debug:
    msg: >-
      Bound a Remnawave squad to FCP tier '{{ fcp_squad_tier_slug }}'
      ({{ 'tier created' if (fcp_squad_bind.json.created | default(false)) else 'tier updated' }}).
