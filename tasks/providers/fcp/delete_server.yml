---
# tasks/providers/fcp/delete_server.yml
#
# Delete a backendServers row from FCP by slug. Used by migrate to remove the
# stale SOURCE server row after the destination has been (re)registered under a
# new slug. A single idempotent DELETE .../by-slug/{slug}; FCP no-ops (returns
# deleted:false) when the slug is absent, so it is safe to re-run.
#
# Caller sets: fcp_delete_slug (the slug to remove).

- name: Validate FCP delete prerequisites
  assert:
    that:
      - fcp_api_url is defined and fcp_api_url | length > 0
      - fcp_api_token is defined and fcp_api_token | length > 0
      - fcp_delete_slug is defined and fcp_delete_slug | length > 0
    fail_msg: "FCP delete requires fcp_api_url, fcp_api_token, and fcp_delete_slug."

- name: Delete FCP backend server by slug
  uri:
    url: "{{ fcp_api_url }}/api/v1/admin/backend-servers/by-slug/{{ fcp_delete_slug | urlencode }}"
    method: DELETE
    headers:
      Authorization: "Bearer {{ fcp_api_token }}"
      Accept: "application/json"
    status_code: [200]
  delegate_to: localhost
  no_log: true
  register: fcp_delete_result

- name: Note FCP delete result
  debug:
    msg: >-
      FCP backend server slug '{{ fcp_delete_slug }}'
      {{ 'deleted' if (fcp_delete_result.json.deleted | default(false)) else 'not found (no-op)' }}.
