# tasks/dns.yml - DNS record management

# Set per-domain Cloudflare credentials (allows multi-account support)
- name: Set domain-specific Cloudflare credentials
  set_fact:
    cf_token: "{{ domain_providers[base_domain].cloudflare_api_token | default(cloudflare_api_token) }}"

- name: Install wamerican package for word list
  apt:
    name: wamerican
    state: present
  become: yes
  when: random_hostname is not defined and custom_hostname is not defined

- name: Get random words from system dictionary
  shell: 'grep "^[a-z]\{3,8\}$" /usr/share/dict/words | tr "[:upper:]" "[:lower:]" | shuf -n {{ hostname_word_count }}'
  register: random_words
  when: random_hostname is not defined and custom_hostname is not defined

- name: Set random hostname from dictionary words
  set_fact:
    random_hostname: "{{ random_words.stdout_lines | join('-') }}"
  when:
    - random_hostname is not defined
    - custom_hostname is not defined

- name: Set random hostname from custom override
  set_fact:
    random_hostname: "{{ custom_hostname }}"
  when:
    - random_hostname is not defined
    - custom_hostname is defined

- name: Set DNS hostname
  set_fact:
    dns_hostname: "{{ random_hostname }}.{{ base_domain }}"
  when: dns_hostname is not defined

- name: Set KV store hostname
  set_fact:
    kv_hostname: "{{ random_hostname }}"
  when: kv_hostname is not defined

- name: Debug DNS variables
  debug:
    msg:
      - "Random Hostname: {{ random_hostname }}"
      - "DNS Hostname: {{ dns_hostname }}"
      - "KV Hostname: {{ kv_hostname }}"
      - "Inventory Hostname: {{ inventory_hostname }}"
      - "API Endpoint: {{ cloudflare_api_endpoint }}"
      - "Zone ID: {{ domain_providers[base_domain].zone_id }}"
      - "Envoy Mappings Available: {{ envoy_mappings[inventory_hostname] is defined }}"

# Base domain DNS records

# Only single-domain DNS setup is supported (base_domain)

# ============================================================================
# A/AAAA records — idempotent: GET-first, delete + recreate only on drift
# ============================================================================
# Names are written as the FQDN (dns_hostname) so the GET-before-write matches
# what the API stores (Cloudflare normalizes short names to FQDN; the CI mock
# stores verbatim). An empty desired list is treated as "leave existing alone"
# (facts unavailable) rather than a delete signal.
- name: Resolve desired record addresses
  set_fact:
    _dns_ipv4s: >-
      {{ envoy_mappings[inventory_hostname].ipv4
         if (envoy_mappings is defined and envoy_mappings[inventory_hostname] is defined and envoy_mappings[inventory_hostname].ipv4 is defined)
         else ([ansible_facts['default_ipv4']['address']] if (ansible_facts['default_ipv4']['address'] is defined) else []) }}
    _dns_ipv6s: >-
      {{ envoy_mappings[inventory_hostname].ipv6
         if (envoy_mappings is defined and envoy_mappings[inventory_hostname] is defined and envoy_mappings[inventory_hostname].ipv6 is defined)
         else ([ansible_facts['default_ipv6']['address']] if (ansible_facts['default_ipv6']['address'] is defined) else []) }}

- name: Get existing A records for the hostname
  uri:
    url: "{{ cloudflare_api_endpoint }}/zones/{{ domain_providers[base_domain].zone_id }}/dns_records?type=A&name={{ dns_hostname }}"
    method: GET
    headers:
      Content-Type: "application/json"
      Authorization: "Bearer {{ cf_token }}"
    status_code: 200
  delegate_to: localhost
  no_log: true  # carries the Cloudflare API token in the Authorization header
  register: _dns_existing_a

- name: Get existing AAAA records for the hostname
  uri:
    url: "{{ cloudflare_api_endpoint }}/zones/{{ domain_providers[base_domain].zone_id }}/dns_records?type=AAAA&name={{ dns_hostname }}"
    method: GET
    headers:
      Content-Type: "application/json"
      Authorization: "Bearer {{ cf_token }}"
    status_code: 200
  delegate_to: localhost
  no_log: true  # carries the Cloudflare API token in the Authorization header
  register: _dns_existing_aaaa

- name: Detect record drift
  set_fact:
    _dns_a_drift: "{{ (_dns_ipv4s | length > 0) and ((_dns_existing_a.json.result | default([]) | map(attribute='content') | list | sort) != (_dns_ipv4s | sort)) }}"
    _dns_aaaa_drift: "{{ (_dns_ipv6s | length > 0) and ((_dns_existing_aaaa.json.result | default([]) | map(attribute='content') | list | sort) != (_dns_ipv6s | sort)) }}"

- name: Delete drifted A records
  uri:
    url: "{{ cloudflare_api_endpoint }}/zones/{{ domain_providers[base_domain].zone_id }}/dns_records/{{ item.id }}"
    method: DELETE
    headers:
      Content-Type: "application/json"
      Authorization: "Bearer {{ cf_token }}"
    status_code: [200, 404]
  delegate_to: localhost
  no_log: true  # carries the Cloudflare API token in the Authorization header
  loop: "{{ _dns_existing_a.json.result | default([]) }}"
  when: _dns_a_drift | bool

- name: Create A records
  uri:
    url: "{{ cloudflare_api_endpoint }}/zones/{{ domain_providers[base_domain].zone_id }}/dns_records"
    method: POST
    headers:
      Content-Type: "application/json"
      Authorization: "Bearer {{ cf_token }}"

    body_format: json
    body:
      type: A
      name: "{{ dns_hostname }}"
      content: "{{ item }}"
      ttl: 1
      proxied: "{{ dns_proxied | default(false) }}"
    status_code: [200, 201]
  delegate_to: localhost
  loop: "{{ _dns_ipv4s }}"
  when: _dns_a_drift | bool
  no_log: true  # carries the Cloudflare API token in the Authorization header
  register: dns_a_records_result

- name: Delete drifted AAAA records
  uri:
    url: "{{ cloudflare_api_endpoint }}/zones/{{ domain_providers[base_domain].zone_id }}/dns_records/{{ item.id }}"
    method: DELETE
    headers:
      Content-Type: "application/json"
      Authorization: "Bearer {{ cf_token }}"
    status_code: [200, 404]
  delegate_to: localhost
  no_log: true  # carries the Cloudflare API token in the Authorization header
  loop: "{{ _dns_existing_aaaa.json.result | default([]) }}"
  when: _dns_aaaa_drift | bool

- name: Create AAAA records
  uri:
    url: "{{ cloudflare_api_endpoint }}/zones/{{ domain_providers[base_domain].zone_id }}/dns_records"
    method: POST
    headers:
      Content-Type: "application/json"
      Authorization: "Bearer {{ cf_token }}"

    body_format: json
    body:
      type: AAAA
      name: "{{ dns_hostname }}"
      content: "{{ item }}"
      ttl: 1
      proxied: "{{ dns_proxied | default(false) }}"
    status_code: [200, 201]
  delegate_to: localhost
  loop: "{{ _dns_ipv6s }}"
  when: _dns_aaaa_drift | bool
  no_log: true  # carries the Cloudflare API token in the Authorization header
  register: dns_aaaa_records_result

- name: Debug DNS record state
  debug:
    msg:
      - "A records for {{ dns_hostname }}: {{ 'recreated (drift)' if (_dns_a_drift | bool) else 'unchanged' }} — {{ _dns_ipv4s | join(', ') | default('none', true) }}"
      - "AAAA records for {{ dns_hostname }}: {{ 'recreated (drift)' if (_dns_aaaa_drift | bool) else 'unchanged' }} — {{ _dns_ipv6s | join(', ') | default('none', true) }}"
