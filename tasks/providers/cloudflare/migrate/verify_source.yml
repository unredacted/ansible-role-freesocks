---
# tasks/providers/cloudflare/migrate/verify_source.yml - Source server preparation
#
# Source existence is established by on-disk backend detection in
# tasks/migrate/migrate.yml (it stats /opt/outline vs the Remnawave install dir
# and sets migrate_component). This file now only stops the source Outline
# containers before the configuration transfer.
#
# (KV-based source verification was removed when the control plane moved off
# Cloudflare KV to the FreeSocks Control Plane (FCP). FCP stores each server's
# management credential and dials out — there is no per-server KV entry to read.)

# Stop source server containers
# Outline path only — Remnawave's source container is torn down by
# tasks/migrate/remnawave_containers.yml using docker_compose_v2.
- name: Stop Outline containers on source server
  docker_container:
    name: "{{ item }}"
    state: stopped
  loop:
    - watchtower
    - shadowbox
  become: yes
  when:
    - inventory_hostname == source_hostname
    - migrate_component | default('outline') == 'outline'
