---
# tasks/providers/remnawave/delete_node.yml
# Remove a node entry from the panel via DELETE {{ panel_url }}/api/nodes/{uuid}.
#
# Used by force_wipe_remnawave (full decommission) and optionally during
# change/migrate cleanup.

- name: Validate delete prerequisites
  assert:
    that:
      - remnawave_panel_api_token is defined
      - remnawave_panel_api_token | length > 0
      - remnawave_node_uuid is defined
      - remnawave_node_uuid | length > 0
    fail_msg: "Node delete requires remnawave_panel_api_token and remnawave_node_uuid"

- name: DELETE node on Panel
  uri:
    url: "{{ remnawave_panel_url }}/api/nodes/{{ remnawave_node_uuid }}"
    method: DELETE
    headers:
      Authorization: "Bearer {{ remnawave_panel_api_token }}"
    status_code: [200, 204, 404]   # 404 = already gone, treat as idempotent
    return_content: yes
  register: remnawave_delete_response
  delegate_to: localhost
  no_log: true   # request carries the panel API bearer token

- name: Log node deletion
  debug:
    msg: "Deleted node uuid={{ remnawave_node_uuid }} (response status: {{ remnawave_delete_response.status }})"
