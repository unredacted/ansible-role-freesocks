---
# tasks/providers/remnawave/keygen.yml
# Fetch the panel-wide SECRET_KEY via GET {{ remnawave_panel_url }}/api/keygen.
#
# The response is shaped:
#   { "response": { "pubKey": "<base64-encoded payload>" } }
#
# The `pubKey` field name is legacy; this is the same value as SECRET_KEY in
# the docker-compose env. It bundles the panel CA cert + JWT public key.

- name: Validate Panel API token is supplied
  assert:
    that:
      - remnawave_panel_api_token is defined
      - remnawave_panel_api_token | length > 0
    fail_msg: "remnawave_panel_api_token must be set when fetching SECRET_KEY via Panel API"

- name: Fetch SECRET_KEY from Panel keygen endpoint
  uri:
    url: "{{ remnawave_panel_url }}/api/keygen"
    method: GET
    headers:
      Authorization: "Bearer {{ remnawave_panel_api_token }}"
      Content-Type: "application/json"
    status_code: 200
    return_content: yes
  register: remnawave_keygen_response
  no_log: true
  delegate_to: localhost

- name: Set remnawave_panel_secret_key from API response
  set_fact:
    remnawave_panel_secret_key: "{{ remnawave_keygen_response.json.response.pubKey }}"
  no_log: true

- name: Assert SECRET_KEY was returned by the panel
  assert:
    that:
      - remnawave_panel_secret_key is defined
      - remnawave_panel_secret_key | length > 0
    fail_msg: >-
      Panel /api/keygen returned an empty pubKey. Check remnawave_panel_url and
      remnawave_panel_api_token, or supply the key via vault instead.
  no_log: true
