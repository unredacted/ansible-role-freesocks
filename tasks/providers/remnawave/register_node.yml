---
# tasks/providers/remnawave/register_node.yml
# Create the node entry on the panel via POST {{ panel_url }}/api/nodes.
#
# The response is shaped:
#   { "response": { "uuid": "...", "name": "...", "address": "...", ... } }
#
# We capture the uuid into remnawave_node_uuid and persist it to
# /opt/remnanode/.node_uuid so update/change/migrate modes can find it later
# without re-querying the panel. Idempotent: GET-first by name — an existing
# node is reused (its UUID captured), no POST is made (the panel answers a
# duplicate POST with 400, not 409).

- name: Validate node registration prerequisites
  assert:
    that:
      - remnawave_panel_api_token is defined
      - remnawave_panel_api_token | length > 0
      - remnawave_panel_config_profile_uuid is defined
      - remnawave_panel_config_profile_uuid | length > 0
      - remnawave_panel_active_inbounds is defined
      - remnawave_panel_active_inbounds | length > 0
      - random_hostname | length >= 3
      - random_hostname | length <= 30
    fail_msg: |
      Node registration requires:
        remnawave_panel_api_token (vault)
        remnawave_panel_config_profile_uuid (UUID of the Xray config profile to attach)
        remnawave_panel_active_inbounds (list of inbound UUIDs from that profile)
      The node name is the hostname ('{{ random_hostname | default('(unset)') }}') and
      the panel caps node names at 30 chars — shorten custom_hostname /
      hostname_word_count.

# Idempotent: GET first and reuse the existing node with this name (re-runs,
# e.g. resuming a failed deploy). The panel answers a duplicate POST with 400
# (unique constraint), NOT 409 — and a GET-first also captures the UUID, which
# the 409 path could not. Address/config drift on an existing node is
# change/migrate's job (update_node.yml).
- name: List existing nodes (idempotency check)
  uri:
    url: "{{ remnawave_panel_url }}/api/nodes"
    method: GET
    headers:
      Authorization: "Bearer {{ remnawave_panel_api_token }}"
      Accept: "application/json"
    status_code: [200]
    return_content: yes
  delegate_to: localhost
  no_log: true
  register: _rn_nodes_list

- name: Materialize the existing node with this name
  set_fact:
    _rn_existing_node: >-
      {{ (((_rn_nodes_list.json.response['nodes']
            if (_rn_nodes_list.json.response is mapping and 'nodes' in _rn_nodes_list.json.response)
            else _rn_nodes_list.json.response))
          | selectattr('name', 'equalto', random_hostname) | list | first) | default({}, true) }}
  no_log: true

- name: Note the node already exists on the panel (reuse its UUID)
  set_fact:
    remnawave_node_uuid: "{{ _rn_existing_node.uuid }}"
  when: (_rn_existing_node.uuid | default('')) | length > 0

- name: Register node with Panel
  uri:
    url: "{{ remnawave_panel_url }}/api/nodes"
    method: POST
    headers:
      Authorization: "Bearer {{ remnawave_panel_api_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ random_hostname }}"
      # Management/control-plane endpoint the panel dials on node_port (default
      # 2222). Defaults to the public data-plane hostname, but can be a Tailscale
      # MagicDNS name / IP when the panel reaches nodes over Tailscale rather than
      # the public internet (cross-site routing). Independent of the data plane.
      address: "{{ remnawave_node_address }}"
      port: "{{ remnawave_node_port | int }}"
      countryCode: "{{ remnawave_panel_country_code }}"
      configProfile:
        activeConfigProfileUuid: "{{ remnawave_panel_config_profile_uuid }}"
        activeInbounds: "{{ remnawave_panel_active_inbounds }}"
    # 409 = a node with this name/address already exists (re-deploy / retry).
    # Tolerate it so the run doesn't hard-fail; UUID is only captured on a
    # fresh create below.
    status_code: [200, 201, 409]
    return_content: yes
  register: remnawave_register_response
  delegate_to: localhost
  no_log: true   # request carries the panel API bearer token
  when: (_rn_existing_node.uuid | default('')) | length == 0

- name: Warn that node already exists on Panel (409)
  debug:
    msg: >-
      Panel returned 409 — a node named "{{ random_hostname }}" already exists.
      Skipping UUID capture. If this is a re-deploy, run update mode instead, or
      write the node's UUID to {{ remnawave_node_install_dir }}/.node_uuid
      manually so change/migrate can PATCH the panel.
  when: remnawave_register_response.status | default(0) == 409

- name: Capture node UUID from registration response
  set_fact:
    remnawave_node_uuid: "{{ remnawave_register_response.json.response.uuid }}"
  when: remnawave_register_response.status | default(0) in [200, 201]

- name: Persist node UUID to /opt/remnanode/.node_uuid
  copy:
    content: "{{ remnawave_node_uuid }}\n"
    dest: "{{ remnawave_node_install_dir }}/.node_uuid"
    mode: '0640'
  become: "{{ remnawave_persist_become | default(true) }}"
  when:
    - remnawave_node_uuid is defined
    - remnawave_node_uuid | length > 0

- name: Log node registration
  debug:
    msg: "Registered node (uuid persisted to {{ remnawave_node_install_dir }}/.node_uuid) address={{ remnawave_node_address }} port={{ remnawave_node_port }}"
  when:
    - remnawave_node_uuid is defined
    - remnawave_node_uuid | length > 0
