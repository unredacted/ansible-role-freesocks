---
# tasks/providers/remnawave/create_squad.yml
#
# Ensure the two connection-mode internal squads exist and capture their UUIDs:
#   * fronted squad  = WS inbound           -> FCP "Stay connected" (evade)
#   * Reality squad  = the Reality inbound  -> FCP "Maximize privacy" (privacy)
# These are the LEGACY shared (panel-wide) squads, created only when
# remnawave_bootstrap_shared_squads=true; per-node squads are created at node
# deploy time by create_node_placement.yml instead. FCP homes keys to a squad
# via its per-mode placement pools (mode-placements binding).
# Idempotent: GET /api/internal-squads, match by name, POST only when absent.
# Panel-only (delegate_to: localhost); part of operation_mode=bootstrap.
#
# VERIFY on your panel /docs: POST /api/internal-squads { name, inbounds: [uuid] }
# and the list read-back (response[].{uuid,name}).
#
# Requires remnawave_bootstrap_inbound_uuids (set by create_config_profile.yml).

- name: List existing internal squads
  uri:
    url: "{{ remnawave_panel_url }}/api/internal-squads"
    method: GET
    headers:
      Authorization: "Bearer {{ remnawave_panel_api_token }}"
      Accept: "application/json"
    status_code: [200]
    return_content: yes
  delegate_to: localhost
  no_log: true
  register: _rw_squads_list

- name: Normalize the internal squads list payload
  set_fact:
    _rw_squads: "{{ _rw_squads_list.json.response['internalSquads'] if (_rw_squads_list.json.response is mapping and 'internalSquads' in _rw_squads_list.json.response) else _rw_squads_list.json.response }}"

- name: Compute existing squad names
  set_fact:
    _rw_squad_names: "{{ _rw_squads | map(attribute='name') | list }}"

- name: Compose the fronted squad inbound set (WS, dropping any unbound)
  set_fact:
    _rw_fronted_inbounds: >-
      {{ [remnawave_bootstrap_inbound_uuids['VLESS_WS_CDN'] | default('')]
         | select('string') | reject('equalto', '') | list }}
  no_log: true

- name: Assert the fronted squad has at least one inbound
  assert:
    that:
      - _rw_fronted_inbounds | length > 0
    fail_msg: "No CDN inbound UUIDs available for the fronted squad — run create_config_profile.yml first."

- name: Create the fronted squad (WS) when absent
  uri:
    url: "{{ remnawave_panel_url }}/api/internal-squads"
    method: POST
    headers:
      Authorization: "Bearer {{ remnawave_panel_api_token }}"
      Content-Type: "application/json"
      Accept: "application/json"
    body_format: json
    body:
      name: "{{ remnawave_bootstrap_fronted_squad_name }}"
      inbounds: "{{ _rw_fronted_inbounds }}"
    status_code: [200, 201, 409]
    return_content: yes
  delegate_to: localhost
  no_log: true
  register: _rw_fronted_create
  when: remnawave_bootstrap_fronted_squad_name not in _rw_squad_names

- name: Create the Reality squad when absent
  uri:
    url: "{{ remnawave_panel_url }}/api/internal-squads"
    method: POST
    headers:
      Authorization: "Bearer {{ remnawave_panel_api_token }}"
      Content-Type: "application/json"
      Accept: "application/json"
    body_format: json
    body:
      name: "{{ remnawave_bootstrap_reality_squad_name }}"
      inbounds: "{{ [remnawave_reality_inbound_uuid] }}"
    status_code: [200, 201, 409]
    return_content: yes
  delegate_to: localhost
  no_log: true
  register: _rw_reality_create
  when:
    - remnawave_bootstrap_reality | default(true) | bool
    - (remnawave_reality_inbound_uuid | default('')) | length > 0
    - remnawave_bootstrap_reality_squad_name not in _rw_squad_names

- name: Re-list internal squads (resolve UUIDs uniformly)
  uri:
    url: "{{ remnawave_panel_url }}/api/internal-squads"
    method: GET
    headers:
      Authorization: "Bearer {{ remnawave_panel_api_token }}"
      Accept: "application/json"
    status_code: [200]
    return_content: yes
  delegate_to: localhost
  no_log: true
  register: _rw_squads_list2

- name: Normalize the re-listed internal squads payload
  set_fact:
    _rw_squads2: "{{ _rw_squads_list2.json.response['internalSquads'] if (_rw_squads_list2.json.response is mapping and 'internalSquads' in _rw_squads_list2.json.response) else _rw_squads_list2.json.response }}"

- name: Resolve the squad UUIDs by name
  set_fact:
    remnawave_fronted_squad_uuid: "{{ (_rw_squads2 | selectattr('name', 'equalto', remnawave_bootstrap_fronted_squad_name) | map(attribute='uuid') | list | first) | default('', true) }}"
    remnawave_reality_squad_uuid: "{{ (_rw_squads2 | selectattr('name', 'equalto', remnawave_bootstrap_reality_squad_name) | map(attribute='uuid') | list | first) | default('', true) }}"
  no_log: true  # squad UUIDs are never logged

- name: Assert the fronted squad UUID resolved
  assert:
    that:
      - remnawave_fronted_squad_uuid | length > 0
    fail_msg: "Could not resolve the fronted squad UUID after create. Check /api/internal-squads."

- name: Summarize squad creation
  debug:
    msg:
      - "Fronted squad '{{ remnawave_bootstrap_fronted_squad_name }}': {{ 'uuid resolved' if (remnawave_fronted_squad_uuid | length > 0) else '(none)' }}"
      - "Reality squad '{{ remnawave_bootstrap_reality_squad_name }}': {{ 'uuid resolved' if (remnawave_reality_squad_uuid | default('') | length > 0) else '(disabled)' }}"
