---
# tasks/providers/remnawave/create_hosts.yml
#
# Create one Remnawave Host per enabled CDN transport. Hosts are what produce
# the client subscription line — without them, a registered node's keys never
# reach subscriptions. Each Host binds a Config Profile inbound to a
# client-facing endpoint (the Fastly edge domain when fronted, else the origin
# dns_hostname for direct/non-Fastly deploys — Caddy terminates a real cert there).
#
# Idempotent: GET /api/hosts first, then POST only for transports whose `remark`
# is absent (also tolerate 409). Verified against Remnawave panel API v2.7.4 —
# the create body nests the inbound under
# `inbound: {configProfileUuid, configProfileInboundUuid}` and requires an
# integer `port`; the Host inherits its transport (ws) from the inbound.

- name: Validate Host-creation prerequisites
  assert:
    that:
      - remnawave_panel_api_token is defined and remnawave_panel_api_token | length > 0
      - remnawave_panel_config_profile_uuid is defined and remnawave_panel_config_profile_uuid | length > 0
      - dns_hostname is defined and dns_hostname | length > 0
    fail_msg: >-
      Host creation requires remnawave_panel_api_token,
      remnawave_panel_config_profile_uuid, and a resolvable host (dns_hostname).
      The Host address is the Fastly edge domain when fronted, else dns_hostname.
  no_log: true

# Fastly-fronted deploys advertise the Fastly edge domain(s); direct (non-Fastly)
# deploys advertise the origin dns_hostname (Caddy terminates a real LE cert there).
- name: Resolve the client-facing Host address
  set_fact:
    _remnawave_host_address: "{{ fastly_websocket_domain | default(dns_hostname, true) }}"

# Fronting mode creates one Host per transport x fronting domain (subscriptions
# then carry every edge -> client failover). With MORE THAN ONE edge domain the
# remark gains a deterministic 6-hex domain suffix (sha256) so the Hosts stay
# distinguishable + idempotent — the panel caps remarks at 40 chars, and
# <hostname>-<transport>-<h6> fits a 26-char hostname with room to spare.
- name: Compute the Host edge domains
  set_fact:
    _host_edge_domains: "{{ fastly_fronting_edges | default([]) | map(attribute='fqdn') | list if (fastly_fronting_edges | default([]) | length > 0) else [_remnawave_host_address] }}"

- name: List existing Remnawave Hosts
  uri:
    url: "{{ remnawave_panel_url }}/api/hosts"
    method: GET
    headers:
      Authorization: "Bearer {{ remnawave_panel_api_token }}"
      Accept: "application/json"
    return_content: yes
    status_code: [200]
  delegate_to: localhost
  no_log: true
  register: remnawave_hosts_list

- name: Normalize the Hosts list payload (bare array or hosts-wrapped)
  set_fact:
    _remnawave_hosts: "{{ remnawave_hosts_list.json.response['hosts'] if (remnawave_hosts_list.json.response is mapping and 'hosts' in remnawave_hosts_list.json.response) else (remnawave_hosts_list.json.response | default([])) }}"

- name: Compute existing Host remarks
  set_fact:
    _existing_host_remarks: "{{ _remnawave_hosts | map(attribute='remark') | list }}"

- name: Create a Remnawave Host per enabled CDN transport (x edge domain)
  uri:
    url: "{{ remnawave_panel_url }}/api/hosts"
    method: POST
    headers:
      Authorization: "Bearer {{ remnawave_panel_api_token }}"
      Content-Type: "application/json"
      Accept: "application/json"
    body_format: json
    body:
      inbound:
        configProfileUuid: "{{ remnawave_panel_config_profile_uuid }}"
        configProfileInboundUuid: "{{ item.0.inbound_uuid }}"
      remark: "{{ random_hostname }}-{{ item.0.name }}{{ ('-' ~ (item.1 | hash('sha256') | truncate(6, true, ''))) if (_host_edge_domains | length > 1) else '' }}"
      address: "{{ item.1 }}"
      port: 443
      path: "{{ item.0.path }}"
      sni: "{{ item.1 }}"
      host: "{{ item.1 }}"
      alpn: "{{ item.0.alpn | default('http/1.1') }}"
      fingerprint: "{{ item.0.fingerprint | default('chrome') }}"
      securityLayer: "TLS"
    status_code: [200, 201, 409]
    return_content: yes
  delegate_to: localhost
  no_log: true
  register: remnawave_host_results
  loop: "{{ remnawave_cdn_transports | default([]) | product(_host_edge_domains) | list }}"
  loop_control:
    label: "{{ item.0.name }} @ {{ item.1 }}"
  when:
    - item.0.enabled | default(true) | bool
    - item.0.inbound_uuid | default('') | length > 0
    - (random_hostname ~ '-' ~ item.0.name ~ (('-' ~ (item.1 | hash('sha256') | truncate(6, true, ''))) if (_host_edge_domains | length > 1) else '')) not in _existing_host_remarks

- name: Summarize Host creation
  debug:
    msg: >-
      Remnawave Hosts ensured for enabled transports
      [{{ remnawave_cdn_transports | rejectattr('enabled', 'equalto', false) | map(attribute='name') | join(', ') }}]
      at {{ _host_edge_domains | join(', ') }} (remark prefix '{{ random_hostname }}-').
