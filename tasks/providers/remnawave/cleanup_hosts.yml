---
# tasks/providers/remnawave/cleanup_hosts.yml
#
# Delete the Remnawave Hosts that belonged to the OLD hostname during a
# hostname rotation (change) or migration. Hosts are matched by their exact
# remark shape ("{old_random_hostname}-{transport}" / "-reality"); the NEW
# Hosts are (re)created by create_hosts.yml under the new hostname. Tolerates
# 404 (already gone).
#
# Requires: old_random_hostname (the pre-rotation / source random part).

- name: List existing Remnawave Hosts (for cleanup)
  uri:
    url: "{{ remnawave_panel_url }}/api/hosts"
    method: GET
    headers:
      Authorization: "Bearer {{ remnawave_panel_api_token }}"
      Accept: "application/json"
    return_content: yes
    status_code: [200]
  delegate_to: localhost
  no_log: true
  register: remnawave_cleanup_hosts_list
  when: old_random_hostname is defined and old_random_hostname | length > 0

- name: Normalize the Hosts list payload (cleanup; bare array or hosts-wrapped)
  set_fact:
    _remnawave_cleanup_hosts: "{{ remnawave_cleanup_hosts_list.json.response['hosts'] if (remnawave_cleanup_hosts_list.json.response is mapping and 'hosts' in remnawave_cleanup_hosts_list.json.response) else (remnawave_cleanup_hosts_list.json.response | default([])) }}"
  when:
    - old_random_hostname is defined and old_random_hostname | length > 0
    - remnawave_cleanup_hosts_list.json is defined

# Anchor to the full remark shape ({hostname}-{transport}|reality) — a bare
# prefix match would also hit a DIFFERENT node whose hostname extends this one
# (e.g. 'quiet-falcon' would match 'quiet-falcon-2-ws').
- name: Select OLD Host UUIDs by exact remark match
  set_fact:
    _old_host_uuids: "{{ _remnawave_cleanup_hosts | selectattr('remark', 'match', _old_remark_pattern) | map(attribute='uuid') | list }}"
  vars:
    _old_remark_pattern: >-
      ^{{ old_random_hostname }}-({{ (remnawave_cdn_transports | default([]) | map(attribute='name') | list + ['reality']) | join('|') }})$
  when:
    - old_random_hostname is defined and old_random_hostname | length > 0
    - remnawave_cleanup_hosts_list.json is defined

- name: Delete OLD Remnawave Hosts
  uri:
    url: "{{ remnawave_panel_url }}/api/hosts/{{ item }}"
    method: DELETE
    headers:
      Authorization: "Bearer {{ remnawave_panel_api_token }}"
      Accept: "application/json"
    status_code: [200, 204, 404]
  delegate_to: localhost
  no_log: true
  loop: "{{ _old_host_uuids | default([]) }}"
  loop_control:
    label: "{{ item }}"
  when: _old_host_uuids | default([]) | length > 0
