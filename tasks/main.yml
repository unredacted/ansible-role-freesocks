# tasks/main.yml - Main task file that includes other task files

# ============================================================================
# VALIDATION: Vault Decryption Check
# ============================================================================
# Checks every secret the enabled features consume, not just the Cloudflare
# token — a vault blob (or template placeholder) in any of them used to
# surface only later, as an opaque 401 mid-run.
- name: Fail if vault-encrypted variables are not decrypted
  fail:
    msg: |
      Vault-encrypted (or placeholder) secrets detected: {{ _undecrypted_secrets | join(', ') }}
      Please run the playbook with --ask-vault-pass or configure a vault password file.
      Example: ansible-playbook playbook.yml --ask-vault-pass --extra-vars "..."
  vars:
    _secret_values:
      cloudflare_api_token: "{{ cloudflare_api_token | default('') }}"
      fcp_api_token: "{{ fcp_api_token | default('') if (fcp_enabled | default(false) | bool) else '' }}"
      remnawave_panel_api_token: "{{ remnawave_panel_api_token | default('') }}"
      remnawave_panel_secret_key: "{{ remnawave_panel_secret_key | default('') if (remnawave_secret_key_source | default('vault') == 'vault') else '' }}"
    _undecrypted_secrets: >-
      {{ _secret_values | dict2items
         | selectattr('value', 'string')
         | selectattr('value', 'search', '\$ANSIBLE_VAULT;')
         | map(attribute='key') | list }}
  when: _undecrypted_secrets | length > 0

# ============================================================================
# VALIDATION: Operation Mode
# ============================================================================
- name: Fail if operation mode is not specified
  fail:
    msg: "Operation mode must be explicitly set to 'deploy', 'migrate', 'change', 'update', or 'bootstrap'"
  when: operation_mode is not defined or operation_mode == ""

- name: Fail if operation mode is invalid
  fail:
    msg: "Operation mode must be 'deploy', 'migrate', 'change', 'update', or 'bootstrap', got: {{ operation_mode }}"
  when: operation_mode is defined and operation_mode not in ['deploy', 'migrate', 'change', 'update', 'bootstrap']

# ============================================================================
# VALIDATION: Environment Mode
# ============================================================================
# Bootstrap is panel-only (host-agnostic), so it doesn't need an environment mode.
- name: Fail if environment mode is not specified
  fail:
    msg: "Environment mode must be explicitly set to either 'prod' or 'dev' via --extra-vars"
  when:
    - operation_mode | default('') != 'bootstrap'
    - environment_mode is not defined or environment_mode == ""

- name: Fail if environment mode is invalid
  fail:
    msg: "Environment mode must be either 'prod' or 'dev', got: {{ environment_mode }}"
  when:
    - operation_mode | default('') != 'bootstrap'
    - environment_mode is defined and environment_mode not in ['prod', 'dev']

# ============================================================================
# VALIDATION: Provider Configuration
# ============================================================================
# Note: For change, deploy, and update modes, dns_provider is derived from domain_providers
- name: Fail if dns_provider is not specified
  fail:
    msg: "dns_provider must be explicitly set (e.g., 'cloudflare')"
  when:
    - operation_mode not in ['change', 'deploy', 'update', 'bootstrap']
    - dns_provider is not defined or dns_provider == ""

- name: Fail if dns_provider is invalid
  fail:
    msg: "dns_provider must be 'cloudflare', got: {{ dns_provider }}"
  when:
    - operation_mode not in ['change', 'deploy', 'update', 'bootstrap']
    - dns_provider is defined
    - dns_provider not in ['cloudflare']

- name: Fail if cdn_provider is invalid (when explicitly set)
  fail:
    msg: "cdn_provider must be 'cloudflare', 'fastly', or 'none', got: {{ cdn_provider }}"
  when:
    - operation_mode not in ['change', 'deploy', 'update', 'bootstrap']
    - cdn_provider is defined
    - cdn_provider not in ['cloudflare', 'fastly', 'none']

# ============================================================================
# VALIDATION: Deploy Mode (New)
# ============================================================================
- name: Fail if deploy_target_domain is not provided (Deploy Mode)
  fail:
    msg: |
      deploy_target_domain is required for deploy mode.
      Please provide the target domain via --extra-vars.
      Example: --extra-vars "deploy_target_domain=example.app"
  when: 
    - operation_mode == 'deploy'
    - deploy_target_domain is not defined or deploy_target_domain == ''

- name: Fail if domain_providers is not configured (Deploy Mode)
  fail:
    msg: "domain_providers mapping is required for deploy mode."
  when: 
    - operation_mode == 'deploy'
    - (domain_providers is not defined or domain_providers | length == 0)

- name: Fail if target domain not found in domain_providers (Deploy Mode)
  fail:
    msg: |
      Domain '{{ deploy_target_domain }}' not found in domain_providers mapping.
      Available domains: {{ domain_providers.keys() | list | join(', ') }}
  when: 
    - operation_mode == 'deploy'
    - deploy_target_domain not in domain_providers

# ============================================================================
# SETUP: Deploy Mode Configuration
# ============================================================================
- name: Set provider configuration for deploy target domain
  set_fact:
    target_domain_config: "{{ domain_providers[deploy_target_domain] }}"
    effective_dns_provider: "{{ domain_providers[deploy_target_domain].dns_provider }}"
    effective_cdn_provider: "{{ domain_providers[deploy_target_domain].cdn_provider | default('none') }}"
    effective_fastly_domain_mode: "{{ domain_providers[deploy_target_domain].fastly_domain_mode | default('shared') }}"
    effective_zone_id: "{{ domain_providers[deploy_target_domain].zone_id }}"
    # Override global variables for this deployment
    base_domain: "{{ deploy_target_domain }}"
    api_domain: "{{ deploy_target_domain }}"
    prom_domain: "{{ deploy_target_domain }}"
    cloudflare_zone_id: "{{ domain_providers[deploy_target_domain].zone_id }}"
  when: operation_mode == 'deploy'

- name: Validate Fastly configuration (deploy)
  fail:
    msg: |
      Fastly API token is required when cdn_provider is 'fastly'.
      Set fastly_api_token globally or fastly_api_token in domain_providers[{{ deploy_target_domain }}].
  when:
    - operation_mode == 'deploy'
    - effective_cdn_provider | default('none') == 'fastly'
    - domain_providers[deploy_target_domain].fastly_api_token | default(fastly_api_token | default('')) == ''

- name: Validate Cloudflare credentials (deploy)
  fail:
    msg: |
      A Cloudflare API token is required for DNS on '{{ deploy_target_domain }}'.
      Set cloudflare_api_token (vault-encrypted) or a per-domain
      domain_providers['{{ deploy_target_domain }}'].cloudflare_api_token.
      It must be a scoped API Token with Zone:DNS:Edit (not the Global API Key).
  when:
    - operation_mode == 'deploy'
    - effective_dns_provider | default('') == 'cloudflare'
    - (domain_providers[deploy_target_domain].cloudflare_api_token | default(cloudflare_api_token | default(''))) | length == 0

# ============================================================================
# VALIDATION & SETUP: Change Mode
# ============================================================================
- name: Fail if change_target_domain is not provided (Change Mode)
  fail:
    msg: |
      change_target_domain is required for change mode.
      Please provide the target domain via --extra-vars.
      Example: --extra-vars "change_target_domain=example.app"
  when: 
    - operation_mode == 'change'
    - change_target_domain is not defined or change_target_domain == ''

- name: Fail if domain_providers is not configured (Change Mode)
  fail:
    msg: |
      domain_providers mapping is required for change mode.
      Please configure domain_providers in your playbook with provider settings for each domain.
  when: 
    - operation_mode == 'change'
    - (domain_providers is not defined or domain_providers | length == 0)

- name: Fail if target domain not found in domain_providers (Change Mode)
  fail:
    msg: |
      Domain '{{ change_target_domain }}' not found in domain_providers mapping.
      Available domains: {{ domain_providers.keys() | list | join(', ') }}
  when: 
    - operation_mode == 'change'
    - change_target_domain not in domain_providers

- name: Set provider configuration for change target domain
  set_fact:
    target_domain_config: "{{ domain_providers[change_target_domain] }}"
    effective_dns_provider: "{{ domain_providers[change_target_domain].dns_provider }}"
    effective_cdn_provider: "{{ domain_providers[change_target_domain].cdn_provider | default('none') }}"
    effective_fastly_domain_mode: "{{ domain_providers[change_target_domain].fastly_domain_mode | default('shared') }}"
    effective_zone_id: "{{ domain_providers[change_target_domain].zone_id }}"
  when: operation_mode == 'change'

- name: Debug configuration
  debug:
    msg:
      - "Operation Mode: {{ operation_mode }}"
      - "Environment Mode: {{ environment_mode }}"
      - "DNS Provider: {{ effective_dns_provider | default(dns_provider) | default('pending') }}"
      - "CDN Provider: {{ effective_cdn_provider | default('none') }}"
      - "Deploy Target Domain: {{ deploy_target_domain | default('N/A') }}"
  # Update sets these later; bootstrap is panel-only (no environment_mode/dns_provider).
  when: operation_mode not in ['update', 'bootstrap']

# ============================================================================
# DEPLOY MODE
# ============================================================================
# Component-based deployment: can deploy Outline, slipstream, or both
- name: Deploy server with selected components
  block:
    # Validate component selection
    - name: Fail if no components selected
      fail:
        msg: |
          No components selected for deployment!
          Set at least one of: outline_enabled=true, remnawave_enabled=true, slipstream_enabled=true
      when:
        - not (outline_enabled | default(true) | bool)
        - not (remnawave_enabled | default(false) | bool)
        - not (slipstream_enabled | default(false) | bool)

    - name: Fail if both outline_enabled and remnawave_enabled are true
      fail:
        msg: |
          outline_enabled and remnawave_enabled are mutually exclusive — a host runs
          one VPN backend or the other, not both. Disable one before deploying.
      when:
        - outline_enabled | default(true) | bool
        - remnawave_enabled | default(false) | bool

    - name: Validate slipstream configuration
      fail:
        msg: |
          Invalid slipstream configuration: slipstream_mode=shadowsocks requires outline_enabled=true.
          With remnawave_enabled=true, use slipstream_mode=raw (microsocks-backed) instead.
          Either set outline_enabled=true or use slipstream_mode=raw.
      when:
        - slipstream_enabled | default(false) | bool
        - slipstream_mode | default('shadowsocks') == 'shadowsocks'
        - not (outline_enabled | default(true) | bool)

    # Reality transport validation (VLESS+Vision+Reality — direct, no Caddy)
    - name: Validate Reality requires Remnawave + node registration
      fail:
        msg: |
          remnawave_reality_enabled=true requires remnawave_enabled=true and
          remnawave_panel_register_node=true (the role creates the Reality Host
          via the panel API).
      when:
        - remnawave_reality_enabled | default(false) | bool
        - not (remnawave_enabled | default(false) | bool and remnawave_panel_register_node | default(false) | bool)

    - name: Validate Reality inbound UUID + SNI are set
      fail:
        msg: |
          remnawave_reality_enabled=true requires remnawave_reality_inbound_uuid
          (the Reality inbound from the Config Profile) and remnawave_reality_sni
          (a serverName the inbound borrows). See Phase 0 (Reality).
      when:
        - remnawave_reality_enabled | default(false) | bool
        - (remnawave_reality_inbound_uuid | default('') | length == 0) or (remnawave_reality_sni | default('') | length == 0)

    - name: Validate Reality is mutually exclusive with Caddy and Fastly
      fail:
        msg: |
          remnawave_reality_enabled=true cannot be combined with
          remnawave_caddy_enabled=true (both bind :443) or with a Fastly CDN
          (Reality has no Caddy origin to front). Disable Caddy and set the
          domain's cdn_provider to none for a Reality node.
      when:
        - remnawave_reality_enabled | default(false) | bool
        - (remnawave_caddy_enabled | default(false) | bool) or (effective_cdn_provider | default('none') == 'fastly')

    # Check for existing installation (cross-check requested vs detected component)
    - name: Check if /opt/outline already exists
      stat:
        path: /opt/outline
      register: outline_path

    - name: Check if /opt/remnanode already exists
      stat:
        path: "{{ remnawave_node_install_dir }}/docker-compose.yml"
      register: remnanode_path

    - name: Fail if /opt/outline already exists when deploying Outline
      fail:
        msg: "Cannot deploy Outline: /opt/outline already exists. Please remove it first or use migration mode."
      when:
        - outline_enabled | default(true) | bool
        - outline_path.stat.exists

    - name: Fail if Remnawave already deployed when deploying Remnawave
      fail:
        msg: |
          Cannot deploy Remnawave: {{ remnawave_node_install_dir }}/docker-compose.yml already exists.
          Use update mode or set force_reinstall_remnawave=true to recreate the container.
      when:
        - remnawave_enabled | default(false) | bool
        - remnanode_path.stat.exists
        - not (force_reinstall_remnawave | default(false) | bool)

    - name: Fail if deploying Outline on a host with Remnawave installed
      fail:
        msg: |
          Cannot deploy Outline: {{ remnawave_node_install_dir }} contains a Remnawave node installation.
          Outline and Remnawave are mutually exclusive per host.
      when:
        - outline_enabled | default(true) | bool
        - remnanode_path.stat.exists

    - name: Fail if deploying Remnawave on a host with Outline installed
      fail:
        msg: |
          Cannot deploy Remnawave: /opt/outline contains an Outline installation.
          Outline and Remnawave are mutually exclusive per host.
      when:
        - remnawave_enabled | default(false) | bool
        - outline_path.stat.exists

    # Generate hostname
    - name: Install wamerican package for word list
      apt:
        name: wamerican
        state: present
      when: custom_hostname is not defined

    - name: Get random words from system dictionary
      shell: 'grep "^[a-z]\{3,8\}$" /usr/share/dict/words | tr "[:upper:]" "[:lower:]" | shuf -n {{ hostname_word_count }}'
      register: random_words
      when: custom_hostname is not defined

    - name: Set random hostname from dictionary words
      set_fact:
        random_hostname: "{{ random_words.stdout_lines | join('-') }}"
      when: 
        - random_hostname is not defined
        - custom_hostname is not defined

    - name: Set random hostname from custom override
      set_fact:
        random_hostname: "{{ custom_hostname }}"
      when: 
        - random_hostname is not defined
        - custom_hostname is defined

    - name: Set DNS hostname
      set_fact:
        dns_hostname: "{{ random_hostname }}.{{ base_domain }}"
      when: dns_hostname is not defined

    - name: Set KV store hostname
      set_fact:
        kv_hostname: "{{ random_hostname }}"
      when: kv_hostname is not defined

    - name: Debug deployment configuration
      debug:
        msg:
          - "Random Hostname: {{ random_hostname }}"
          - "DNS Hostname: {{ dns_hostname }}"
          - "KV Hostname: {{ kv_hostname }}"
          - "Components:"
          - "  - Outline: {{ outline_enabled | default(true) | bool }}"
          - "  - Remnawave: {{ remnawave_enabled | default(false) | bool }}"
          - "  - slipstream: {{ slipstream_enabled | default(false) | bool }} (mode: {{ slipstream_mode | default('shadowsocks') }})"
          - "  - WebSocket: {{ outline_wss_enabled | default(false) | bool }}"

    # Provider-specific DNS setup — MUST run before component install.
    # The Outline installer's post-install self-check curls the API hostname.
    # If DNS records don't exist yet, the target's resolver caches the failure
    # (EAI_NODATA / negative cache) and downstream API health checks fail.
    # Origin DNS records are ALWAYS needed, even with Fastly CDN, because:
    #   1. Caddy needs to resolve the hostname for Let's Encrypt certificate issuance
    #   2. API health checks need DNS resolution
    #   3. Fastly backends need to reach the origin server
    # When Fastly is the CDN, we disable Cloudflare proxy (orange cloud) to avoid
    # double-CDN and ensure Fastly talks directly to the origin.
    - name: Override dns_proxied for Fastly CDN (avoid double-CDN)
      set_fact:
        dns_proxied: false
      when:
        - effective_cdn_provider | default('none') == 'fastly'

    - name: Override dns_proxied for Reality (direct raw-TLS — no proxy)
      set_fact:
        dns_proxied: false
      when:
        - remnawave_reality_enabled | default(false) | bool

    - name: Include DNS tasks (Cloudflare)
      include_tasks: providers/cloudflare/dns.yml
      when:
        - effective_dns_provider == 'cloudflare'

    # Base installation (common packages)
    - name: Include base installation tasks
      include_tasks: setup/install.yml

    # Docker engine — Remnawave needs it standalone; Outline's installer handles
    # its own Docker but running this first makes the dependency explicit and
    # is idempotent against the installer.
    - name: Install Docker
      include_tasks: setup/docker.yml
      when:
        - remnawave_enabled | default(false) | bool

    # =========================================================================
    # COMPONENT: Outline Shadowsocks Server
    # =========================================================================
    - name: Install Outline server component
      block:
        - name: Include Outline server tasks
          include_tasks: setup/outline.yml

        - name: Debug Outline installation success
          debug:
            msg: "Outline installation success: {{ outline_install_success }}"
      when: outline_enabled | default(true) | bool

    # =========================================================================
    # COMPONENT: Remnawave Node
    # =========================================================================
    - name: Install Remnawave node component
      include_tasks: setup/remnawave.yml
      when: remnawave_enabled | default(false) | bool

    # Unified component-install gate. Set after either install path runs.
    # Outline path sets outline_install_success in setup/outline.yml.
    # Remnawave path sets component_install_success in setup/remnawave.yml.
    # Slipstream-only deployments (no Outline, no Remnawave) need both facts
    # set so downstream gates pass.
    - name: Set component_install_success after Outline path
      set_fact:
        component_install_success: true
      when:
        - outline_enabled | default(true) | bool
        - outline_install_success | default(false) | bool

    - name: Set facts for slipstream-only deployments
      set_fact:
        outline_install_success: true
        component_install_success: true
      when:
        - not (outline_enabled | default(true) | bool)
        - not (remnawave_enabled | default(false) | bool)

    # =========================================================================
    # COMPONENT: WebSocket (requires Outline)
    # =========================================================================
    - name: Include WebSocket configuration tasks
      include_tasks: setup/websocket.yml
      when:
        - component_install_success | bool
        - outline_enabled | default(true) | bool
        - outline_wss_enabled | default(false) | bool

    # Outline management API proxy (valid TLS) for FCP when WSS is NOT enabling
    # it. FCP requires a publicly-trusted cert on the apiUrl; setup/websocket.yml
    # already configures this proxy when WSS is on, so this only covers no-WSS.
    - name: Configure Outline Caddy API proxy for FCP (no WSS)
      include_tasks: setup/outline_api_proxy.yml
      when:
        - component_install_success | bool
        - outline_enabled | default(true) | bool
        - fcp_enabled | default(false) | bool
        - not (outline_wss_enabled | default(false) | bool)

    # =========================================================================
    # COMPONENT: Standalone Caddy (Remnawave TLS terminator + WS proxy)
    # =========================================================================
    - name: Include Caddy configuration tasks (Remnawave)
      include_tasks: setup/caddy.yml
      when:
        - component_install_success | bool
        - remnawave_enabled | default(false) | bool
        - remnawave_caddy_enabled | default(false) | bool

    # =========================================================================
    # CDN PROVIDER: Fastly (WSS fronting via Fastly CDN)
    # =========================================================================
    # Fastly service creation + WebSocket enablement.
    # Outline uses outline_wss_enabled (WSS via Caddy embedded in shadowbox).
    # Remnawave uses remnawave_caddy_enabled (standalone Caddy on the host)
    # — Stage 3 adds the standalone Caddy support.
    - name: Set Fastly service-id persistence dir (component-aware)
      set_fact:
        fastly_service_id_dir: "{{ '/opt/outline' if (outline_enabled | default(true) | bool) else remnawave_node_install_dir }}"
      when:
        - effective_cdn_provider | default('none') == 'fastly'

    - name: Include Fastly CDN service tasks
      include_tasks: providers/fastly/service.yml
      when:
        - component_install_success | bool
        - effective_cdn_provider | default('none') == 'fastly'
        - >-
          (outline_enabled | default(true) | bool and outline_wss_enabled | default(false) | bool)
          or (remnawave_enabled | default(false) | bool and remnawave_caddy_enabled | default(false) | bool)

    # Fastly TLS subscription (custom domain mode only)
    - name: Include Fastly TLS tasks (custom domain mode)
      include_tasks: providers/fastly/tls.yml
      when:
        - component_install_success | bool
        - effective_cdn_provider | default('none') == 'fastly'
        - effective_fastly_domain_mode | default('shared') == 'custom'

    # DNS CNAME to Fastly edge (custom domain mode only)
    - name: Include Fastly DNS tasks (custom domain mode)
      include_tasks: providers/fastly/dns.yml
      when:
        - component_install_success | bool
        - effective_cdn_provider | default('none') == 'fastly'
        - effective_fastly_domain_mode | default('shared') == 'custom'
        - effective_dns_provider == 'cloudflare'

    # =========================================================================
    # COMPONENT: Remnawave Hosts (per-transport, panel-side)
    # =========================================================================
    # Create one Remnawave Host per enabled CDN transport so issued keys reach
    # subscriptions. Needs fastly_websocket_domain (Fastly block above) and the
    # node registered on the panel. Fronted (Fastly) deploys only.
    - name: Create Remnawave Hosts per transport
      include_tasks: providers/remnawave/create_hosts.yml
      when:
        - component_install_success | bool
        - remnawave_enabled | default(false) | bool
        - remnawave_panel_register_node | default(false) | bool
        - remnawave_caddy_enabled | default(false) | bool
        - effective_cdn_provider | default('none') in ['fastly', 'none']

    # Reality node (direct, no Caddy/Fastly) — create the Reality Host.
    - name: Create Remnawave Reality Host
      include_tasks: providers/remnawave/create_reality_host.yml
      when:
        - component_install_success | bool
        - remnawave_enabled | default(false) | bool
        - remnawave_panel_register_node | default(false) | bool
        - remnawave_reality_enabled | default(false) | bool

    # =========================================================================
    # COMPONENT: slipstream DNS Tunnel
    # =========================================================================
    - name: Install slipstream DNS tunnel component
      include_tasks: setup/slipstream.yml
      when:
        - component_install_success | bool
        - slipstream_enabled | default(false) | bool

    # =========================================================================
    # CONTROL PLANE: Register server with FreeSocks Control Plane (FCP)
    # =========================================================================
    # FCP stores each server's management credential and dials out to it. For
    # Outline, each server is one backendServers row (apiUrl). For Remnawave,
    # FCP holds only the panel (baseUrl+apiToken); per-node config reaches users
    # via the panel (register_node + Hosts), so node deploys don't register with
    # FCP unless fcp_register_remnawave_panel is set for an additional panel.
    - name: Register Outline server with FCP
      include_tasks: providers/fcp/register_server.yml
      when:
        - component_install_success | bool
        - fcp_enabled | default(false) | bool
        - outline_enabled | default(true) | bool

    - name: Register Remnawave panel with FCP (optional)
      include_tasks: providers/fcp/register_remnawave_panel.yml
      when:
        - component_install_success | bool
        - fcp_enabled | default(false) | bool
        - remnawave_enabled | default(false) | bool
        - fcp_register_remnawave_panel | default(false) | bool

    # Per-node placement: add THIS node's squad(s) to FCP's per-mode pools
    # (append-only — addSquadUuids never disturbs the rest of the pool). The
    # fronted (WS) squad joins the "evade" pool; the Reality squad joins
    # "privacy". Needs the same admin:servers:write scope registration uses.
    - name: Add this node's squads to FCP mode placements
      include_tasks: providers/fcp/bind_placements.yml
      vars:
        _fcp_placement_modes: >-
          {{ ({'evade': {'addSquadUuids': [remnawave_node_fronted_squad_uuid]}}
              if ((remnawave_node_fronted_squad_uuid | default('')) | length > 0) else {})
             | combine({'privacy': {'addSquadUuids': [remnawave_node_reality_squad_uuid]}}
              if ((remnawave_node_reality_squad_uuid | default('')) | length > 0) else {}) }}
      when:
        - component_install_success | bool
        - fcp_enabled | default(false) | bool
        - remnawave_enabled | default(false) | bool
        - remnawave_per_node_placement | default(true) | bool
        - >-
          ((remnawave_node_fronted_squad_uuid | default('')) | length > 0)
          or ((remnawave_node_reality_squad_uuid | default('')) | length > 0)

    # Opt-in post-deploy gate: wait until FCP's healthcheck cron has observed
    # the just-registered backend (needs admin:status:read on the token).
    - name: Wait for FCP status to report the Outline server healthy
      include_tasks: providers/fcp/status_gate.yml
      vars:
        _fcp_gate_slug: "{{ fcp_server_slug }}"
      when:
        - component_install_success | bool
        - fcp_enabled | default(false) | bool
        - fcp_status_gate | default(false) | bool
        - outline_enabled | default(true) | bool

    - name: Wait for FCP status to report the Remnawave panel healthy
      include_tasks: providers/fcp/status_gate.yml
      vars:
        _fcp_gate_slug: "{{ fcp_remnawave_panel_slug }}"
      when:
        - component_install_success | bool
        - fcp_enabled | default(false) | bool
        - fcp_status_gate | default(false) | bool
        - remnawave_enabled | default(false) | bool
        - fcp_register_remnawave_panel | default(false) | bool

    - name: Display deployment summary
      debug:
        msg: |
          Deployment complete!

          Hostname: {{ dns_hostname }}

          Components deployed:
          {% if outline_enabled | default(true) | bool %}
            ✓ Outline Shadowsocks server
          {% endif %}
          {% if remnawave_enabled | default(false) | bool %}
            ✓ Remnawave node ({{ remnawave_node_image }})
          {% endif %}
          {% if outline_wss_enabled | default(false) | bool %}
            ✓ WebSocket transport (WSS)
          {% endif %}
          {% if slipstream_enabled | default(false) | bool %}
            ✓ slipstream DNS tunnel ({{ slipstream_mode | default('shadowsocks') }} mode)
          {% endif %}
  when: operation_mode == 'deploy'

# ============================================================================
# MIGRATE MODE
# ============================================================================
- name: Migrate existing server (Outline or Remnawave)
  block:
    - name: Verify required migration variables
      fail:
        msg: "Migration requires source_hostname, source_kv_hostname, destination_hostname, and destination_kv_hostname to be set"
      when: >
        source_hostname is not defined or
        source_kv_hostname is not defined or
        destination_hostname is not defined or
        destination_kv_hostname is not defined

    - name: Check if destination has existing Outline install
      stat:
        path: /opt/outline
      register: outline_path
      when: inventory_hostname == destination_hostname

    - name: Check if destination has existing Remnawave install
      stat:
        path: "{{ remnawave_node_install_dir }}/docker-compose.yml"
      register: remnanode_path
      when: inventory_hostname == destination_hostname

    - name: Fail if destination already has a VPN backend installed
      fail:
        msg: |
          Cannot migrate: destination host {{ destination_hostname }} already has a
          VPN backend installed (Outline at /opt/outline or Remnawave at
          {{ remnawave_node_install_dir }}). Migration target must be a clean host.
      when:
        - inventory_hostname == destination_hostname
        - outline_path.stat.exists or remnanode_path.stat.exists

    - name: Include base installation tasks
      include_tasks: setup/install.yml
      when: inventory_hostname == destination_hostname

    - name: Include migration tasks
      include_tasks: migrate/migrate.yml
  when: operation_mode == 'migrate'

# ============================================================================
# CHANGE MODE
# ============================================================================
- name: Change hostname for blocked server
  block:
    - name: Check if /opt/outline exists
      stat:
        path: /opt/outline
      register: outline_path

    - name: Check if {{ remnawave_node_install_dir }} exists
      stat:
        path: "{{ remnawave_node_install_dir }}/docker-compose.yml"
      register: remnanode_path

    - name: Fail if no VPN backend is installed
      fail:
        msg: |
          Cannot change hostname: neither /opt/outline nor {{ remnawave_node_install_dir }}
          exists on this server. Change mode requires an existing deployment.
      when:
        - not outline_path.stat.exists
        - not remnanode_path.stat.exists

    - name: Include change tasks
      include_tasks: change/change.yml
  when: operation_mode == 'change'

# ============================================================================
# UPDATE MODE
# ============================================================================
# Add components (slipstream, WSS) to an existing server
# Does NOT reinstall Outline, only adds new components and re-registers with FCP

# Set providers from domain_providers for update mode
# Use slipstream_base_domain if slipstream is enabled, otherwise use base_domain
- name: Set update mode base domain
  set_fact:
    update_base_domain: "{{ slipstream_base_domain if (slipstream_enabled | default(false) | bool) else base_domain }}"
  when: operation_mode == 'update'

- name: Set providers from domain_providers (update mode)
  set_fact:
    dns_provider: "{{ domain_providers[update_base_domain].dns_provider | default('cloudflare') }}"
    base_domain: "{{ update_base_domain }}"
  when:
    - operation_mode == 'update'
    - update_base_domain is defined
    - update_base_domain in domain_providers

- name: Update existing server with new components
  block:
    - name: Check if /opt/outline exists
      stat:
        path: /opt/outline
      register: outline_path

    - name: Check if Remnawave is installed
      stat:
        path: "{{ remnawave_node_install_dir }}/docker-compose.yml"
      register: remnanode_path

    - name: Determine detected component
      set_fact:
        update_component: >-
          {{ 'outline' if outline_path.stat.exists
             else ('remnawave' if remnanode_path.stat.exists
                   else 'none') }}

    - name: Set outline_install_success based on existing installation
      set_fact:
        outline_install_success: "{{ outline_path.stat.exists }}"

    - name: Fail if no VPN backend is installed
      fail:
        msg: |
          Update mode requires an existing Outline OR Remnawave installation.

          Update mode is for adding components or re-syncing state on existing
          servers. To deploy a new server, use operation_mode=deploy instead.
      when: update_component == 'none'

    - name: Fail if Outline requested on a Remnawave host
      fail:
        msg: |
          Cannot run update mode with outline_enabled=true on a Remnawave host
          ({{ remnawave_node_install_dir }} detected). Set outline_enabled=false
          and remnawave_enabled=true to update the Remnawave deployment.
      when:
        - update_component == 'remnawave'
        - outline_enabled | default(true) | bool
        - not (remnawave_enabled | default(false) | bool)

    - name: Fail if Remnawave requested on an Outline host
      fail:
        msg: |
          Cannot run update mode with remnawave_enabled=true on an Outline host
          (/opt/outline detected). Mutual exclusion: a host runs one backend or
          the other, not both.
      when:
        - update_component == 'outline'
        - remnawave_enabled | default(false) | bool

    - name: Fail if slipstream shadowsocks mode requested on a Remnawave host
      fail:
        msg: |
          Cannot add slipstream in shadowsocks mode on a Remnawave host:
          shadowsocks mode requires Outline. Use slipstream_mode=raw instead.
      when:
        - slipstream_enabled | default(false) | bool
        - slipstream_mode | default('shadowsocks') == 'shadowsocks'
        - update_component != 'outline'

    - name: Read existing Outline API info
      slurp:
        src: /opt/outline/access.txt
      register: outline_access_raw
      when: outline_path.stat.exists

    - name: Parse existing API info (key:value format)
      set_fact:
        outline_access_decoded: "{{ outline_access_raw.content | b64decode }}"
      when: outline_path.stat.exists

    - name: Extract API URL from access.txt
      set_fact:
        outline_api_url: "{{ outline_access_decoded | regex_search('apiUrl:(.+)', '\\1') | first | trim }}"
      when: outline_path.stat.exists

    - name: Build outline_api_info object
      set_fact:
        outline_api_info:
          apiUrl: "{{ outline_api_url }}"
          certSha256: "{{ outline_access_decoded | regex_search('certSha256:(.+)', '\\1') | first | default('') | trim }}"
      when: outline_path.stat.exists

    - name: Extract hostname from existing API URL
      set_fact:
        random_hostname: "{{ outline_api_info.apiUrl | regex_search('https://([^.]+)', '\\1') | first | trim }}"
        dns_hostname: "{{ outline_api_info.apiUrl | regex_search('https://([^/]+)', '\\1') | first | trim | regex_replace(':[0-9]+$', '') }}"
      when: outline_path.stat.exists

    # =========================================================================
    # Detect existing components (to avoid re-deploying)
    # =========================================================================
    - name: Check if shadowbox config exists
      stat:
        path: /opt/outline/persisted-state/shadowbox_server_config.json
      register: shadowbox_config_path

    - name: Read shadowbox config to check for WebSocket
      slurp:
        src: /opt/outline/persisted-state/shadowbox_server_config.json
      register: shadowbox_config_raw
      when: shadowbox_config_path.stat.exists

    - name: Set WebSocket already installed flag
      set_fact:
        wss_already_installed: "{{ 'websocketStream' in (shadowbox_config_raw.content | b64decode) }}"
      when: shadowbox_config_path.stat.exists

    - name: Set WebSocket not installed flag
      set_fact:
        wss_already_installed: false
      when: not shadowbox_config_path.stat.exists

    - name: Check if slipstream is already installed
      stat:
        path: /usr/local/bin/slipstream-server
      register: slipstream_installed

    - name: Set slipstream already installed flag
      set_fact:
        slipstream_already_installed: "{{ slipstream_installed.stat.exists }}"

    - name: Debug update configuration
      debug:
        msg:
          - "Update mode: Adding components to existing server"
          - "Detected hostname: {{ random_hostname | default('N/A') }}"
          - "Existing components detected:"
          - "  - WebSocket: {{ wss_already_installed | default(false) }}"
          - "  - slipstream: {{ slipstream_already_installed | default(false) }}"
          - "Components requested:"
          - "  - slipstream: {{ slipstream_enabled | default(false) | bool }} (mode: {{ slipstream_mode | default('shadowsocks') }})"
          - "  - WebSocket: {{ outline_wss_enabled | default(false) | bool }}"
          - "Force reinstall flags:"
          - "  - Force slipstream: {{ force_reinstall_slipstream | default(false) | bool }}"
          - "  - Force WebSocket: {{ force_reinstall_wss | default(false) | bool }}"
          - "Actions:"
          - "  - Install WebSocket: {{ (outline_wss_enabled | default(false) | bool) and (not (wss_already_installed | default(false)) or (force_reinstall_wss | default(false) | bool)) }}"
          - "  - Install slipstream: {{ (slipstream_enabled | default(false) | bool) and (not (slipstream_already_installed | default(false)) or (force_reinstall_slipstream | default(false) | bool)) }}"

    # =========================================================================
    # Track what will be installed
    # =========================================================================
    # Force reinstall flags override the "already installed" detection
    - name: Calculate what will be installed
      set_fact:
        will_install_wss: "{{ (outline_wss_enabled | default(false) | bool) and (not (wss_already_installed | default(false)) or (force_reinstall_wss | default(false) | bool)) }}"
        will_install_slipstream: "{{ (slipstream_enabled | default(false) | bool) and (not (slipstream_already_installed | default(false)) or (force_reinstall_slipstream | default(false) | bool)) }}"

    - name: Check if anything needs to be installed
      set_fact:
        will_install_anything: "{{ will_install_wss or will_install_slipstream }}"

    # =========================================================================
    # Add WebSocket (if enabled AND not already installed)
    # =========================================================================
    - name: Add WebSocket configuration
      include_tasks: setup/websocket.yml
      when:
        - outline_path.stat.exists
        - will_install_wss | bool

    - name: Mark WebSocket as newly installed
      set_fact:
        wss_newly_installed: true
      when: will_install_wss | bool

    # =========================================================================
    # Add slipstream DNS Tunnel (if enabled AND not already installed)
    # =========================================================================
    - name: Add slipstream DNS tunnel
      include_tasks: setup/slipstream.yml
      when:
        - will_install_slipstream | bool

    - name: Mark slipstream as newly installed
      set_fact:
        slipstream_newly_installed: true
      when: will_install_slipstream | bool

    # =========================================================================
    # Re-register the server with FCP after adding components (Outline path)
    # =========================================================================
    # FCP stores the management apiUrl (+ WSS fields) and dials out. Re-register
    # so a newly added WSS transport is reflected. Idempotent by slug (PUT by-slug).
    # effective_cdn_provider isn't set in update mode — derive it from the
    # detected host's domain so register_server.yml picks the right websocketDomain.
    - name: Derive WSS base domain (update mode)
      set_fact:
        _wss_base_domain: "{{ dns_hostname.split('.')[1:] | join('.') }}"
      when: dns_hostname is defined

    - name: Derive effective CDN provider (update mode)
      set_fact:
        effective_cdn_provider: "{{ domain_providers[_wss_base_domain].cdn_provider | default('none') }}"
      when:
        - _wss_base_domain is defined
        - _wss_base_domain in domain_providers

    - name: Re-register Outline server with FCP (components changed)
      include_tasks: providers/fcp/register_server.yml
      when:
        - fcp_enabled | default(false) | bool
        - outline_path.stat.exists
        - will_install_anything | bool

    - name: Display update summary (components added)
      debug:
        msg: |
          Update complete!

          Server: {{ dns_hostname | default('unknown') }}

          Components added:
          {% if wss_newly_installed | default(false) | bool %}
            ✓ WebSocket transport (WSS)
          {% endif %}
          {% if slipstream_newly_installed | default(false) | bool %}
            ✓ slipstream DNS tunnel ({{ slipstream_mode | default('shadowsocks') }} mode)
          {% endif %}
          {% if fcp_enabled | default(false) | bool %}
            ✓ FCP registration re-synced
          {% endif %}
      when:
        - outline_path.stat.exists
        - will_install_anything | bool

    # =========================================================================
    # Nothing to update on Outline host - show status and exit cleanly
    # =========================================================================
    - name: Display no-op summary (Outline path)
      debug:
        msg: |
          No update needed!

          Server: {{ dns_hostname | default('unknown') }}

          All requested components are already installed:
          {% if wss_already_installed | default(false) %}
            ✓ WebSocket: already installed
          {% endif %}
          {% if slipstream_already_installed | default(false) %}
            ✓ slipstream: already installed
          {% endif %}

          No changes were made.
      when:
        - update_component == 'outline'
        - not (will_install_anything | bool)

    # =========================================================================
    # Remnawave update branch (re-template / recreate, re-register with FCP)
    # =========================================================================
    - name: Run Remnawave update tasks
      include_tasks: update/remnawave_update.yml
      when: update_component == 'remnawave'

    # Optional slipstream-raw add-on for Remnawave hosts (must come AFTER the
    # remnawave_update.yml include so dns_hostname / random_hostname are set).
    - name: Add slipstream DNS tunnel (raw mode only on Remnawave hosts)
      include_tasks: setup/slipstream.yml
      when:
        - update_component == 'remnawave'
        - slipstream_enabled | default(false) | bool
        - not (slipstream_already_installed | default(false))
        - slipstream_mode | default('shadowsocks') == 'raw'
  when: operation_mode == 'update'

# ============================================================================
# BOOTSTRAP MODE (panel-only, host-agnostic, run once per panel)
# ============================================================================
# Create the panel objects a working key needs — a Config Profile with the
# BASE WS/Reality inbounds (the templates node deploys clone per node) and an
# x25519 keypair for Reality. Per-node squads are created at NODE deploy time
# (create_node_placement.yml) and appended to FCP's mode pools there; the
# legacy panel-wide squads are only created when
# remnawave_bootstrap_shared_squads=true (simple single-unit topology).
# Fully idempotent (GET-before-POST); touches NO host (delegate_to: localhost).
# This replaces the manual "Phase 0" panel setup. Run once, e.g.:
#   ansible-playbook playbook.yml -e operation_mode=bootstrap \
#     -e remnawave_panel_url=https://panel.example.com -e fcp_enabled=true \
#     --ask-vault-pass
# It PRINTS the created Config Profile + inbound UUIDs — copy them into your
# node-deploy vars (see defaults/main.yml "Panel bootstrap").
- name: Bootstrap the Remnawave panel (config profile + inbounds) and FCP binding
  block:
    - name: Validate bootstrap prerequisites
      assert:
        that:
          - remnawave_panel_url is defined and remnawave_panel_url | length > 0
          - remnawave_panel_api_token is defined and remnawave_panel_api_token | length > 0
        fail_msg: >-
          Bootstrap requires remnawave_panel_url and remnawave_panel_api_token (a
          panel API token with config-profile, internal-squad, and system-tools scopes).
      no_log: true

    - name: Generate the Reality x25519 keypair (panel API)
      include_tasks: providers/remnawave/gen_x25519.yml
      when: remnawave_bootstrap_reality | default(true) | bool

    - name: Ensure the Config Profile + inbounds exist (capture their UUIDs)
      include_tasks: providers/remnawave/create_config_profile.yml

    # Legacy/simple topology only: one panel-wide squad per mode (every node
    # looks like one unit to FCP's node placement). The per-node model creates
    # squads at node deploy time instead.
    - name: Ensure the shared connection-mode squads exist (capture their UUIDs)
      include_tasks: providers/remnawave/create_squad.yml
      when: remnawave_bootstrap_shared_squads | default(false) | bool

    # Opt-in: write the created UUIDs to a vars file so node deploys need no manual
    # paste. Load it alongside the creds file: -e @<creds>.yml -e @<this file>.
    # The fronted transport is WS-over-Fastly (XHTTP was removed 2026-07-04 —
    # Fastly cannot stream it). Node deploys load this file for the WS inbound UUID.
    - name: Write the generated node-deploy vars file (opt-in)
      copy:
        dest: "{{ remnawave_bootstrap_output_file }}"
        mode: '0644'
        content: |
          ---
          # Generated by ansible-role-freesocks (operation_mode=bootstrap). DO NOT edit by hand.
          # Re-run bootstrap to regenerate. Load for Remnawave node deploys alongside your
          # creds file:  -e @<creds>.yml -e @{{ remnawave_bootstrap_output_file }}
          remnawave_panel_config_profile_uuid: "{{ remnawave_panel_config_profile_uuid }}"
          remnawave_reality_inbound_uuid: "{{ remnawave_reality_inbound_uuid | default('') }}"
          remnawave_cdn_transports:
            - name: ws
              network: ws
              path: "/ws"
              internal_port: 8443
              inbound_uuid: "{{ remnawave_bootstrap_inbound_uuids['VLESS_WS_CDN'] | default('') }}"
              alpn: "http/1.1"
              fingerprint: chrome
              enabled: true
      delegate_to: localhost
      when: remnawave_bootstrap_output_file | default('') | length > 0

    # Shared-squad topology only: bind the two panel-wide squads as one-element
    # pools (full replace). Per-node deploys append their own squads instead.
    - name: Bind the shared squads to FCP mode placements
      include_tasks: providers/fcp/bind_placements.yml
      vars:
        _fcp_placement_modes: >-
          {{ {'evade': {'squadUuids': [remnawave_fronted_squad_uuid]}}
             | combine({'privacy': {'squadUuids': [remnawave_reality_squad_uuid]}}
              if ((remnawave_reality_squad_uuid | default('')) | length > 0) else {}) }}
      when:
        - fcp_enabled | default(false) | bool
        - remnawave_bootstrap_shared_squads | default(false) | bool
        - (remnawave_fronted_squad_uuid | default('')) | length > 0

    # Opt-in (needs admin:settings:write; FCP's compiled default is already
    # 'evade', so most deployments leave fcp_default_connection_mode empty).
    - name: Set the FCP default connection mode
      include_tasks: providers/fcp/bind_default_mode.yml
      when:
        - fcp_enabled | default(false) | bool
        - (fcp_default_connection_mode | default('')) | length > 0

    - name: Bootstrap summary
      debug:
        msg: |
          Panel bootstrap complete.

          Config Profile: {{ remnawave_bootstrap_config_profile_name }}
            uuid: {{ remnawave_panel_config_profile_uuid | default('(unresolved)') }}

          Base inbounds (copy into your node-deploy vars — node deploys clone
          them per node when remnawave_per_node_placement is on):
            remnawave_cdn_transports[ws].inbound_uuid:    {{ remnawave_bootstrap_inbound_uuids['VLESS_WS_CDN'] | default('(none)') }}
            remnawave_reality_inbound_uuid:               {{ remnawave_reality_inbound_uuid | default('(disabled)') }}

          {% if remnawave_bootstrap_shared_squads | default(false) | bool %}
          Shared squads (legacy single-unit topology):
            fronted ({{ remnawave_bootstrap_fronted_squad_name }}): {{ 'uuid resolved' if (remnawave_fronted_squad_uuid | default('') | length > 0) else '(none)' }}
            reality ({{ remnawave_bootstrap_reality_squad_name }}): {{ 'uuid resolved' if (remnawave_reality_squad_uuid | default('') | length > 0) else '(disabled)' }}
          {% if fcp_enabled | default(false) | bool %}
          FCP mode placements bound (evade -> fronted pool, privacy -> reality pool).
          {% endif %}
          {% else %}
          No squads created at bootstrap: node deploys create a per-node squad
          and append it to FCP's mode pools (remnawave_per_node_placement=true).
          {% endif %}
  when: operation_mode == 'bootstrap'

