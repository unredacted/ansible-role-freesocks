---
# tests/test_integration.yml — end-to-end integration test against a REAL
# Remnawave panel (tests/panel/docker-compose.yml) + the mock FCP
# (tests/mock_fcp.py). Run via tests/run_integration.sh (which stands both up
# and exports REMNAWAVE_TEST_URL / REMNAWAVE_TEST_TOKEN / FCP_MOCK_URL).
#
# What it proves, in order:
#   1. operation_mode=bootstrap creates the Config Profile (FreeSocks-Config,
#      no-log posture) + base inbounds + the SHARED squads (FreeSocks-Fastly /
#      FreeSocks-Reality), binds them to FCP's mode pools, sets the default mode.
#   2. Shared-model node (node 1): registers against the BASE inbounds — no
#      clones, no per-node squads, no pool appends. A PATCH /api/nodes
#      round-trip (the change/migrate contract), panel registration with
#      maxKeys/priority + the strict test-connection probe, and mock-FCP scope
#      enforcement (a read-only token 403s on the by-slug PUT).
#   3. Node 2 registers the same way — shared state undisturbed.
#   4. Teardown (node 1): Host cleanup + node DELETE — the shared squads,
#      pools, and profile are untouched; node 2 intact.
#   5. LEGACY per-node placement (remnawave_per_node_placement=true): inbound
#      clones + FSF-/FSR- squads, pool append, duplicate-port tolerance,
#      teardown strips everything the legacy path created.

# --- shared expressions ------------------------------------------------------
- name: Integration — phase 1 (panel bootstrap through the role)
  hosts: localhost
  connection: local
  gather_facts: false
  vars: &ci_vars
    operation_mode: bootstrap
    remnawave_panel_url: "{{ lookup('env', 'REMNAWAVE_TEST_URL') | default('http://127.0.0.1:3000', true) }}"
    remnawave_panel_api_token: "{{ lookup('env', 'REMNAWAVE_TEST_TOKEN') }}"
    fcp_enabled: true
    fcp_api_url: "{{ lookup('env', 'FCP_MOCK_URL') | default('http://127.0.0.1:8811', true) }}"
    fcp_api_token: "fsv1_ci-mock-token"
    fcp_default_connection_mode: "evade"
    remnawave_bootstrap_output_file: "/tmp/role-ci/bootstrap-vars.yml"
    remnawave_persist_become: false
  pre_tasks:
    - name: Ensure the CI scratch dir exists
      file: { path: /tmp/role-ci, state: directory, mode: '0755' }
    - name: Assert the harness exported the panel token
      assert:
        that: [remnawave_panel_api_token | length > 0]
        fail_msg: "REMNAWAVE_TEST_TOKEN not set — run via tests/run_integration.sh"
  roles:
    - role: "{{ playbook_dir | dirname | basename }}"
  post_tasks:
    - name: Read back the Config Profiles
      uri:
        url: "{{ remnawave_panel_url }}/api/config-profiles"
        headers: { Authorization: "Bearer {{ remnawave_panel_api_token }}", Accept: application/json }
        return_content: yes
      register: _profiles
    # set_fact MATERIALIZES the value — chained lazy task-vars mis-evaluate on
    # ansible-core 2.19+ (the same quirk the role files avoid).
    - name: Materialize the bootstrap profile
      set_fact:
        _t1_profile: "{{ _profiles.json.response.configProfiles | selectattr('name', 'equalto', 'FreeSocks-Config') | list | first }}"
    - name: Assert the profile exists with the no-log posture + base inbounds
      assert:
        that:
          - _t1_profile.config.log.access == 'none'
          - _t1_profile.config.log.loglevel == 'none'
          - _t1_profile.config.log.dnsLog == false
          - _t1_profile.config.log.maskAddress == 'full'
          - _t1_profile.config.policy.levels['0'].statsUserOnline == false
          - _t1_profile.config.inbounds | selectattr('tag', 'equalto', 'VLESS_WS_CDN') | list | length == 1
          - _t1_profile.config.inbounds | selectattr('tag', 'equalto', 'VLESS_REALITY') | list | length == 1
        fail_msg: "Bootstrap profile missing or not born with the no-log Xray posture"
    - name: Read back the squads + mock FCP state
      uri:
        url: "{{ item }}"
        headers: { Authorization: "Bearer {{ remnawave_panel_api_token }}", Accept: application/json }
        return_content: yes
      loop:
        - "{{ remnawave_panel_url }}/api/internal-squads"
        - "{{ fcp_api_url }}/__state"
      register: _t1_state
    - name: Materialize the squad list + FCP state
      set_fact:
        _t1_squads: "{{ _t1_state.results[0].json.response.internalSquads | map(attribute='name') | list }}"
        _t1_fcp: "{{ _t1_state.results[1].json }}"
    - name: Assert the shared squads were created and bound to the pools
      assert:
        that:
          - _t1_squads | select('equalto', 'FreeSocks-Fastly') | list | length == 1
          - _t1_squads | select('equalto', 'FreeSocks-Reality') | list | length == 1
          - _t1_fcp.defaultMode == 'evade'
          - _t1_fcp.pools.evade | length == 1
          - _t1_fcp.pools.privacy | length == 1
        fail_msg: "Bootstrap should create + bind the shared squads (FreeSocks-Fastly / FreeSocks-Reality)"

- name: Integration — phase 2 (node 1, shared model — no clones/squads/appends)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    <<: *ci_vars
    operation_mode: deploy # cosmetic here; tasks are included directly
    random_hostname: "ci-node-one"
    dns_hostname: "ci-node-one.example.test"
    remnawave_node_address: "127.0.0.1"
    remnawave_caddy_enabled: true
    remnawave_reality_enabled: true
    remnawave_node_install_dir: "/tmp/role-ci/node1"
    remnawave_panel_register_node: true
    fcp_register_remnawave_panel: true
    fcp_remnawave_panel_slug: "ci-panel"
    fcp_max_keys: 100
    fcp_priority: 5
  pre_tasks:
    # Each phase simulates a DIFFERENT node on the same localhost. Real deploys
    # run one play per inventory host, so facts never leak between nodes — here
    # they would (set_fact outlives the play and outranks include_vars), so
    # clear them to model a fresh host.
    - meta: clear_facts
    - name: Ensure node 1 install dir exists
      file: { path: "{{ remnawave_node_install_dir }}", state: directory, mode: '0755' }
    - name: Reload node-deploy vars from the bootstrap output (fresh-host simulation)
      # set_fact, NOT include_vars: a prior phase's repointed facts outrank
      # include_vars (and survive clear_facts on ansible-core 2.21), so force
      # the file values the way a genuinely fresh host would see them.
      set_fact:
        remnawave_panel_config_profile_uuid: "{{ _boot.remnawave_panel_config_profile_uuid }}"
        remnawave_reality_inbound_uuid: "{{ _boot.remnawave_reality_inbound_uuid }}"
        remnawave_cdn_transports: "{{ _boot.remnawave_cdn_transports }}"
      vars:
        _boot: "{{ lookup('file', '/tmp/role-ci/bootstrap-vars.yml') | from_yaml }}"
  tasks:
    # Shared model: the node activates the BASE inbounds verbatim — this is the
    # same derivation setup/remnawave.yml does when per-node placement is off.
    - name: Derive active inbounds + register the node (as setup/remnawave.yml does)
      set_fact:
        remnawave_panel_active_inbounds: >-
          {{ (remnawave_cdn_transports | rejectattr('enabled', 'equalto', false) | map(attribute='inbound_uuid')
              | select('string') | reject('equalto', '') | list)
             + ([remnawave_reality_inbound_uuid] if (remnawave_reality_inbound_uuid | default('') | length > 0) else []) }}
    - name: Register node 1 with the panel
      include_role:
        name: "{{ playbook_dir | dirname | basename }}"
        tasks_from: providers/remnawave/register_node

    # PATCH /api/nodes round-trip (uuid in body, collection root) — the contract
    # change/migrate rely on, pinned here so a panel drift breaks CI, not prod.
    - name: PATCH node 1's address on the panel (update_node round-trip)
      include_role:
        name: "{{ playbook_dir | dirname | basename }}"
        tasks_from: providers/remnawave/update_node
      vars:
        remnawave_node_address: "ci-node-one-moved.example.test"

    - name: Read back node 1's patched address
      uri:
        url: "{{ remnawave_panel_url }}/api/nodes"
        headers: { Authorization: "Bearer {{ remnawave_panel_api_token }}", Accept: application/json }
        return_content: yes
      register: _t2_nodes_after_patch
    - name: Materialize the patched node row
      set_fact:
        _t2_patched: >-
          {{ ((_t2_nodes_after_patch.json.response['nodes']
               if (_t2_nodes_after_patch.json.response is mapping and 'nodes' in _t2_nodes_after_patch.json.response)
               else _t2_nodes_after_patch.json.response)
             | selectattr('name', 'equalto', 'ci-node-one') | list | first) }}
    - name: Assert the PATCH landed
      assert:
        that:
          - _t2_patched.address == 'ci-node-one-moved.example.test'
        fail_msg: "PATCH /api/nodes did not update the node address (contract drift)"

    - name: Register the panel with FCP (maxKeys/priority + strict probe)
      include_role:
        name: "{{ playbook_dir | dirname | basename }}"
        tasks_from: providers/fcp/register_remnawave_panel

    # The mock FCP enforces per-route scopes like the real one — a token
    # without admin:servers:write must 403 on the by-slug PUT.
    - name: Mint a read-only token on the mock FCP
      uri:
        url: "{{ fcp_api_url }}/__mint"
        method: POST
        body_format: json
        body: { token: "fsv1_ci-readonly", scopes: ["admin:servers:read"] }
        status_code: [200]
    - name: Assert the by-slug PUT is forbidden without admin:servers:write
      uri:
        url: "{{ fcp_api_url }}/api/v1/admin/backend-servers/by-slug/ci-scope-probe"
        method: PUT
        headers: { Authorization: "Bearer fsv1_ci-readonly", Content-Type: "application/json" }
        body_format: json
        body: { backend: "outline", apiUrl: "https://ci-scope-probe.example.test" }
        status_code: [403]
    - name: Read panel nodes + squads + profile + mock FCP state
      uri:
        url: "{{ item }}"
        headers: { Authorization: "Bearer {{ remnawave_panel_api_token }}", Accept: application/json }
        return_content: yes
      loop:
        - "{{ remnawave_panel_url }}/api/nodes"
        - "{{ remnawave_panel_url }}/api/internal-squads"
        - "{{ remnawave_panel_url }}/api/config-profiles"
        - "{{ fcp_api_url }}/__state"
      register: _phase2
    - name: Materialize the phase-2 state
      set_fact:
        _t2_nodes: "{{ _phase2.results[0].json.response['nodes'] if (_phase2.results[0].json.response is mapping and 'nodes' in _phase2.results[0].json.response) else _phase2.results[0].json.response }}"
        _t2_squads: "{{ _phase2.results[1].json.response.internalSquads | map(attribute='name') | list }}"
        _t2_tags: "{{ (_phase2.results[2].json.response.configProfiles | selectattr('name', 'equalto', 'FreeSocks-Config') | list | first).config.inbounds | map(attribute='tag') | list }}"
        _t2_state: "{{ _phase2.results[3].json }}"
    - name: Assert node registered and NOTHING per-node was created
      assert:
        that:
          - _t2_nodes | selectattr('name', 'equalto', 'ci-node-one') | list | length == 1
          # shared model: no per-node squads, no inbound clones, no pool appends
          - _t2_squads | select('search', '-ci-node') | list | length == 0
          - _t2_tags | select('search', '_CI_NODE') | list | length == 0
          - _t2_state.pools.evade | length == 1
          - _t2_state.pools.privacy | length == 1
          - _t2_state.servers['ci-panel'].maxKeys == 100
          - _t2_state.servers['ci-panel'].priority == 5
        fail_msg: "Shared-model node registration created per-node objects or drifted FCP state"

- name: Integration — phase 3 (node 2, shared model — state undisturbed)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    <<: *ci_vars
    operation_mode: deploy
    random_hostname: "ci-node-two"
    dns_hostname: "ci-node-two.example.test"
    remnawave_caddy_enabled: true
    remnawave_reality_enabled: false
    remnawave_node_install_dir: "/tmp/role-ci/node2"
  pre_tasks:
    # Each phase simulates a DIFFERENT node on the same localhost. Real deploys
    # run one play per inventory host, so facts never leak between nodes — here
    # they would (set_fact outlives the play and outranks include_vars), so
    # clear them to model a fresh host.
    - meta: clear_facts
    - name: Ensure node 2 install dir exists
      file: { path: "{{ remnawave_node_install_dir }}", state: directory, mode: '0755' }
    - name: Reload node-deploy vars from the bootstrap output (fresh-host simulation)
      # set_fact, NOT include_vars: a prior phase's repointed facts outrank
      # include_vars (and survive clear_facts on ansible-core 2.21), so force
      # the file values the way a genuinely fresh host would see them.
      set_fact:
        remnawave_panel_config_profile_uuid: "{{ _boot.remnawave_panel_config_profile_uuid }}"
        remnawave_reality_inbound_uuid: "{{ _boot.remnawave_reality_inbound_uuid }}"
        remnawave_cdn_transports: "{{ _boot.remnawave_cdn_transports }}"
      vars:
        _boot: "{{ lookup('file', '/tmp/role-ci/bootstrap-vars.yml') | from_yaml }}"
  tasks:
    - name: Derive active inbounds + register node 2 (shared model)
      set_fact:
        remnawave_panel_active_inbounds: >-
          {{ remnawave_cdn_transports | rejectattr('enabled', 'equalto', false) | map(attribute='inbound_uuid')
             | select('string') | reject('equalto', '') | list }}
    - name: Register node 2 with the panel
      include_role:
        name: "{{ playbook_dir | dirname | basename }}"
        tasks_from: providers/remnawave/register_node
    - name: Read the mock FCP state + squads
      uri:
        url: "{{ item }}"
        headers: { Authorization: "Bearer {{ remnawave_panel_api_token }}", Accept: application/json }
        return_content: yes
      loop:
        - "{{ fcp_api_url }}/__state"
        - "{{ remnawave_panel_url }}/api/internal-squads"
      register: _phase3
    - name: Materialize phase-3 state
      set_fact:
        _t3_fcp: "{{ _phase3.results[0].json }}"
        _t3_squads: "{{ _phase3.results[1].json.response.internalSquads | map(attribute='name') | list }}"
    - name: Assert the shared pools + squads are undisturbed
      assert:
        that:
          - _t3_fcp.pools.evade | length == 1
          - _t3_fcp.pools.privacy | length == 1
          - _t3_squads | select('search', '-ci-node') | list | length == 0
        fail_msg: "A shared-model node disturbed the pools or created per-node squads"

- name: Integration — phase 4 (teardown node 1; shared state untouched)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    <<: *ci_vars
    operation_mode: deploy
    random_hostname: "ci-node-one"
    old_random_hostname: "ci-node-one"
    remnawave_node_install_dir: "/tmp/role-ci/node1"
  pre_tasks:
    # Each phase simulates a DIFFERENT node on the same localhost. Real deploys
    # run one play per inventory host, so facts never leak between nodes — here
    # they would (set_fact outlives the play and outranks include_vars), so
    # clear them to model a fresh host.
    - meta: clear_facts
    - name: Reload node-deploy vars from the bootstrap output (fresh-host simulation)
      # set_fact, NOT include_vars: a prior phase's repointed facts outrank
      # include_vars (and survive clear_facts on ansible-core 2.21), so force
      # the file values the way a genuinely fresh host would see them.
      set_fact:
        remnawave_panel_config_profile_uuid: "{{ _boot.remnawave_panel_config_profile_uuid }}"
        remnawave_reality_inbound_uuid: "{{ _boot.remnawave_reality_inbound_uuid }}"
        remnawave_cdn_transports: "{{ _boot.remnawave_cdn_transports }}"
      vars:
        _boot: "{{ lookup('file', '/tmp/role-ci/bootstrap-vars.yml') | from_yaml }}"
  tasks:
    # Shared-model retire = Host cleanup + node DELETE. Squads/pools/profile
    # belong to the fleet, not the node.
    - name: Delete node 1's Hosts (shared-model retire)
      include_role:
        name: "{{ playbook_dir | dirname | basename }}"
        tasks_from: providers/remnawave/cleanup_hosts

    # DELETE /api/nodes/{uuid} — the force_wipe path's contract, pinned here.
    - name: Read node 1's persisted UUID
      slurp:
        src: "{{ remnawave_node_install_dir }}/.node_uuid"
      register: _t4_uuid_raw
      failed_when: false
    - name: Set the node UUID fact
      set_fact:
        remnawave_node_uuid: "{{ _t4_uuid_raw.content | b64decode | trim }}"
      when:
        - _t4_uuid_raw.content is defined
        - (_t4_uuid_raw.content | b64decode | trim) | length > 0
    - name: Delete node 1 from the panel
      include_role:
        name: "{{ playbook_dir | dirname | basename }}"
        tasks_from: providers/remnawave/delete_node

    - name: Read back profile + squads + nodes + mock FCP state
      uri:
        url: "{{ item }}"
        headers: { Authorization: "Bearer {{ remnawave_panel_api_token }}", Accept: application/json }
        return_content: yes
      loop:
        - "{{ remnawave_panel_url }}/api/config-profiles"
        - "{{ remnawave_panel_url }}/api/internal-squads"
        - "{{ fcp_api_url }}/__state"
        - "{{ remnawave_panel_url }}/api/nodes"
      register: _phase4
    - name: Materialize the phase-4 panel state
      set_fact:
        _t4_tags: "{{ (_phase4.results[0].json.response.configProfiles | selectattr('name', 'equalto', 'FreeSocks-Config') | list | first).config.inbounds | map(attribute='tag') | list }}"
        _t4_squads: "{{ _phase4.results[1].json.response.internalSquads | map(attribute='name') | list }}"
        _t4_state: "{{ _phase4.results[2].json }}"
        _t4_nodes: "{{ _phase4.results[3].json.response['nodes'] if (_phase4.results[3].json.response is mapping and 'nodes' in _phase4.results[3].json.response) else _phase4.results[3].json.response }}"
    - name: Assert node 1 is gone and the shared state is untouched
      assert:
        that:
          - _t4_nodes | selectattr('name', 'equalto', 'ci-node-one') | list | length == 0
          - _t4_nodes | selectattr('name', 'equalto', 'ci-node-two') | list | length == 1
          - _t4_tags | length == 2  # the two base inbounds, nothing cloned
          - _t4_squads | select('equalto', 'FreeSocks-Fastly') | list | length == 1
          - _t4_squads | select('equalto', 'FreeSocks-Reality') | list | length == 1
          - _t4_state.pools.evade | length == 1
          - _t4_state.pools.privacy | length == 1
        fail_msg: "Shared-model teardown left node-1 residue or disturbed the fleet state"

- name: "Integration — phase 5 (LEGACY per-node placement: clones, squads, pools, teardown)"
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    <<: *ci_vars
    operation_mode: deploy
    random_hostname: "ci-node-three"
    dns_hostname: "ci-node-three.example.test"
    remnawave_caddy_enabled: true
    remnawave_reality_enabled: true
    remnawave_per_node_placement: true
    remnawave_node_install_dir: "/tmp/role-ci/node3"
  pre_tasks:
    - meta: clear_facts
    - name: Ensure node 3 install dir exists
      file: { path: "{{ remnawave_node_install_dir }}", state: directory, mode: '0755' }
    - name: Reload node-deploy vars from the bootstrap output (fresh-host simulation)
      set_fact:
        remnawave_panel_config_profile_uuid: "{{ _boot.remnawave_panel_config_profile_uuid }}"
        remnawave_reality_inbound_uuid: "{{ _boot.remnawave_reality_inbound_uuid }}"
        remnawave_cdn_transports: "{{ _boot.remnawave_cdn_transports }}"
      vars:
        _boot: "{{ lookup('file', '/tmp/role-ci/bootstrap-vars.yml') | from_yaml }}"
  tasks:
    - name: Create per-node placement objects (node 3, legacy path)
      include_role:
        name: "{{ playbook_dir | dirname | basename }}"
        tasks_from: providers/remnawave/create_node_placement
    - name: Re-run per-node placement (idempotency)
      include_role:
        name: "{{ playbook_dir | dirname | basename }}"
        tasks_from: providers/remnawave/create_node_placement
    - name: Add node 3's squads to the FCP pools (as legacy main.yml does)
      include_role:
        name: "{{ playbook_dir | dirname | basename }}"
        tasks_from: providers/fcp/bind_placements
      vars:
        _fcp_placement_modes: >-
          {{ ({'evade': {'addSquadUuids': [remnawave_node_fronted_squad_uuid]}}
              if ((remnawave_node_fronted_squad_uuid | default('')) | length > 0) else {})
             | combine({'privacy': {'addSquadUuids': [remnawave_node_reality_squad_uuid]}}
              if ((remnawave_node_reality_squad_uuid | default('')) | length > 0) else {}) }}
    - name: Read back panel + FCP after node 3's legacy creates
      uri:
        url: "{{ item }}"
        headers: { Authorization: "Bearer {{ remnawave_panel_api_token }}", Accept: application/json }
        return_content: yes
      loop:
        - "{{ remnawave_panel_url }}/api/config-profiles"
        - "{{ remnawave_panel_url }}/api/internal-squads"
        - "{{ fcp_api_url }}/__state"
      register: _phase5
    - name: Materialize the phase-5 state
      set_fact:
        _t5_tags: "{{ (_phase5.results[0].json.response.configProfiles | selectattr('name', 'equalto', 'FreeSocks-Config') | list | first).config.inbounds | map(attribute='tag') | list }}"
        _t5_squads: "{{ _phase5.results[1].json.response.internalSquads | map(attribute='name') | list }}"
        _t5_state: "{{ _phase5.results[2].json }}"
    - name: Assert legacy clones + FSF-/FSR- squads + appends (idempotent re-run)
      assert:
        that:
          - _t5_tags | select('equalto', 'VLESS_WS_CDN_CI_NODE_THREE') | list | length == 1
          - _t5_tags | select('equalto', 'VLESS_REALITY_CI_NODE_THREE') | list | length == 1
          - _t5_squads | select('equalto', 'FSF-ci-node-three') | list | length == 1
          - _t5_squads | select('equalto', 'FSR-ci-node-three') | list | length == 1
          - _t5_state.pools.evade | length == 2   # shared + node3
          - _t5_state.pools.privacy | length == 2 # shared + node3
        fail_msg: "Legacy per-node placement (clones/squads/appends/idempotency) drifted"

- name: "Integration — phase 6 (LEGACY node 4: duplicate-port, then tear down node 3)"
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    <<: *ci_vars
    operation_mode: deploy
    random_hostname: "ci-node-four"
    dns_hostname: "ci-node-four.example.test"
    remnawave_caddy_enabled: true
    remnawave_reality_enabled: false
    remnawave_per_node_placement: true
    remnawave_node_install_dir: "/tmp/role-ci/node4"
  pre_tasks:
    # Node 3's include REPOINTED the transports facts at its own clones — a
    # fresh host would load the BASE uuids from the bootstrap file, so force
    # them back the way the real (one-play-per-host) flow sees them.
    - meta: clear_facts
    - name: Ensure node 4 install dir exists
      file: { path: "{{ remnawave_node_install_dir }}", state: directory, mode: '0755' }
    - name: Reload node-deploy vars from the bootstrap output (fresh-host simulation)
      set_fact:
        remnawave_panel_config_profile_uuid: "{{ _boot.remnawave_panel_config_profile_uuid }}"
        remnawave_reality_inbound_uuid: "{{ _boot.remnawave_reality_inbound_uuid }}"
        remnawave_cdn_transports: "{{ _boot.remnawave_cdn_transports }}"
      vars:
        _boot: "{{ lookup('file', '/tmp/role-ci/bootstrap-vars.yml') | from_yaml }}"
  tasks:
    # Node 4 (WS only): a SECOND same-port (8443) inbound clone in the SAME
    # profile — the duplicate-port VERIFY item, kept from the old suite.
    - name: Create per-node placement objects (node 4, duplicate-port verify)
      include_role:
        name: "{{ playbook_dir | dirname | basename }}"
        tasks_from: providers/remnawave/create_node_placement
    - name: Add node 4's squad to the FCP evade pool
      include_role:
        name: "{{ playbook_dir | dirname | basename }}"
        tasks_from: providers/fcp/bind_placements
      vars:
        _fcp_placement_modes: "{{ {'evade': {'addSquadUuids': [remnawave_node_fronted_squad_uuid]}} }}"
    - name: Read back panel + FCP after node 4's legacy creates
      uri:
        url: "{{ item }}"
        headers: { Authorization: "Bearer {{ remnawave_panel_api_token }}", Accept: application/json }
        return_content: yes
      loop:
        - "{{ remnawave_panel_url }}/api/config-profiles"
        - "{{ remnawave_panel_url }}/api/internal-squads"
        - "{{ fcp_api_url }}/__state"
      register: _phase6
    - name: Materialize the phase-6 state
      set_fact:
        _t6_tags: "{{ (_phase6.results[0].json.response.configProfiles | selectattr('name', 'equalto', 'FreeSocks-Config') | list | first).config.inbounds | map(attribute='tag') | list }}"
        _t6_squads: "{{ _phase6.results[1].json.response.internalSquads | map(attribute='name') | list }}"
        _t6_state: "{{ _phase6.results[2].json }}"
    - name: Assert node 4's clone + squad + append landed alongside node 3
      assert:
        that:
          - _t6_tags | select('equalto', 'VLESS_WS_CDN_CI_NODE_FOUR') | list | length == 1
          - _t6_squads | select('equalto', 'FSF-ci-node-four') | list | length == 1
          - _t6_state.pools.evade | length == 3   # shared + node3 + node4
          - _t6_state.pools.privacy | length == 2 # shared + node3
        fail_msg: "Node 4's legacy placement drifted (duplicate-port tolerance?)"

    # Tear node 3 down: the legacy path must strip exactly what it created.
    - name: Tear down node 3's placement
      include_role:
        name: "{{ playbook_dir | dirname | basename }}"
        tasks_from: providers/remnawave/teardown_node_placement
      vars:
        random_hostname: "ci-node-three"
        remnawave_node_install_dir: "/tmp/role-ci/node3"
    - name: Read back panel + FCP after the legacy teardown
      uri:
        url: "{{ item }}"
        headers: { Authorization: "Bearer {{ remnawave_panel_api_token }}", Accept: application/json }
        return_content: yes
      loop:
        - "{{ remnawave_panel_url }}/api/config-profiles"
        - "{{ remnawave_panel_url }}/api/internal-squads"
        - "{{ fcp_api_url }}/__state"
      register: _phase6b
    - name: Materialize the post-teardown state
      set_fact:
        _t6b_tags: "{{ (_phase6b.results[0].json.response.configProfiles | selectattr('name', 'equalto', 'FreeSocks-Config') | list | first).config.inbounds | map(attribute='tag') | list }}"
        _t6b_squads: "{{ _phase6b.results[1].json.response.internalSquads | map(attribute='name') | list }}"
        _t6b_state: "{{ _phase6b.results[2].json }}"
    - name: Assert node 3 fully stripped, node 4 + shared state intact
      assert:
        that:
          - _t6b_tags | select('search', '_CI_NODE_THREE$') | list | length == 0
          - _t6b_tags | select('equalto', 'VLESS_WS_CDN_CI_NODE_FOUR') | list | length == 1
          - _t6b_squads | select('search', '-ci-node-three$') | list | length == 0
          - _t6b_squads | select('equalto', 'FSF-ci-node-four') | list | length == 1
          - _t6b_squads | select('equalto', 'FreeSocks-Fastly') | list | length == 1
          - _t6b_squads | select('equalto', 'FreeSocks-Reality') | list | length == 1
          - _t6b_state.pools.evade | length == 2   # shared + node4
          - _t6b_state.pools.privacy | length == 1 # shared
        fail_msg: "Legacy teardown left node-3 residue or disturbed node 4 / shared state"

    - name: All integration phases passed
      debug:
        msg: "Integration OK: bootstrap (shared squads bound), shared-model nodes x2 (no clones/appends), retire (Hosts+node), legacy per-node placement x2 (idempotent, duplicate-port) + teardown."
