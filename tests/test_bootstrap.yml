---
# tests/test_bootstrap.yml
#
# Self-asserting tests for the operation_mode=bootstrap expressions — pure filter
# logic, NO API calls. Mirrors the templating in
# tasks/providers/remnawave/{gen_x25519,create_config_profile,create_squad,create_node_placement}.yml
# and tasks/providers/fcp/bind_placements.yml.
#
# Run: ansible-playbook tests/test_bootstrap.yml
- hosts: localhost
  connection: local
  gather_facts: false
  vars:
    remnawave_bootstrap_reality_network: "raw"
    remnawave_bootstrap_reality_dest: "dl.google.com:443"
    remnawave_bootstrap_reality_server_names: ["dl.google.com"]
    remnawave_bootstrap_reality_short_ids: [""]
    remnawave_reality_private_key: "PRIV-KEY-xyz"
    fcp_default_connection_mode: "evade"
    # A fake GET /api/config-profiles/inbounds response (both plausible shapes).
    _fake_inbounds_flat:
      response:
        - { uuid: "uuid-ws", tag: "VLESS_WS_CDN", network: "ws" }
        - { uuid: "uuid-re", tag: "VLESS_REALITY", network: "raw" }
    _fake_inbounds_nested:
      response:
        inbounds:
          - { uuid: "uuid-ws", tag: "VLESS_WS_CDN" }
  tasks:
    # (a) x25519 extraction tolerates both the flat and keypairs[] shapes.
    - name: x25519 flat shape
      vars:
        _resp: { privateKey: "FLATKEY" }
        _pk: "{{ _resp.privateKey | default('') }}"
        _pk_kp: "{{ (_resp.keypairs | default([]) | first | default({})).privateKey | default('') }}"
      assert:
        that: ["(_pk if (_pk | length > 0) else _pk_kp) == 'FLATKEY'"]
        success_msg: "x25519 flat privateKey OK."
    - name: x25519 keypairs[] shape
      vars:
        _resp: { keypairs: [{ privateKey: "KPKEY", publicKey: "PUB" }] }
        _pk: "{{ _resp.privateKey | default('') }}"
        _pk_kp: "{{ (_resp.keypairs | default([]) | first | default({})).privateKey | default('') }}"
      assert:
        that: ["(_pk if (_pk | length > 0) else _pk_kp) == 'KPKEY'"]
        success_msg: "x25519 keypairs[0].privateKey OK."

    # (b) Reality inbound assembly injects the private key + uses network=raw.
    - name: Build the Reality inbound
      set_fact:
        _reality_inbound:
          tag: "VLESS_REALITY"
          listen: "0.0.0.0"
          port: 443
          protocol: "vless"
          settings: { clients: [], decryption: "none" }
          streamSettings:
            network: "{{ remnawave_bootstrap_reality_network }}"
            security: "reality"
            realitySettings:
              dest: "{{ remnawave_bootstrap_reality_dest }}"
              serverNames: "{{ remnawave_bootstrap_reality_server_names }}"
              privateKey: "{{ remnawave_reality_private_key }}"
              shortIds: "{{ remnawave_bootstrap_reality_short_ids }}"
          sniffing: { enabled: true, destOverride: ["http", "tls", "quic"] }
    - name: Assert Reality inbound shape
      assert:
        that:
          - _reality_inbound.streamSettings.network == 'raw'
          - _reality_inbound.streamSettings.security == 'reality'
          - _reality_inbound.streamSettings.realitySettings.privateKey == 'PRIV-KEY-xyz'
          - _reality_inbound.streamSettings.realitySettings.serverNames == ['dl.google.com']
        success_msg: "Reality inbound assembly OK (raw network, injected key)."

    # (c) Config-profiles / inbounds response normalization (flat list vs nested).
    - name: Normalize a flat response
      set_fact:
        _norm_flat: "{{ _rf.inbounds | default(_rf, true) }}"
      vars:
        _rf: "{{ _fake_inbounds_flat.response }}"
    - name: Normalize a nested response
      set_fact:
        _norm_nested: "{{ _rn.inbounds | default(_rn, true) }}"
      vars:
        _rn: "{{ _fake_inbounds_nested.response }}"
    - name: Assert normalization yields a list of inbounds either way
      assert:
        that:
          - _norm_flat | length == 2
          - _norm_nested | length == 1
          - (_norm_flat | selectattr('tag', 'equalto', 'VLESS_WS_CDN') | map(attribute='uuid') | first) == 'uuid-ws'
        success_msg: "Inbound response normalization OK (flat + nested)."

    # (d) tag -> uuid map building (mirrors the combine loop).
    - name: Build tag -> uuid map
      set_fact:
        _uuid_by_tag: "{{ _uuid_by_tag | default({}) | combine({ item.tag: item.uuid }) }}"
      loop: "{{ _fake_inbounds_flat.response }}"
      loop_control:
        label: "{{ item.tag }}"
    - name: Assert the map + fronted-squad inbound selection
      vars:
        _fronted: "{{ [_uuid_by_tag['VLESS_WS_CDN'] | default('')] | select('string') | reject('equalto', '') | list }}"
      assert:
        that:
          - _uuid_by_tag['VLESS_WS_CDN'] == 'uuid-ws'
          - _uuid_by_tag['VLESS_REALITY'] == 'uuid-re'
          - _fronted == ['uuid-ws']
        success_msg: "tag->uuid map + fronted squad inbound selection OK."

    # (e) Fronted selection drops an unbound inbound (only WS present).
    - name: Assert fronted selection drops empties
      vars:
        _partial: "{{ ['uuid-ws', ''] | select('string') | reject('equalto', '') | list }}"
      assert:
        that: ["_partial == ['uuid-ws']"]
        success_msg: "Fronted squad selection drops unbound inbounds."

    # (f) FCP mode-placements PATCH body (shared-squad full replace) — both pools.
    - name: Build FCP placement body (shared squads, with Reality)
      vars:
        remnawave_fronted_squad_uuid: "sq-front"
        remnawave_reality_squad_uuid: "sq-reality"
        _privacy_entry: "{{ {'privacy': {'squadUuids': [remnawave_reality_squad_uuid]}} if ((remnawave_reality_squad_uuid | default('')) | length > 0) else {} }}"
        _fcp_placement_modes: "{{ {'evade': {'squadUuids': [remnawave_fronted_squad_uuid]}} | combine(_privacy_entry) }}"
      assert:
        that:
          - _fcp_placement_modes.evade.squadUuids == ['sq-front']
          - _fcp_placement_modes.privacy.squadUuids == ['sq-reality']
        success_msg: "FCP placement body OK (evade -> fronted pool, privacy -> reality pool)."

    # (g) The pool body omits privacy when Reality is disabled (empty squad).
    - name: Build FCP placement body (Reality disabled)
      vars:
        remnawave_fronted_squad_uuid: "sq-front"
        remnawave_reality_squad_uuid: ""
        _privacy_entry: "{{ {'privacy': {'squadUuids': [remnawave_reality_squad_uuid]}} if ((remnawave_reality_squad_uuid | default('')) | length > 0) else {} }}"
        _fcp_placement_modes: "{{ {'evade': {'squadUuids': [remnawave_fronted_squad_uuid]}} | combine(_privacy_entry) }}"
      assert:
        that:
          - _fcp_placement_modes.evade.squadUuids == ['sq-front']
          - "'privacy' not in _fcp_placement_modes"
        success_msg: "FCP placement body omits privacy when Reality is disabled."

    # (h) Per-node deploy: the append-only add body (never disturbs the pool).
    - name: Build FCP placement body (per-node addSquadUuids)
      vars:
        remnawave_node_fronted_squad_uuid: "sq-node-front"
        remnawave_node_reality_squad_uuid: ""
        _evade_entry: "{{ {'evade': {'addSquadUuids': [remnawave_node_fronted_squad_uuid]}} if ((remnawave_node_fronted_squad_uuid | default('')) | length > 0) else {} }}"
        _privacy_entry: "{{ {'privacy': {'addSquadUuids': [remnawave_node_reality_squad_uuid]}} if ((remnawave_node_reality_squad_uuid | default('')) | length > 0) else {} }}"
        _fcp_placement_modes: "{{ _evade_entry | combine(_privacy_entry) }}"
      assert:
        that:
          - _fcp_placement_modes.evade.addSquadUuids == ['sq-node-front']
          - "'squadUuids' not in _fcp_placement_modes.evade"
          - "'privacy' not in _fcp_placement_modes"
        success_msg: "Per-node add body OK (append-only, WS squad only)."

    # (i) Per-node inbound plan + clone expressions (create_node_placement.yml).
    - name: Per-node plan clones the base WS inbound under a node tag
      vars:
        random_hostname: "quiet-falcon"
        remnawave_caddy_enabled: true
        remnawave_reality_enabled: false
        remnawave_reality_inbound_uuid: ""
        remnawave_cdn_transports:
          - { name: ws, network: ws, path: "/ws", internal_port: 8443, inbound_uuid: "uuid-ws", alpn: "http/1.1", fingerprint: chrome, enabled: true }
        _np_uuid_to_tag: { "uuid-ws": "VLESS_WS_CDN" }
        _np_tag_suffix: "{{ random_hostname | regex_replace('[^A-Za-z0-9]', '_') | upper }}"
        _np_plan: >-
          {%- set plan = [] -%}
          {%- if remnawave_caddy_enabled | default(false) | bool -%}
            {%- for t in remnawave_cdn_transports | default([]) if (t.enabled | default(false)) and ((t.inbound_uuid | default('')) | length > 0) -%}
              {%- set base_tag = _np_uuid_to_tag.get(t.inbound_uuid, '') -%}
              {%- if base_tag -%}
                {%- set node_tag = base_tag if base_tag.endswith('_' ~ _np_tag_suffix) else base_tag ~ '_' ~ _np_tag_suffix -%}
                {%- set _ = plan.append({'kind': 'ws', 'transport': t.name, 'base_tag': base_tag, 'node_tag': node_tag, 'port': t.internal_port | default(0)}) -%}
              {%- endif -%}
            {%- endfor -%}
          {%- endif -%}
          {{ plan }}
        _np_profile_config:
          inbounds:
            - { tag: "VLESS_WS_CDN", listen: "127.0.0.1", port: 8443, protocol: "vless" }
        _np_clones: >-
          {%- set clones = [] -%}
          {%- set existing = _np_profile_config.inbounds | map(attribute='tag') | list -%}
          {%- for p in _np_plan if p.node_tag not in existing -%}
            {%- set base = (_np_profile_config.inbounds | selectattr('tag', 'equalto', p.base_tag) | list | first) | default(none) -%}
            {%- if base is not none -%}
              {%- set overrides = {'tag': p.node_tag} -%}
              {%- if p.kind == 'ws' and (p.port | int) > 0 -%}
                {%- set overrides = overrides | combine({'port': p.port | int}) -%}
              {%- endif -%}
              {%- set _ = clones.append(base | combine(overrides)) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ clones }}
      assert:
        that:
          - _np_plan | length == 1
          - _np_plan[0].node_tag == 'VLESS_WS_CDN_QUIET_FALCON'
          - _np_clones | length == 1
          - _np_clones[0].tag == 'VLESS_WS_CDN_QUIET_FALCON'
          - _np_clones[0].port == 8443
          - _np_clones[0].protocol == 'vless'
        success_msg: "Per-node plan + clone expressions OK."

    # A re-run sees the REPOINTED per-node uuid; the plan must not re-suffix.
    - name: Per-node plan is idempotent against an already-node-tagged base
      vars:
        random_hostname: "quiet-falcon"
        remnawave_caddy_enabled: true
        remnawave_cdn_transports:
          - { name: ws, network: ws, path: "/ws", internal_port: 8443, inbound_uuid: "uuid-node-ws", enabled: true }
        _np_uuid_to_tag: { "uuid-node-ws": "VLESS_WS_CDN_QUIET_FALCON" }
        _np_tag_suffix: "{{ random_hostname | regex_replace('[^A-Za-z0-9]', '_') | upper }}"
        _np_plan: >-
          {%- set plan = [] -%}
          {%- for t in remnawave_cdn_transports if (t.enabled | default(false)) and ((t.inbound_uuid | default('')) | length > 0) -%}
            {%- set base_tag = _np_uuid_to_tag.get(t.inbound_uuid, '') -%}
            {%- if base_tag -%}
              {%- set node_tag = base_tag if base_tag.endswith('_' ~ _np_tag_suffix) else base_tag ~ '_' ~ _np_tag_suffix -%}
              {%- set _ = plan.append({'node_tag': node_tag}) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ plan }}
      assert:
        that:
          - _np_plan[0].node_tag == 'VLESS_WS_CDN_QUIET_FALCON'
        success_msg: "Re-run does not double-suffix the node tag."

    - name: All bootstrap expression tests passed
      debug:
        msg: "All bootstrap expression tests passed."
