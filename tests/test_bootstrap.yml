---
# tests/test_bootstrap.yml
#
# Self-asserting tests for the operation_mode=bootstrap expressions — pure filter
# logic, NO API calls. Mirrors the templating in
# tasks/providers/remnawave/{gen_x25519,create_config_profile,create_squad}.yml
# and tasks/providers/fcp/bind_profiles.yml.
#
# Run: ansible-playbook tests/test_bootstrap.yml
- hosts: localhost
  connection: local
  gather_facts: false
  vars:
    remnawave_bootstrap_reality_network: "raw"
    remnawave_bootstrap_reality_dest: "dl.google.com:443"
    remnawave_bootstrap_reality_server_names: ["dl.google.com"]
    remnawave_bootstrap_reality_short_ids: [""]
    remnawave_reality_private_key: "PRIV-KEY-xyz"
    fcp_default_connection_profile: "evade"
    # A fake GET /api/config-profiles/inbounds response (both plausible shapes).
    _fake_inbounds_flat:
      response:
        - { uuid: "uuid-ws", tag: "VLESS_WS_CDN", network: "ws" }
        - { uuid: "uuid-re", tag: "VLESS_REALITY", network: "raw" }
    _fake_inbounds_nested:
      response:
        inbounds:
          - { uuid: "uuid-ws", tag: "VLESS_WS_CDN" }
  tasks:
    # (a) x25519 extraction tolerates both the flat and keypairs[] shapes.
    - name: x25519 flat shape
      vars:
        _resp: { privateKey: "FLATKEY" }
        _pk: "{{ _resp.privateKey | default('') }}"
        _pk_kp: "{{ (_resp.keypairs | default([]) | first | default({})).privateKey | default('') }}"
      assert:
        that: ["(_pk if (_pk | length > 0) else _pk_kp) == 'FLATKEY'"]
        success_msg: "x25519 flat privateKey OK."
    - name: x25519 keypairs[] shape
      vars:
        _resp: { keypairs: [{ privateKey: "KPKEY", publicKey: "PUB" }] }
        _pk: "{{ _resp.privateKey | default('') }}"
        _pk_kp: "{{ (_resp.keypairs | default([]) | first | default({})).privateKey | default('') }}"
      assert:
        that: ["(_pk if (_pk | length > 0) else _pk_kp) == 'KPKEY'"]
        success_msg: "x25519 keypairs[0].privateKey OK."

    # (b) Reality inbound assembly injects the private key + uses network=raw.
    - name: Build the Reality inbound
      set_fact:
        _reality_inbound:
          tag: "VLESS_REALITY"
          listen: "0.0.0.0"
          port: 443
          protocol: "vless"
          settings: { clients: [], decryption: "none" }
          streamSettings:
            network: "{{ remnawave_bootstrap_reality_network }}"
            security: "reality"
            realitySettings:
              dest: "{{ remnawave_bootstrap_reality_dest }}"
              serverNames: "{{ remnawave_bootstrap_reality_server_names }}"
              privateKey: "{{ remnawave_reality_private_key }}"
              shortIds: "{{ remnawave_bootstrap_reality_short_ids }}"
          sniffing: { enabled: true, destOverride: ["http", "tls", "quic"] }
    - name: Assert Reality inbound shape
      assert:
        that:
          - _reality_inbound.streamSettings.network == 'raw'
          - _reality_inbound.streamSettings.security == 'reality'
          - _reality_inbound.streamSettings.realitySettings.privateKey == 'PRIV-KEY-xyz'
          - _reality_inbound.streamSettings.realitySettings.serverNames == ['dl.google.com']
        success_msg: "Reality inbound assembly OK (raw network, injected key)."

    # (c) Config-profiles / inbounds response normalization (flat list vs nested).
    - name: Normalize a flat response
      set_fact:
        _norm_flat: "{{ _rf.inbounds | default(_rf, true) }}"
      vars:
        _rf: "{{ _fake_inbounds_flat.response }}"
    - name: Normalize a nested response
      set_fact:
        _norm_nested: "{{ _rn.inbounds | default(_rn, true) }}"
      vars:
        _rn: "{{ _fake_inbounds_nested.response }}"
    - name: Assert normalization yields a list of inbounds either way
      assert:
        that:
          - _norm_flat | length == 2
          - _norm_nested | length == 1
          - (_norm_flat | selectattr('tag', 'equalto', 'VLESS_WS_CDN') | map(attribute='uuid') | first) == 'uuid-ws'
        success_msg: "Inbound response normalization OK (flat + nested)."

    # (d) tag -> uuid map building (mirrors the combine loop).
    - name: Build tag -> uuid map
      set_fact:
        _uuid_by_tag: "{{ _uuid_by_tag | default({}) | combine({ item.tag: item.uuid }) }}"
      loop: "{{ _fake_inbounds_flat.response }}"
      loop_control:
        label: "{{ item.tag }}"
    - name: Assert the map + fronted-squad inbound selection
      vars:
        _fronted: "{{ [_uuid_by_tag['VLESS_WS_CDN'] | default('')] | select('string') | reject('equalto', '') | list }}"
      assert:
        that:
          - _uuid_by_tag['VLESS_WS_CDN'] == 'uuid-ws'
          - _uuid_by_tag['VLESS_REALITY'] == 'uuid-re'
          - _fronted == ['uuid-ws']
        success_msg: "tag->uuid map + fronted squad inbound selection OK."

    # (e) Fronted selection drops an unbound inbound (only WS present).
    - name: Assert fronted selection drops empties
      vars:
        _partial: "{{ ['uuid-ws', ''] | select('string') | reject('equalto', '') | list }}"
      assert:
        that: ["_partial == ['uuid-ws']"]
        success_msg: "Fronted squad selection drops unbound inbounds."

    # (f) FCP connection-profiles PATCH body — both squads present.
    - name: Build FCP bind body (with Reality)
      vars:
        remnawave_fronted_squad_uuid: "sq-front"
        remnawave_reality_squad_uuid: "sq-reality"
        _privacy_entry: "{{ {'privacy': {'squadUuid': remnawave_reality_squad_uuid}} if ((remnawave_reality_squad_uuid | default('')) | length > 0) else {} }}"
        _cp_body:
          default: "{{ fcp_default_connection_profile | default('evade') }}"
          profiles: "{{ {'evade': {'squadUuid': remnawave_fronted_squad_uuid}} | combine(_privacy_entry) }}"
      assert:
        that:
          - _cp_body.default == 'evade'
          - _cp_body.profiles.evade.squadUuid == 'sq-front'
          - _cp_body.profiles.privacy.squadUuid == 'sq-reality'
        success_msg: "FCP bind body OK (evade -> fronted, privacy -> reality)."

    # (g) FCP body omits privacy when Reality is disabled (empty squad).
    - name: Build FCP bind body (Reality disabled)
      vars:
        remnawave_fronted_squad_uuid: "sq-front"
        remnawave_reality_squad_uuid: ""
        _privacy_entry: "{{ {'privacy': {'squadUuid': remnawave_reality_squad_uuid}} if ((remnawave_reality_squad_uuid | default('')) | length > 0) else {} }}"
        _cp_body:
          default: "{{ fcp_default_connection_profile | default('evade') }}"
          profiles: "{{ {'evade': {'squadUuid': remnawave_fronted_squad_uuid}} | combine(_privacy_entry) }}"
      assert:
        that:
          - _cp_body.profiles.evade.squadUuid == 'sq-front'
          - "'privacy' not in _cp_body.profiles"
        success_msg: "FCP bind body omits privacy when Reality is disabled."

    - name: All bootstrap expression tests passed
      debug:
        msg: "All bootstrap expression tests passed."
