---
# tests/test_fastly_edge.yml
#
# Self-asserting tests for the Fastly edge/service naming in
# tasks/providers/fastly/service.yml + origin_identity.yml. Pure filter logic,
# NO API calls. The service is ALWAYS named after the node hostname; only the
# attached edge domain(s) vary by scheme.
#
# Run: ansible-playbook tests/test_fastly_edge.yml
- hosts: localhost
  connection: local
  gather_facts: false
  vars:
    fastly_service_name_prefix: "fs"
    random_hostname: "apple-banana-cherry"
  tasks:
    # (a) Chosen label -> edge domain label.global.ssl.fastly.net, service = hostname.
    - name: Chosen label derivation (service = hostname)
      vars:
        fastly_edge_label: "cdn-content"
        fastly_service_name: "{{ random_hostname }}"
        fastly_websocket_domain: "{{ fastly_edge_label }}.global.ssl.fastly.net"
      assert:
        that:
          - fastly_service_name == 'apple-banana-cherry'
          - fastly_websocket_domain == 'cdn-content.global.ssl.fastly.net'
        success_msg: "Chosen label -> edge cdn-content.global.ssl.fastly.net, service = hostname."

    # (b) Random selection -> fs-<hostname>.global.ssl.fastly.net, service = hostname.
    - name: Random derivation (service = hostname)
      vars:
        fastly_service_name: "{{ random_hostname }}"
        fastly_websocket_domain: "{{ fastly_service_name_prefix }}-{{ random_hostname }}.global.ssl.fastly.net"
      assert:
        that:
          - fastly_service_name == 'apple-banana-cherry'
          - fastly_websocket_domain == 'fs-apple-banana-cherry.global.ssl.fastly.net'
        success_msg: "Random -> fs-<hostname>.global.ssl.fastly.net, service = hostname."

    # (c) XOR selector: exactly one of label / random is valid (the exact
    #     expression from service.yml's assert, parenthesized so it binds as
    #     (L or R) and not (L and R) == item.ok, not L and not (R == ok)).
    - name: XOR selection truth table matches service.yml
      assert:
        that:
          - >-
            ( ((item.label | length > 0) or item.random)
              and not ((item.label | length > 0) and item.random) ) == item.ok
        success_msg: "XOR valid for label={{ item.label }} random={{ item.random }}."
      loop:
        - { label: "cdn-content", random: false, ok: true } # label only -> valid
        - { label: "", random: true, ok: true } # random only -> valid
        - { label: "cdn-content", random: true, ok: false } # both -> invalid
        - { label: "", random: false, ok: false } # neither -> invalid
      loop_control:
        label: "label='{{ item.label }}' random={{ item.random }}"

    # (d) Fronting domains -> primary edge is the FIRST entry; service = hostname.
    - name: Fronting domains derivation (primary = first)
      vars:
        fastly_fronting_domains: ["video-streams.org", "cdn-static.net"]
        fastly_service_name: "{{ random_hostname }}"
        fastly_websocket_domain: "{{ fastly_fronting_domains | first }}"
      assert:
        that:
          - fastly_service_name == 'apple-banana-cherry'
          - fastly_websocket_domain == 'video-streams.org'
        success_msg: "Fronting -> primary video-streams.org, service = hostname."

    - name: All Fastly edge-name tests passed
      debug:
        msg: "All Fastly edge-name selection tests passed."
