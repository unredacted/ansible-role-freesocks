name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Cheap structural checks: every YAML parses + the test playbooks pass
  # ansible's own syntax check.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install ansible-core
        run: pipx install ansible-core
      - name: YAML-parse every role file
        run: |
          python3 - <<'EOF'
          import sys, yaml, pathlib
          bad = []
          for p in pathlib.Path('.').rglob('*.yml'):
              if '.git' in p.parts:
                  continue
              try:
                  list(yaml.safe_load_all(p.read_text()))
              except Exception as e:
                  bad.append(f"{p}: {e}")
          if bad:
              print("\n".join(bad)); sys.exit(1)
          print("all YAML files parse")
          EOF
      - name: Syntax-check the test playbooks
        run: |
          ansible-playbook --syntax-check tests/test_bootstrap.yml
          ansible-playbook --syntax-check tests/test_caddyfile_render.yml
          ANSIBLE_ROLES_PATH="$(dirname "$PWD")" \
            ansible-playbook --syntax-check tests/test_integration.yml
          # test_deploy.yml loads the bootstrap output via vars_files, which the
          # syntax check also resolves — provide a placeholder.
          mkdir -p /tmp/role-ci && printf 'remnawave_panel_config_profile_uuid: ""\n' > /tmp/role-ci/bootstrap-vars.yml
          ANSIBLE_ROLES_PATH="$(dirname "$PWD")" \
            ansible-playbook --syntax-check tests/test_deploy.yml

  # The self-asserting expression tests (pure filter logic, no network):
  # bootstrap/placement body building, per-node plan+clone expressions, and
  # the Caddyfile render.
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install ansible-core
        run: pipx install ansible-core
      - name: Run the offline expression tests
        run: tests/run.sh

  # The real thing: a pinned Remnawave panel (same image the fleet runs) + a
  # contract-strict mock FCP + a mock Cloudflare API, driven end to end —
  # bootstrap, per-node placement for two nodes (including the
  # duplicate-inbound-port case), pool append/detach, teardown, and then the
  # FULL operation_mode=deploy path: a real remnawave/node container the panel
  # actually connects to, Reality placement, DNS, FCP registration + status
  # gate. Catches panel contract drift and FCP request regressions before any
  # production deploy.
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Install ansible-core + collections + docker SDK
        run: |
          pipx install ansible-core
          pipx inject ansible-core docker requests
          ansible-galaxy collection install -r requirements.yml
      - name: Run the integration harness (incl. the real-deploy phase)
        run: RUN_DEPLOY_PHASE=1 bash tests/run_integration.sh
      - name: Panel + node logs on failure
        if: failure()
        run: |
          docker compose -f tests/panel/docker-compose.yml logs --tail=100 || true
          sudo docker logs remnanode --tail=100 || true
          sudo cat /opt/remnanode/docker-compose.yml || true
